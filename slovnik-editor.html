<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Správce datového katalogu úřadu</title>
<style>
:root{--bg:#f5f3ef;--bg2:#eceae4;--bg3:#dedad2;--sf:#fff;--br:#c8c4bb;--br2:#a8a49b;--tx:#1a1917;--tx2:#4a4845;--tx3:#7a7875;--ac:#1a5c8a;--ach:#144d75;--acl:#e8f1f8;--dg:#8a1a1a;--dgl:#f8e8e8;--wn:#7a5a00;--wnl:#fdf5d8;--sc:#1a6a2a;--scl:#e8f5eb;--in:#1a4a7a;--inl:#e8f0f8;--fn:'Georgia',serif;--ui:system-ui,sans-serif;--r:4px;--sh:0 1px 3px rgba(0,0,0,.12)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--ui);background:var(--bg);color:var(--tx);font-size:15px;line-height:1.5}
a{color:var(--ac)}a:hover{color:var(--ach)}
.skip{position:absolute;top:-100px;left:0;background:var(--ac);color:#fff;padding:8px 16px;text-decoration:none;font-weight:bold;z-index:1000}.skip:focus{top:0}
#hdr{background:var(--ac);color:#fff;padding:10px 18px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
#hdr h1{font-family:var(--fn);font-size:1.2rem;font-weight:normal;flex:1}
#hdr nav{display:flex;gap:6px;flex-wrap:wrap}
#hdr nav button{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.3);padding:5px 11px;border-radius:var(--r);cursor:pointer;font-size:13px}
#hdr nav button:hover,#hdr nav button[aria-current="page"]{background:rgba(255,255,255,.3)}
#layout{display:flex;min-height:calc(100vh - 50px)}
#side{width:265px;min-width:200px;background:var(--sf);border-right:1px solid var(--br);padding:13px;overflow-y:auto;flex-shrink:0;transition:width .2s,padding .2s,opacity .2s}
#side.hidden{width:0;min-width:0;padding:0;overflow:hidden;opacity:0;border:none}
#toggle-side{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.3);padding:5px 9px;border-radius:var(--r);cursor:pointer;font-size:16px;line-height:1;flex-shrink:0}
#toggle-side:hover{background:rgba(255,255,255,.3)}
#main{flex:1;padding:18px;overflow-y:auto;max-width:1000px}
.panel{background:var(--sf);border:1px solid var(--br);border-radius:var(--r);padding:17px;margin-bottom:13px;box-shadow:var(--sh)}
.ptit{font-family:var(--fn);font-size:1.05rem;color:var(--ac);margin-bottom:11px;padding-bottom:7px;border-bottom:1px solid var(--br)}
fieldset{border:1px solid var(--br);border-radius:var(--r);padding:11px;margin-bottom:11px}
legend{font-weight:bold;font-size:.87rem;padding:0 5px;color:var(--tx2)}
.fg{margin-bottom:10px}.fg:last-child{margin-bottom:0}
label{display:block;font-size:.86rem;font-weight:bold;color:var(--tx2);margin-bottom:3px}
label .req{color:var(--dg);margin-left:2px}label .hint{font-weight:normal;color:var(--tx3);font-size:.8rem}
input[type=text],input[type=url],input[type=date],input[type=email],textarea,select{width:100%;padding:6px 9px;border:1px solid var(--br);border-radius:var(--r);background:var(--sf);color:var(--tx);font-family:var(--ui);font-size:14px;line-height:1.4}
input:focus,textarea:focus,select:focus{outline:2px solid var(--ac);outline-offset:1px;border-color:var(--ac)}
textarea{resize:vertical;min-height:62px}
.ir{display:flex;gap:7px;align-items:flex-start}.ir input,.ir select{flex:1}
.cbl{display:flex;align-items:center;gap:5px;font-size:.9rem;cursor:pointer;margin-bottom:3px}
button{font-family:var(--ui);cursor:pointer;border-radius:var(--r);font-size:14px;line-height:1;border:1px solid transparent;padding:7px 13px}
button:focus{outline:2px solid var(--ac);outline-offset:2px}
.bp{background:var(--ac);color:#fff;border-color:var(--ac)}.bp:hover{background:var(--ach)}
.bs{background:var(--sf);color:var(--ac);border-color:var(--br2)}.bs:hover{background:var(--acl)}
.bd{background:var(--sf);color:var(--dg);border-color:var(--br2)}.bd:hover{background:var(--dgl);border-color:var(--dg)}
.sm{padding:4px 9px;font-size:13px}
.bg{display:flex;gap:7px;flex-wrap:wrap;margin-top:10px}
.ilist{list-style:none}.ilist li{border-bottom:1px solid var(--bg3)}.ilist li:last-child{border-bottom:none}
.ilist a,.ilist button.ll{display:block;width:100%;text-align:left;padding:7px 9px;text-decoration:none;color:var(--tx);background:none;border:none;border-radius:var(--r);font-size:13px;cursor:pointer}
.ilist a:hover,.ilist button.ll:hover,.ilist a[aria-current],.ilist button.ll[aria-current]{background:var(--acl);color:var(--ac)}
.ilist button.ll[aria-current]{font-weight:bold}
.bdg{display:inline-block;font-size:11px;padding:1px 6px;border-radius:10px;margin-left:3px;vertical-align:middle}
.b0{background:var(--wnl);color:var(--wn)}.b1{background:var(--bg3);color:var(--tx2)}.b2{background:var(--inl);color:var(--in)}.b3{background:var(--scl);color:var(--sc)}.b4{background:#e8f5e8;color:#1a5a1a}.b5{background:var(--bg3);color:var(--tx2)}.b6{background:var(--dgl);color:var(--dg)}
.tb{display:inline-block;font-size:11px;padding:1px 7px;border-radius:10px;font-weight:bold}
.tPojem{background:#e8eaf6;color:#303f9f}.tTypObjektu{background:#e3f2fd;color:#1565c0}.tTypSubjektu{background:#fce4ec;color:#880e4f}.tVlastnost{background:#e8f5e9;color:#1b5e20}.tVztah{background:#fff3e0;color:#e65100}.tTrida{background:#f3e5f5;color:#4a148c}.tVerejnyUdaj{background:#e0f2f1;color:#004d40}.tNeverejnyUdaj{background:#fbe9e7;color:#bf360c}
table{width:100%;border-collapse:collapse;font-size:14px}
th{background:var(--bg2);text-align:left;padding:7px 9px;font-size:13px;font-weight:bold;color:var(--tx2);border-bottom:2px solid var(--br)}
td{padding:7px 9px;border-bottom:1px solid var(--bg3);vertical-align:top}
tr:hover td{background:var(--bg)}.tw{overflow-x:auto}
.al{padding:9px 13px;border-radius:var(--r);margin-bottom:10px;font-size:14px;border-left:4px solid}
.ali{background:var(--inl);color:var(--in);border-color:var(--in)}.alw{background:var(--wnl);color:var(--wn);border-color:var(--wn)}.ald{background:var(--dgl);color:var(--dg);border-color:var(--dg)}.als{background:var(--scl);color:var(--sc);border-color:var(--sc)}
.tgl{display:flex;flex-wrap:wrap;gap:4px;margin-top:3px}
.tg{background:var(--acl);color:var(--ac);border:1px solid var(--br);border-radius:12px;padding:2px 8px;font-size:13px;display:flex;align-items:center;gap:3px}
.tg button{background:none;border:none;color:var(--dg);padding:0 2px;font-size:14px;line-height:1;cursor:pointer}
.anote{background:#fffef0;border:1px solid #d4c84a;border-radius:var(--r);padding:9px 11px;font-size:13px;color:#5a5200;font-style:italic;margin-top:10px}
.anote::before{content:"\2712 Autorská poznámka: ";font-weight:bold;font-style:normal}
.sbar{display:flex;gap:7px;margin-bottom:11px;align-items:center;flex-wrap:wrap}.sbar input{flex:1;min-width:140px}
#stbar{position:fixed;bottom:0;left:0;right:0;color:#fff;font-size:13px;padding:5px 15px;display:flex;align-items:center;gap:11px;z-index:200;display:none}
#stbar .stm{flex:1}#stbar button{background:none;border:none;color:#fff;cursor:pointer}
dialog{border:none;border-radius:var(--r);box-shadow:0 8px 32px rgba(0,0,0,.25);padding:0;max-width:640px;width:95%;max-height:90vh;overflow:hidden;display:flex;flex-direction:column}
dialog::backdrop{background:rgba(0,0,0,.5)}
.dh{background:var(--ac);color:#fff;padding:12px 16px;display:flex;align-items:center;gap:9px}
.dh h2{flex:1;font-size:1rem;font-weight:bold;font-family:var(--fn)}.dh button{background:none;border:none;color:#fff;font-size:18px;cursor:pointer}
.db{padding:16px;overflow-y:auto;flex:1}.df{padding:10px 16px;border-top:1px solid var(--br);display:flex;justify-content:flex-end;gap:7px;background:var(--bg)}
.sr{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
.sh{font-family:var(--fn);font-size:1.3rem;color:var(--ac);margin-bottom:13px}
.emp{text-align:center;color:var(--tx3);padding:26px 13px;font-style:italic}
hr{border:none;border-top:1px solid var(--br);margin:12px 0}
.xs{font-size:13px;color:var(--tx3)}.flex{display:flex;gap:7px;align-items:center;flex-wrap:wrap}
.jb{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:7px}
.mt8{margin-top:8px}.mt12{margin-top:12px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:580px){.g2{grid-template-columns:1fr}#layout{flex-direction:column}#side{width:100%;border-right:none;border-bottom:1px solid var(--br)}}
.ss{margin-bottom:17px}.ssh{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--tx3);font-weight:bold;margin-bottom:5px;padding:0 3px}
.da{background:#e6ffed;color:#1a6a2a}.dr{background:#ffeef0;color:#8a1a1a;text-decoration:line-through}.dc{background:#fff3cd;color:#7a5a00}

/* Poznámky */
.pnote{background:#fffef0;border:1px solid #d4c84a;border-radius:var(--r);padding:9px 12px;margin-bottom:7px;font-size:13px}
.pnote.vyrizena{background:#f5f5f5;border-color:var(--br);opacity:.7}
.pnote-hdr{display:flex;align-items:center;gap:7px;margin-bottom:5px;flex-wrap:wrap}
.pnote-txt{color:var(--tx2);white-space:pre-wrap;word-break:break-word}
.nbadge-n{background:#fff3cd;color:#7a5a00;border-radius:10px;padding:1px 8px;font-size:11px;font-weight:bold}
.nbadge-v{background:#e8f5e9;color:#1a6a2a;border-radius:10px;padding:1px 8px;font-size:11px}

/* Bulk operations */
.bulk-bar{background:var(--ac);color:#fff;padding:8px 12px;border-radius:var(--r);margin-bottom:10px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.bulk-bar .bc{font-size:13px;font-weight:bold}
.bulk-bar button{background:rgba(255,255,255,.2);color:#fff;border:1px solid rgba(255,255,255,.4);padding:4px 10px;font-size:13px}
.bulk-bar button:hover{background:rgba(255,255,255,.35)}
.bulk-bar .bcc{background:none;border:none;color:rgba(255,255,255,.8);cursor:pointer;font-size:13px;margin-left:auto}
table input[type=checkbox]{width:auto;cursor:pointer}
.sel-row td{background:var(--acl)!important}

/* Sidebar cards */
.sd-card{border:1px solid var(--br);border-radius:var(--r);margin-bottom:7px;background:var(--sf);overflow:hidden}
.sd-card.active{border-color:var(--ac);background:var(--acl)}
.sd-card-hdr{display:flex;align-items:center;gap:5px;padding:6px 9px;cursor:pointer;user-select:none}
.sd-card-hdr:hover{background:var(--bg2)}
.sd-card.active .sd-card-hdr{background:var(--acl)}
.sd-card-name{flex:1;font-size:13px;font-weight:bold;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sd-card-actions{display:flex;gap:4px;padding:4px 7px 7px;border-top:1px solid var(--br);flex-wrap:wrap}
.sd-card-actions button{font-size:11px;padding:3px 7px;flex:1;min-width:60px}
.sd-card-meta{padding:2px 9px 6px;font-size:11px;color:var(--tx3)}
</style>
</head>
<body>
<a href="#main" class="skip">Přejít na obsah</a>
<header id="hdr">
  <button id="toggle-side" onclick="toggleSide()" aria-label="Zobrazit/skrýt postranní panel" title="Postranní panel">☰</button>
  <h1>Správce datového katalogu úřadu</h1>
  <nav aria-label="Hlavní navigace">
    <button onclick="V('projekt')" id="nv-projekt">Projekt</button>
    <button onclick="V('slovniky')" id="nv-slovniky">Slovníky</button>
    <button onclick="V('pojmy')" id="nv-pojmy">Pojmy</button>
    <button onclick="V('ciselniky')" id="nv-ciselniky-hdr">Číselníky</button>
    <button onclick="V('hledat')" id="nv-hledat">Hledat</button>
    <button onclick="V('prehled')" id="nv-prehled">Verze&amp;změny</button>
    <button onclick="V('poznamky')" id="nv-poznamky">Poznámky</button>
  </nav>
</header>
<div id="layout">
  <aside id="side" aria-label="Postranní panel">
    <div class="ss"><div id="sd-proj" class="xs" style="padding:2px 0 8px"></div></div>
    <div class="ss">
      <div class="ssh" style="display:flex;justify-content:space-between;align-items:center">
        Slovníky
        <button class="bs sm" onclick="V('novySlovnik')" title="Nový slovník" style="padding:2px 7px;font-size:12px">+</button>
      </div>
      <div id="sd-sl"></div>
    </div>
    <div class="ss">
      <div class="ssh" style="display:flex;justify-content:space-between;align-items:center">
        Číselníky
        <button class="bs sm" onclick="V('novyCs')" title="Nový číselník" style="padding:2px 7px;font-size:12px">+</button>
      </div>
      <div id="sd-cs"></div>
    </div>
    <div class="ss" style="border-top:1px solid var(--br);padding-top:10px;margin-top:4px">
      <button class="bs sm" onclick="expProj()" style="width:100%;margin-bottom:4px">💾 Uložit projekt (.json)</button>
      <button class="bs sm" onclick="ghSave()" style="width:100%;margin-bottom:4px" title="Uložit do GitHub repozitáře">&#x2601; Uložit do GitHub</button>
      <button class="bs sm" onclick="document.getElementById('imp-f').click()" style="width:100%">📂 Načíst projekt</button>
      <input type="file" id="imp-f" accept=".json" style="display:none" onchange="doImpProj(event)">
    </div>
  </aside>
  <main id="main" aria-live="polite"></main>
</div>
<div id="stbar" role="status" aria-live="assertive"><span class="stm" id="stm"></span><button onclick="hideST()" aria-label="Zavřít">&#x2715;</button></div>
<dialog id="dlg" aria-labelledby="dlg-t" aria-modal="true" inert>
  <div class="dh"><h2 id="dlg-t"></h2><button onclick="cDlg()" aria-label="Zavřít dialog">&#x2715;</button></div>
  <div class="db" id="dlg-b"></div>
  <div class="df" id="dlg-f"></div>
</dialog>
<script>
// Odregistrace případného Service Workeru a vyčištění cache
if('serviceWorker' in navigator){
  navigator.serviceWorker.getRegistrations().then(function(regs){
    if(regs.length===0)return;
    Promise.all(regs.map(function(r){return r.unregister();}))
    .then(function(){return caches.keys();})
    .then(function(keys){return Promise.all(keys.map(function(k){return caches.delete(k);}));})
    .then(function(){location.reload();});
  });
}
// Auto-migrate: clear incompatible localStorage on first load of this version
(function(){
  try {
    if(localStorage.getItem('ofnv3_ver') !== 'v4') {
      localStorage.removeItem('ofnv3');
      localStorage.removeItem('ofnv3_ver');
    }
  } catch(e) {}
})();
// ── KONSTANTY ──
const TYPY=[
  {id:'Pojem',lbl:'Obecný pojem',ofn:['Koncept','Pojem']},
  {id:'TypObjektu',lbl:'Typ objektu práva',ofn:['Koncept','Pojem','Třída','Typ objektu práva']},
  {id:'TypSubjektu',lbl:'Typ subjektu práva',ofn:['Koncept','Pojem','Třída','Typ subjektu práva']},
  {id:'Vlastnost',lbl:'Vlastnost',ofn:['Koncept','Pojem','Vlastnost']},
  {id:'Vztah',lbl:'Vztah',ofn:['Koncept','Pojem','Vztah']},
  {id:'Trida',lbl:'Třída',ofn:['Koncept','Pojem','Třída']},
  {id:'VerejnyUdaj',lbl:'Veřejný údaj',ofn:['Koncept','Pojem','Veřejný údaj']},
  {id:'NeverejnyUdaj',lbl:'Neveřejný údaj',ofn:['Koncept','Pojem','Neveřejný údaj']},
];
const STAVY=[
  {id:'rozpracovany',lbl:'Rozpracovaný',c:'b0'},
  {id:'navrh',lbl:'Návrh',c:'b1'},
  {id:'projednavany',lbl:'Projednávaný',c:'b2'},
  {id:'ke-schvaleni',lbl:'Ke schválení',c:'b2'},
  {id:'schvaleny',lbl:'Schválený',c:'b3'},
  {id:'publikovany',lbl:'Publikovaný',c:'b4'},
  {id:'neaktualni',lbl:'Neaktuální',c:'b5'},
  {id:'zruseny',lbl:'Zrušený',c:'b6'},
  {id:'archivovany',lbl:'Archivovaný',c:'b5'},
];
const ZISK=[
  {id:'způsoby-získání:základních-registrů',lbl:'Ze základních registrů'},
  {id:'způsoby-získání:jiných-agend',lbl:'Z jiných agend'},
  {id:'způsoby-získání:vlastní',lbl:'Vlastní'},
  {id:'způsoby-získání:provozní',lbl:'Provozní'},
];
const OBS=[
  {id:'typy-obsahu:identifikační',lbl:'Identifikační'},
  {id:'typy-obsahu:evidenční',lbl:'Evidenční'},
  {id:'typy-obsahu:statistické',lbl:'Statistické'},
];
const SDIL=[
  {id:'způsoby-sdílení:veřejně-přístupné',lbl:'Veřejně přístupné'},
  {id:'způsoby-sdílení:poskytované-na-žádost',lbl:'Poskytované na žádost'},
  {id:'způsoby-sdílení:zpřístupňované-pro-výkon-agendy',lbl:'Zpřístupňované pro výkon agendy'},
  {id:'způsoby-sdílení:nesdílené',lbl:'Nesdílené'},
];
const UROVNE=[
  {id:'tezaurus',lbl:'Tezaurus',typ:['Slovník','Tezaurus'],hint:'Základní slovník s pojmy a jejich hierarchií (SKOS)'},
  {id:'konceptualni',lbl:'Konceptuální model',typ:['Slovník','Tezaurus','Konceptuální model'],hint:'Rozšíření o třídy, vlastnosti a vztahy (OWL/RDFS)'},
];
const XSD=[
  {id:'xsd:string',lbl:'xsd:string — text'},
  {id:'xsd:boolean',lbl:'xsd:boolean — pravda/nepravda'},
  {id:'xsd:integer',lbl:'xsd:integer — celé číslo'},
  {id:'xsd:decimal',lbl:'xsd:decimal — desetinné číslo'},
  {id:'xsd:double',lbl:'xsd:double — číslo s plovoucí desetinnou čárkou'},
  {id:'xsd:date',lbl:'xsd:date — datum'},
  {id:'xsd:dateTime',lbl:'xsd:dateTime — datum a čas'},
  {id:'xsd:time',lbl:'xsd:time — čas'},
  {id:'xsd:gYear',lbl:'xsd:gYear — rok'},
  {id:'xsd:duration',lbl:'xsd:duration — trvání'},
  {id:'xsd:anyURI',lbl:'xsd:anyURI — URI/IRI'},
  {id:'rdf:langString',lbl:'rdf:langString — text s jazykovým tagem'},
];
// ── STAV ──
let S={
  projekt:{nazev:'Nový projekt',popis:'',organizace:'',autor:'',email:'',orgIriBase:''},
  slovniky:[],ciselniky:[],akSl:null,akPj:null,akCs:null,akPl:null,
  _cA:null,_cB:null,_cSl:null,_cV:null
};
let VIEW='projekt';
// ── UTILS ──
const uid=()=>'i'+Math.random().toString(36).substr(2,8)+Date.now().toString(36);
const td=()=>new Date().toISOString().slice(0,10);
const e=s=>{if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')};
const tLbl=t=>{const x=TYPY.find(x=>x.id===t);return x?x.lbl:t};
const sLbl=s=>{const x=STAVY.find(x=>x.id===s);return x?x.lbl:s};
const sCls=s=>{const x=STAVY.find(x=>x.id===s);return x?x.c:'b1'};
const getSl=id=>S.slovniky.find(s=>s.id===id);
const getASl=()=>S.akSl?getSl(S.akSl):null;
const sos=(arr,cur,vf,lf)=>arr.map(x=>`<option value="${e(vf(x))}" ${cur===vf(x)?'selected':''}>${e(lf(x))}</option>`).join('');
const dl=(txt,nm,mt)=>{const b=new Blob([txt],{type:mt});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download=nm;a.click();URL.revokeObjectURL(u)};
const allPj=(slId,exId)=>{const r=[];S.slovniky.forEach(s=>s.pojmy.forEach(p=>{if(p.id!==exId)r.push({...p,_sn:s.nazev_cs,_ext:s.id!==slId})}));return r};
// ── PERSISTENCE ──
const saveL=()=>{try{localStorage.setItem('ofnv3',JSON.stringify(S));localStorage.setItem('ofnv3_ver',APP_VER);}catch(e){}};
const APP_VER='v4';
const loadL=()=>{
  try{
    const ver=localStorage.getItem('ofnv3_ver');
    const d=localStorage.getItem('ofnv3');
    if(d&&ver===APP_VER){
      S=JSON.parse(d);
      if(!S.ciselniky)S.ciselniky=[];
      if(!S.akCs)S.akCs=null;
      if(!S.akPl)S.akPl=null;
      if(!S.projekt.orgIriBase)S.projekt.orgIriBase='';
      // migrate poznamky on slovniky/pojmy
      S.slovniky.forEach(sl=>{
        if(!sl.poznamky)sl.poznamky=[];
        sl.pojmy.forEach(p=>{if(!p.poznamky)p.poznamky=[];});
      });
      S.ciselniky.forEach(c=>{
        if(!c.poznamky)c.poznamky=[];
        if(!c.polozky)c.polozky=[];
        c.polozky.forEach(p=>{if(!p.poznamky)p.poznamky=[];});
      });
    }
  }catch(ex){console.warn('loadL error',ex);}
};

function doImpProj(ev){

}

      p.textContent="Žádné číselníky.";csDiv.appendChild(p);
    }
    S.ciselniky.forEach(function(c){
      var isAkt=c.id===S.akCs;
      var nv=countNotes(c,"nevyrizena")+(c.polozky||[]).reduce(function(a,p){return a+countNotes(p,"nevyrizena");},0);

      var card=document.createElement("div");
      card.className="sd-card"+(isAkt?" active":"");

      var hdr=document.createElement("div");
      hdr.className="sd-card-hdr";
      hdr.setAttribute("role","button");hdr.setAttribute("tabindex","0");
      hdr.setAttribute("aria-current",isAkt?"true":"false");
      hdr.title=c.nazev_cs||"";
      hdr.addEventListener("click",function(){selCs(c.id);});
      hdr.addEventListener("keydown",function(ev){if(ev.key==="Enter"||ev.key===" "){ev.preventDefault();selCs(c.id);}});

      var nameSpan=document.createElement("span");
      nameSpan.className="sd-card-name";
      nameSpan.textContent=c.nazev_cs||"(bez názvu)";
      hdr.appendChild(nameSpan);

      if(nv){var nb=document.createElement("span");nb.className="nbadge-n";nb.textContent=nv;hdr.appendChild(nb);}

      var sb=document.createElement("span");
      sb.className="bdg "+sCls(c.stav);sb.style.fontSize="10px";sb.textContent=sLbl(c.stav);

      acts.appendChild(mkBtn("bs","+ Položka","Přidat položku",function(){S.akCs=c.id;V("novaPl",{cs:c.id});}));

  const s=getASl();if(!s)return vSl();
  const cnt={};TYPY.forEach(t=>{cnt[t.id]=0});s.pojmy.forEach(p=>{if(cnt[p.typ]!==undefined)cnt[p.typ]++;});
  return`<div class="jb" style="margin-bottom:13px"><h2 class="sh" style="margin:0">${e(s.nazev_cs)||'(bez názvu)'}</h2><div class="flex"><span class="bdg ${sCls(s.stav)}">${sLbl(s.stav)}</span><span class="xs">Verze ${e(s.ak_ver)}</span></div></div>
  <div class="panel"><div class="ptit">Metadata slovníku</div>
    <form onsubmit="savSl(event,'${s.id}')">${slForm(s)}<div class="bg"><button type="submit" class="bp">Uložit metadata</button><button type="button" class="bs" onclick="V('verze',{sl:'${s.id}'})">Správa verzí</button>
        <button type="button" class="bs" onclick="V('sestavaSl')">🖨 Sestava pojmů</button><button type="button" class="bs" onclick="expJLD('${s.id}')">Export JSON-LD</button><button type="button" class="bd" onclick="delSl('${s.id}')">Smazat slovník</button></div></form>
    ${noteWidget(s.poznamky||[],'sl:'+s.id)}
  </div>
  <div class="panel"><div class="jb" style="margin-bottom:10px"><div class="ptit" style="margin:0">Pojmy slovníku</div><button class="bp sm" onclick="V('novyPojem',{sl:'${s.id}'})">+ Přidat pojem</button></div>
    <div style="margin-bottom:9px">${TYPY.map(t=>cnt[t.id]>0?`<span class="tb t${t.id}" style="margin-right:3px">${t.lbl}: ${cnt[t.id]}</span>`:'').join('')||'<em class="xs">Žádné pojmy</em>'}</div>
    ${pjTbl(s)}
  </div>`;
}
function savSl(ev,id){ev.preventDefault();const f=ev.target;const s=getSl(id);if(!s)return;s.nazev_cs=f.nc.value.trim();s.nazev_en=f.ne.value.trim();s.iri=f.iri.value.trim();s.popis_cs=f.pc.value.trim();s.popis_en=f.pe.value.trim();s.stav=f.stav.value;s.uroven=f.uroven.value;s.organizace=f.org.value.trim();s.autor=f.aut.value.trim();s.aktualizovano=td();saveL();toast('Slovník uložen.');render();}
function pjTbl(s){
  if(!s.pojmy.length)return'<p class="emp">Slovník nemá žádné pojmy.</p>';
  const slId=s.id||S.akSl;
  return`<div>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:7px">
      <label class="cbl xs"><input type="checkbox" id="sel-all-pj" onchange="selAllPj(this,'${slId}')"> Vybrat vše</label>
      <button class="bs sm" onclick="showBulkPj('${slId}')" id="bulk-pj-btn" style="display:none">Hromadná akce…</button>
    </div>
    <div id="bulk-pj-bar" style="display:none"></div>
    <div class="tw"><table id="pj-tbl-${slId}"><thead><tr>
      <th style="width:32px"></th>
      <th>Název (CS)</th><th>Typ a stav</th><th>Definice</th><th>IRI</th><th>Akce</th>
    </tr></thead><tbody>
    ${s.pojmy.map(p=>`<tr id="pjr-${p.id}">
      <td><input type="checkbox" class="pj-cb" data-slid="${slId}" data-pjid="${p.id}" onchange="onPjCb('${slId}')" aria-label="Vybrat pojem ${e(p.nc||'?')}"></td>
      <td><a href="#" onclick="selPj('${p.id}');return false"><strong>${e(p.nc)||'?'}</strong></a>${p.ne?`<br><span class="xs">${e(p.ne)}</span>`:''}${p.ac&&p.ac.length?`<br><span class="xs">Syn: ${p.ac.join(', ')}</span>`:''}</td>
      <td><span class="tb t${e(p.typ)}">${tLbl(p.typ)}</span><br><span class="bdg ${sCls(p.stav||'rozpracovany')}">${sLbl(p.stav||'rozpracovany')}</span></td>
      <td><span class="xs">${e((p.dc||'').substring(0,80))}${(p.dc||'').length>80?'…':''}</span></td>
      <td>${p.iri?`<span class="xs" title="${e(p.iri)}">✓</span>`:'<span class="xs" style="color:var(--wn)">!</span>'}</td>
      <td><button class="bs sm" onclick="selPj('${p.id}')">Upravit</button> <button class="bd sm" onclick="delPj('${slId}','${p.id}')">✕</button></td>
    </tr>`).join('')}
    </tbody></table></div>
  </div>`;
}
function selAllPj(cb,slId){
  document.querySelectorAll('.pj-cb[data-slid="'+slId+'"]').forEach(c=>{c.checked=cb.checked;const row=document.getElementById('pjr-'+c.getAttribute('data-pjid'));if(row)row.classList.toggle('sel-row',cb.checked);});
  onPjCb(slId);
}
function onPjCb(slId){
  const sel=document.querySelectorAll('.pj-cb[data-slid="'+slId+'"]:checked');
  const btn=document.getElementById('bulk-pj-btn');
  if(btn)btn.style.display=sel.length?'':'none';
}
function getSelPjIds(slId){
  return [...document.querySelectorAll('.pj-cb[data-slid="'+slId+'"]:checked')].map(c=>c.getAttribute('data-pjid'));
}
function showBulkPj(slId){
  const ids=getSelPjIds(slId);if(!ids.length)return;
  const bar=document.getElementById('bulk-pj-bar');if(!bar)return;
  bar.style.display='';
  bar.innerHTML=`<div class="bulk-bar" role="region" aria-label="Hromadné operace">
    <span class="bc">Vybráno: ${ids.length} pojmů</span>
    <button onclick="bulkPjStav('${slId}')">Změnit stav</button>
    <button onclick="bulkPjTyp('${slId}')">Změnit typ</button>
    <button onclick="bulkPjEli('${slId}')">Přidat legislativní ustanovení</button>
    <button onclick="bulkPjNleg('${slId}')">Přidat nelegislativní zdroj</button>
    <button onclick="bulkPjNote('${slId}')">Přidat autorskou poznámku</button>
    <button onclick="bulkPjDel('${slId}')" style="background:rgba(220,50,50,.35)">Smazat vybrané</button>
    <button class="bcc" onclick="document.getElementById('bulk-pj-bar').style.display='none'">✕ Zavřít</button>
  </div>`;
}
function bulkPjStav(slId){
  const ids=getSelPjIds(slId);if(!ids.length)return;
  oDlg('Změnit stav vybraných pojmů',
    `<div class="fg"><label for="bulk-stav">Nový stav</label><select id="bulk-stav">${sos(STAVY,'rozpracovany',x=>x.id,x=>x.lbl)}</select></div>
     <p class="xs" style="margin-top:8px">Bude aplikováno na ${ids.length} pojmů.</p>`,
    `<button class="bp" onclick="doBulkPjStav('${slId}')">Použít</button><button class="bs" onclick="cDlg()">Zrušit</button>`);
}
function doBulkPjStav(slId){
  const s=getSl(slId);if(!s)return;
  const ids=getSelPjIds(slId);
  const stav=document.getElementById('bulk-stav').value;
  ids.forEach(id=>{const p=s.pojmy.find(x=>x.id===id);if(p)p.stav=stav;});
  s.aktualizovano=td();saveL();cDlg();toast('Stav upraven pro '+ids.length+' pojmů.');render();
}
function bulkPjTyp(slId){
  const ids=getSelPjIds(slId);if(!ids.length)return;
  oDlg('Změnit typ vybraných pojmů',
    `<div class="fg"><label for="bulk-typ">Nový typ</label><select id="bulk-typ">${sos(TYPY,'Pojem',x=>x.id,x=>x.lbl)}</select></div>
     <p class="xs" style="margin-top:8px">Bude aplikováno na ${ids.length} pojmů.</p>`,
    `<button class="bp" onclick="doBulkPjTyp('${slId}')">Použít</button><button class="bs" onclick="cDlg()">Zrušit</button>`);
}
function doBulkPjTyp(slId){
  const s=getSl(slId);if(!s)return;
  const ids=getSelPjIds(slId);
  const typ=document.getElementById('bulk-typ').value;
  ids.forEach(id=>{const p=s.pojmy.find(x=>x.id===id);if(p)p.typ=typ;});

}
function bulkPjEli(slId){
  const ids=getSelPjIds(slId);if(!ids.length)return;
  oDlg('Přidat legislativní ustanovení',
    `<div class="fg"><label>Rok a číslo předpisu</label>
      <div class="ir"><input type="number" id="bulk-eli-rok" placeholder="Rok" min="1918" max="2099" style="width:100px;flex:none">
      <input type="number" id="bulk-eli-cis" placeholder="Číslo" min="1"></div></div>
     <div class="fg"><label for="bulk-eli-druh">Typ ustanovení</label>
       <select id="bulk-eli-druh"><option value="def">Definující</option><option value="souv">Související</option></select></div>
     <p class="xs" style="margin-top:8px">Bude přidáno k ${ids.length} pojmům.</p>`,
    `<button class="bp" onclick="doBulkPjEli('${slId}')">Přidat</button><button class="bs" onclick="cDlg()">Zrušit</button>`);
}
function doBulkPjEli(slId){
  const s=getSl(slId);if(!s)return;
  const ids=getSelPjIds(slId);
  const rok=document.getElementById('bulk-eli-rok').value;
  const cis=document.getElementById('bulk-eli-cis').value;
  if(!rok||!cis){toast('Vyplňte rok a číslo.','w');return;}
  const iri=eliToOFN(rok,cis,'aktualni','');
  const druh=document.getElementById('bulk-eli-druh').value;
  ids.forEach(id=>{
    const p=s.pojmy.find(x=>x.id===id);if(!p)return;
    if(druh==='def'){if(!p.dus)p.dus=[];if(!p.dus.includes(iri))p.dus.push(iri);}
    else{if(!p.sus)p.sus=[];if(!p.sus.includes(iri))p.sus.push(iri);}
  });
  s.aktualizovano=td();saveL();cDlg();toast('Ustanovení přidáno k '+ids.length+' pojmům.');render();
}
function bulkPjNleg(slId){
  const ids=getSelPjIds(slId);if(!ids.length)return;
  oDlg('Přidat nelegislativní zdroj',
    `<div class="fg"><label for="bulk-nleg-n">Název zdroje</label><input type="text" id="bulk-nleg-n" placeholder="Název dokumentu…"></div>
     <div class="fg"><label for="bulk-nleg-u">URL zdroje</label><input type="url" id="bulk-nleg-u" placeholder="https://…"></div>
     <div class="fg"><label for="bulk-nleg-t">Typ</label><select id="bulk-nleg-t"><option value="def">Definující</option><option value="souv">Související</option></select></div>
     <p class="xs" style="margin-top:8px">Bude přidáno k ${ids.length} pojmům.</p>`,
    `<button class="bp" onclick="doBulkPjNleg('${slId}')">Přidat</button><button class="bs" onclick="cDlg()">Zrušit</button>`);
}
function doBulkPjNleg(slId){
  const s=getSl(slId);if(!s)return;
  const ids=getSelPjIds(slId);
  const n=document.getElementById('bulk-nleg-n').value.trim();
  const u=document.getElementById('bulk-nleg-u').value.trim();
  if(!n&&!u){toast('Vyplňte alespoň název nebo URL.','w');return;}
  const zdroj={n,u};
  const druh=document.getElementById('bulk-nleg-t').value;
  ids.forEach(id=>{
    const p=s.pojmy.find(x=>x.id===id);if(!p)return;
    if(druh==='def'){if(!p.dnl)p.dnl=[];p.dnl.push({...zdroj});}
    else{if(!p.snl)p.snl=[];p.snl.push({...zdroj});}
  });
  s.aktualizovano=td();saveL();cDlg();toast('Zdroj přidán k '+ids.length+' pojmům.');render();
}
function bulkPjNote(slId){
  const ids=getSelPjIds(slId);if(!ids.length)return;
  oDlg('Přidat autorskou poznámku',
    `<div class="fg"><label for="bulk-note">Text poznámky</label><textarea id="bulk-note" style="min-height:80px" placeholder="Text autorské poznámky…"></textarea></div>
     <p class="xs" style="margin-top:8px">Bude přidána k ${ids.length} pojmům.</p>`,
    `<button class="bp" onclick="doBulkPjNote('${slId}')">Přidat</button><button class="bs" onclick="cDlg()">Zrušit</button>`);
}
function doBulkPjNote(slId){
  const s=getSl(slId);if(!s)return;
  const ids=getSelPjIds(slId);
  const txt=document.getElementById('bulk-note').value.trim();
  if(!txt){toast('Zadejte text poznámky.','w');return;}
  ids.forEach(id=>{
    const p=s.pojmy.find(x=>x.id===id);if(!p)return;
    if(!p.poznamky)p.poznamky=[];
    p.poznamky.push(mkNote(txt));
  });
  s.aktualizovano=td();saveL();cDlg();toast('Poznámka přidána k '+ids.length+' pojmům.');render();
}

function vPojmy(){
  const s=getASl();if(!s)return`<h2 class="sh">Pojmy</h2><div class="al ali">Vyberte slovník v levém panelu.</div>`;
  return`<div class="jb" style="margin-bottom:10px"><h2 class="sh" style="margin:0">Pojmy: ${e(s.nazev_cs)}</h2><div class="flex"><button class="bp" onclick="V('novyPojem',{sl:'${s.id}'})">+ Přidat pojem</button> <button class="bs" onclick="V('importCsvPj')">&#x2B06; Import CSV/TSV</button></div></div>
  <div class="panel">
    <div class="sbar"><label for="ps" class="sr">Hledat</label><input type="text" id="ps" placeholder="Hledat pojmy…" oninput="filtPj(this.value,'${s.id}')">
    <label for="pt">Typ: <select id="pt" onchange="filtPj(document.getElementById('ps').value,'${s.id}')"><option value="">Vše</option>${TYPY.map(t=>`<option value="${t.id}">${t.lbl}</option>`).join('')}</select></label>
    <label for="ps-stav">Stav: <select id="ps-stav" onchange="filtPj(document.getElementById('ps').value,'${s.id}')"><option value="">Vše</option>${STAVY.map(st=>`<option value="${st.id}">${st.lbl}</option>`).join('')}</select></label>
    <button class="bp sm" onclick="V('novyPojem',{sl:'${s.id}'})">+ Přidat pojem</button></div>
    <div id="pa">${pjTbl(s)}</div>
  </div>`;
}
function filtPj(q,slId){const s=getSl(slId);if(!s)return;const tf=document.getElementById('pt')?.value||'';const sf=document.getElementById('ps-stav')?.value||'';const ql=q.toLowerCase();const fs={id:s.id,pojmy:s.pojmy.filter(p=>{const mt=!tf||p.typ===tf;const ms=!sf||(p.stav||'rozpracovany')===sf;const mq=!ql||(p.nc||'').toLowerCase().includes(ql)||(p.ne||'').toLowerCase().includes(ql)||(p.dc||'').toLowerCase().includes(ql)||(p.ac||[]).some(a=>a.toLowerCase().includes(ql));return mt&&ms&&mq;})};const a=document.getElementById('pa');if(a)a.innerHTML=pjTbl(fs);}

function vNovPj(){const s=getASl();if(!s)return'<p>Nejprve vyberte slovník.</p>';return`<h2 class="sh">Nový pojem — ${e(s.nazev_cs)}</h2><div class="panel"><form onsubmit="crPj(event,'${s.id}')"><div class="fg"><label for="np-t">Typ pojmu <span class="req" aria-hidden="true">*</span></label><select id="np-t" name="typ">${TYPY.map(t=>`<option value="${t.id}">${t.lbl}</option>`).join('')}</select></div><div id="pj-form-area">${pjForm(mkPj(),s,false)}</div><div class="bg"><button type="submit" class="bp">Vytvořit pojem</button><button type="button" class="bs" onclick="V('editSlovnik')">Zrušit</button></div></form></div>`;}
function crPj(ev,slId){ev.preventDefault();const s=getSl(slId);if(!s)return;const p=colPj(ev.target,slId);if(p.typ==='NeverejnyUdaj'&&(!p.nus||!p.nus.length)){toast('Upozornění: Neveřejný údaj vyžaduje alespoň jedno ustanovení dokládající neveřejnost.','w');}if(!p.iri&&s.iri)p.iri=suggestPojemIri(p.nc,s.iri);s.pojmy.push(p);s.aktualizovano=td();S.akPj=p.id;saveL();toast('Pojem přidán.');V('pojmy');}
// ── VIEW: EDITACE POJMU ──
function selPj(id){S.akPj=id;V('editPojem');}
function vEdPj(){
  const s=getASl();if(!s)return'<p>Vyberte slovník.</p>';const p=s.pojmy.find(x=>x.id===S.akPj);if(!p)return'<p>Pojem nenalezen.</p>';
  return`<div class="jb" style="margin-bottom:10px"><h2 class="sh" style="margin:0">${e(p.nc)||'(bez názvu)'}</h2><span class="tb t${e(p.typ)}">${tLbl(p.typ)}</span></div>
  <div class="panel"><form onsubmit="savPj(event,'${s.id}','${p.id}')"><div class="fg"><label for="ep-t">Typ pojmu</label><select id="ep-t" name="typ">${sos(TYPY,p.typ,x=>x.id,x=>x.lbl)}</select></div>
  ${pjForm(p,s,true)}<div class="bg"><button type="submit" class="bp">Uložit pojem</button><button type="button" class="bd" onclick="delPj('${s.id}','${p.id}')">Smazat</button><button type="button" class="bs" onclick="V('editSlovnik')">Zpět</button></div></form>
  ${noteWidget(p.poznamky||[],'pj:'+s.id+':'+p.id)}
  </div>`;
}
function savPj(ev,slId,pId){ev.preventDefault();const s=getSl(slId);if(!s)return;const i=s.pojmy.findIndex(x=>x.id===pId);if(i<0)return;const u=colPj(ev.target,slId);u.id=pId;if(u.typ==='NeverejnyUdaj'&&(!u.nus||!u.nus.length)){toast('Upozornění: Neveřejný údaj vyžaduje alespoň jedno ustanovení dokládající neveřejnost.','w');}if(!u.iri&&s.iri)u.iri=suggestPojemIri(u.nc,s.iri);s.pojmy[i]=u;s.aktualizovano=td();saveL();toast('Pojem uložen.');render();}
function delPj(slId,pId){const p=getSl(slId)?.pojmy.find(x=>x.id===pId);oDlg('Smazat pojem',`<p>Smazat pojem <strong>${e(p?p.nc:pId)}</strong>?</p>`,`<button class="bd" onclick="cfDelPj('${slId}','${pId}')">Ano, smazat</button><button class="bs" onclick="cDlg()">Zrušit</button>`);}
function cfDelPj(slId,pId){const s=getSl(slId);if(s){s.pojmy=s.pojmy.filter(p=>p.id!==pId);s.aktualizovano=td();if(S.akPj===pId)S.akPj=null;}saveL();cDlg();toast('Pojem smazán.');V('editSlovnik');}

function typSp(p,s,all){
  const t=p.typ;let h='';
  const tridy=all.filter(a=>['Trida','TypObjektu','TypSubjektu'].includes(a.typ));
  const R='<span class="req" aria-hidden="true">*</span>';
  if(t==='Vlastnost'||t==='Vztah'){
    if(t==='Vlastnost'){
      h+=`<div class="fg"><label for="pf-ov">Datový typ (obor hodnot) ${R} <span class="hint">(xsd:string, xsd:boolean…)</span></label>
        <div class="ir"><input type="text" id="pf-ov" name="ov" value="${e(p.ov)}" required placeholder="xsd:string" list="xsd-list"></div>
        <datalist id="xsd-list">${XSD.map(x=>`<option value="${x.id}">${x.lbl}</option>`).join('')}</datalist></div>`;
    }else{
      h+=`<div class="fg"><label>Cílová třída (obor hodnot) ${R}</label>
        <select name="ov" required onchange="document.querySelector('[name=ov_h]').value=this.value">
          <option value="${e(p.ov)}">${p.ov?e(all.find(a=>(a.iri||a.id)===p.ov)?.nc||p.ov):'— vyberte třídu —'}</option>
          ${tridy.filter(a=>(a.iri||a.id)!==p.ov).map(a=>`<option value="${e(a.iri||a.id)}">[${tLbl(a.typ)}] ${e(a.nc)}</option>`).join('')}
          ${!tridy.length?'<option disabled>— žádné třídy v projektu —</option>':''}
        </select></div>`;
    }
    h+=`<div class="fg"><label>Zdrojová třída (definiční obor) ${R}</label>
      <select name="dob" required onchange="document.querySelector('[name=dob_h]').value=this.value">
        <option value="${e(p.dob)}">${p.dob?e(all.find(a=>(a.iri||a.id)===p.dob)?.nc||p.dob):'— vyberte třídu —'}</option>
        ${tridy.filter(a=>(a.iri||a.id)!==p.dob).map(a=>`<option value="${e(a.iri||a.id)}">[${tLbl(a.typ)}] ${e(a.nc)}</option>`).join('')}
        ${!tridy.length?'<option disabled>— žádné třídy v projektu —</option>':''}
      </select></div>`;
    if(t==='Vlastnost')h+=`<div class="fg"><label>Nadřazená vlastnost</label><select name="nviri"><option value="">— žádná —</option>${all.filter(x=>x.typ==='Vlastnost').map(a=>`<option value="${e(a.iri||a.id)}" ${(p.nv||[]).includes(a.iri||a.id)?'selected':''}>${e(a.nc)}</option>`).join('')}</select></div>`;
    if(t==='Vztah')h+=`<div class="fg"><label>Nadřazený vztah</label><select name="nvziri"><option value="">— žádný —</option>${all.filter(x=>x.typ==='Vztah').map(a=>`<option value="${e(a.iri||a.id)}" ${(p.nvz||[]).includes(a.iri||a.id)?'selected':''}>${e(a.nc)}</option>`).join('')}</select></div>`;
  }
  if(t==='Trida'){
    h+=`<div class="fg"><label>Nadřazená třída</label><select name="ntiri"><option value="">— žádná —</option>${all.filter(x=>x.typ==='Trida').map(a=>`<option value="${e(a.iri||a.id)}" ${(p.nt||[]).includes(a.iri||a.id)?'selected':''}>${e(a.nc)}</option>`).join('')}</select></div>
    <fieldset style="margin-top:7px"><legend>Číselník (instance třídy)</legend>
      <div class="fg"><label for="pf-ci">IRI číselníku <span class="hint">(nebo vyberte z projektu)</span></label>
      <div class="ir"><input type="url" id="pf-ci" name="ci" value="${e(p.ci)}" placeholder="https://...">
      ${(S.ciselniky||[]).length?`<select aria-label="Vybrat číselník" onchange="selCiselnikDoPojmu(this.value);this.value=''"><option value="">← z projektu</option>${(S.ciselniky||[]).map(c=>`<option value="${e(c.id)}">${e(c.nazev_cs)}</option>`).join('')}</select>`:''}</div></div>
      <div class="fg"><label for="pf-cn">Datová sada v NKOD</label><input type="url" id="pf-cn" name="cn" value="${e(p.cn)}" placeholder="https://data.gov.cz/zdroj/datové-sady/..."></div>
    </fieldset>`;
  }
  if(t==='TypObjektu'||t==='TypSubjektu'){
    h+=`<div class="fg"><label for="pf-ag">Agenda (IRI)</label><input type="url" id="pf-ag" name="ag" value="${e(p.ag)}" placeholder="https://..."></div>
    <div class="fg"><label for="pf-ais">AIS (IRI)</label><input type="url" id="pf-ais" name="ais" value="${e(p.ais)}" placeholder="https://..."></div>`;
  }
  if(t==='NeverejnyUdaj')h+=`<div class="fg"><label>Ustanovení neveřejnosti <span class="req" aria-hidden="true">*</span></label>${iriW('nu',p.nus||[],true)}</div>`;
  return h;
}


function iriW(k,items,isEli=false){

    ${isEli
      ? `<span style="flex:1;font-size:13px;padding:6px 4px;color:var(--tx2)" title="${e(v)}">${e(parseEli(v))}</span>
         <a href="${e(eliToEsbirkaUrl(v))}" target="_blank" rel="noopener" class="bs sm" style="text-decoration:none;white-space:nowrap;flex-shrink:0" title="Otevřít v e-Sbírce" aria-label="Otevřít v e-Sbírce">🔗</a>`
      : `<input type="url" value="${e(v)}" aria-label="IRI ${i+1}" data-ik="${k}" data-ii="${i}">`}
    <button type="button" class="bd sm" onclick="rmIri('${k}',${i})" aria-label="Odebrat">&#x2715;</button>
  </div>`).join('')}</div>
  <div class="ir mt8">
    <input type="url" id="niri-${k}" placeholder="${isEli?'https://opendata.eselpoint.cz/esel-esb/eli/cz/sb/rok/cislo/datum/dokument/norma/...':'https://'}" aria-label="Nová IRI">
    ${isEli?`<button type="button" class="bs sm" onclick="eliDialog('irilist|${k}')" title="Průvodce ELI">⚖ ELI…</button>`:''}
    <button type="button" class="bs sm" onclick="addIri('${k}')">Přidat</button>
  </div>
  <input type="hidden" id="irh-${k}" name="${k}" value="${e(JSON.stringify(items))}">`;
}
function addIri(k){const i=document.getElementById('niri-'+k);if(!i||!i.value.trim())return;const h=document.getElementById('irh-'+k);const l=JSON.parse(h.value||'[]');l.push(i.value.trim());h.value=JSON.stringify(l);i.value='';rrIri(k,l);}
function rmIri(k,i){const h=document.getElementById('irh-'+k);const l=JSON.parse(h.value||'[]');l.splice(i,1);h.value=JSON.stringify(l);rrIri(k,l);}
function rrIri(k,l){
  const c=document.getElementById('iw-'+k);if(!c)return;
  const isEliKey=(k==='du'||k==='su'||k==='nu');
  c.innerHTML=l.map((v,i)=>{
    if(isEliKey){
      return '<div class="ir" style="margin-bottom:4px" role="listitem">'
        +'<span style="flex:1;font-size:13px;padding:6px 4px;color:var(--tx2)" title="'+e(v)+'">'+e(parseEli(v))+'</span>'
        +'<a href="'+e(eliToEsbirkaUrl(v))+'" target="_blank" rel="noopener" class="bs sm" style="text-decoration:none;white-space:nowrap;flex-shrink:0" title="Otevřít v e-Sbírce">&#x1F517;</a>'
        +'<button type="button" class="bd sm" onclick="rmIri(&quot;'+k+'&quot;,'+i+')" aria-label="Odebrat">&#x2715;</button>'
        +'</div>';
    }
    return '<div class="ir" style="margin-bottom:4px" role="listitem">'
      +'<input type="url" value="'+e(v)+'" aria-label="IRI '+(i+1)+'" data-ik="'+k+'" data-ii="'+i+'">'
      +'<button type="button" class="bd sm" onclick="rmIri(&quot;'+k+'&quot;,'+i+')" aria-label="Odebrat">&#x2715;</button>'
      +'</div>';
  }).join('');
}
function gIri(k){const h=document.getElementById('irh-'+k);if(!h)return[];const l=JSON.parse(h.value||'[]');document.querySelectorAll(`[data-ik="${k}"]`).forEach(inp=>{const i=+inp.getAttribute('data-ii');if(!isNaN(i))l[i]=inp.value.trim();});return l.filter(Boolean);}
function nlW(k,items){
  return`<div id="nw-${k}" role="list">${items.map((z,i)=>`<div style="border:1px solid var(--br);border-radius:var(--r);padding:8px;margin-bottom:5px" role="listitem">
    <div class="fg"><label for="nl-${k}-${i}-n">Název zdroje</label><input type="text" id="nl-${k}-${i}-n" value="${e(z.n||z.nazev_cs||'')}" data-nk="${k}" data-ni="${i}" data-nf="n"></div>
    <div class="fg"><label for="nl-${k}-${i}-p">Popis zdroje</label><input type="text" id="nl-${k}-${i}-p" value="${e(z.p||z.popis_cs||'')}" data-nk="${k}" data-ni="${i}" data-nf="p"></div>
    <div class="fg"><label for="nl-${k}-${i}-u">URL</label><input type="url" id="nl-${k}-${i}-u" value="${e(z.u||z.url||'')}" data-nk="${k}" data-ni="${i}" data-nf="u"></div>
    <button type="button" class="bd sm" onclick="rmNl('${k}',${i})">Odebrat</button></div>`).join('')}</div>
  <button type="button" class="bs sm" onclick="addNl('${k}')">+ Přidat nelegislativní zdroj</button>
  <input type="hidden" id="nlh-${k}" name="${k}" value="${e(JSON.stringify(items))}">`;
}
function addNl(k){const h=document.getElementById('nlh-'+k);const l=JSON.parse(h.value||'[]');l.push({n:'',u:''});h.value=JSON.stringify(l);const c=document.getElementById('nw-'+k);const i=l.length-1;const d=document.createElement('div');d.style.cssText='border:1px solid var(--br);border-radius:var(--r);padding:8px;margin-bottom:5px';d.setAttribute('role','listitem');d.innerHTML=`<div class="fg"><label for="nl-${k}-${i}-n">Název zdroje</label><input type="text" id="nl-${k}-${i}-n" data-nk="${k}" data-ni="${i}" data-nf="n"></div><div class="fg"><label for="nl-${k}-${i}-p">Popis zdroje</label><input type="text" id="nl-${k}-${i}-p" data-nk="${k}" data-ni="${i}" data-nf="p"></div><div class="fg"><label for="nl-${k}-${i}-u">URL</label><input type="url" id="nl-${k}-${i}-u" data-nk="${k}" data-ni="${i}" data-nf="u"></div><button type="button" class="bd sm" onclick="rmNl('${k}',${i})">Odebrat</button>`;c.appendChild(d);}
function rmNl(k,i){const h=document.getElementById('nlh-'+k);const l=syncNl(k);l.splice(i,1);h.value=JSON.stringify(l);const c=document.getElementById('nw-'+k);c.innerHTML=l.map((z,j)=>`<div style="border:1px solid var(--br);border-radius:var(--r);padding:8px;margin-bottom:5px" role="listitem"><div class="fg"><label for="nl-${k}-${j}-n">Název zdroje</label><input type="text" id="nl-${k}-${j}-n" value="${e(z.n||'')}" data-nk="${k}" data-ni="${j}" data-nf="n"></div><div class="fg"><label for="nl-${k}-${j}-p">Popis zdroje</label><input type="text" id="nl-${k}-${j}-p" value="${e(z.p||'')}" data-nk="${k}" data-ni="${j}" data-nf="p"></div><div class="fg"><label for="nl-${k}-${j}-u">URL</label><input type="url" id="nl-${k}-${j}-u" value="${e(z.u||'')}" data-nk="${k}" data-ni="${j}" data-nf="u"></div><button type="button" class="bd sm" onclick="rmNl('${k}',${j})">Odebrat</button></div>`).join('');}
function syncNl(k){const h=document.getElementById('nlh-'+k);if(!h)return[];const l=JSON.parse(h.value||'[]');document.querySelectorAll(`[data-nk="${k}"]`).forEach(inp=>{const i=+inp.getAttribute('data-ni'),f=inp.getAttribute('data-nf');if(!isNaN(i)&&l[i])l[i][f]=inp.value.trim();});return l;}
function gNl(k){return syncNl(k).filter(z=>z.n||z.u);}
function addAl(lang){const i=document.getElementById('nal-'+lang);if(!i||!i.value.trim())return;const h=document.getElementById('alh-'+lang);const l=JSON.parse(h.value||'[]');l.push(i.value.trim());h.value=JSON.stringify(l);i.value='';rrAl(lang,l);}
function rmAl(lang,i){const h=document.getElementById('alh-'+lang);const l=JSON.parse(h.value||'[]');l.splice(i,1);h.value=JSON.stringify(l);rrAl(lang,l);}
function rrAl(lang,l){const c=document.getElementById('al-'+lang);if(!c)return;c.innerHTML=l.map((a,i)=>`<span class="tg" role="listitem">${e(a)}<button type="button" onclick="rmAl('${lang}',${i})" aria-label="Odebrat ${e(a)}">&#x2715;</button></span>`).join('');}
function gAl(lang){const h=document.getElementById('alh-'+lang);return h?JSON.parse(h.value||'[]'):[];}
function gCb(f,n){const r=[];f.querySelectorAll(`input[name="${n}"]:checked`).forEach(cb=>r.push(cb.value));return r;}
function gV(f,n){const el=f.querySelector(`[name="${n}"]`);return el?el.value.trim():'';}
function gCh(f,n){const el=f.querySelector(`[name="${n}"]`);return el?el.checked:false;}
function colPj(f,slId){
  const ni=gV(f,'nadiri'),nvi=gV(f,'nviri'),nvzi=gV(f,'nvziri'),nti=gV(f,'ntiri');
  return mkPj({
    typ:gV(f,'typ')||'Pojem',stav:gV(f,'stav')||'rozpracovany',iri:gV(f,'iri'),nc:gV(f,'nc'),ne:gV(f,'ne'),
    ac:gAl('cs'),ae:gAl('en'),sn:gAl('sn'),pc:gV(f,'pc'),pe:gV(f,'pe'),dc:gV(f,'dc'),de:gV(f,'de'),
    dus:gIri('du'),sus:gIri('su'),dnl:gNl('dn'),snl:gNl('sn'),
    ekv:gIri('ek'),nad:ni?[ni]:[],ppdf:gCh(f,'ppdf'),
    zz:gV(f,'zz'),to:gV(f,'to'),zs:gCb(f,'zs'),
    ov:gV(f,'ov'),dob:gV(f,'dob'),
    nv:nvi?[nvi]:[],nvz:nvzi?[nvzi]:[],nt:nti?[nti]:[],
    ag:gV(f,'ag'),ais:gV(f,'ais'),ci:gV(f,'ci'),cn:gV(f,'cn'),
    nus:gIri('nu'),ap:gV(f,'ap'),
  });
}

function vHled(){
  return`<h2 class="sh">Hledání napříč projektem</h2>
  <div class="panel">
    <div class="sbar"><label for="gs" class="sr">Hledat</label><input type="text" id="gs" placeholder="Hledat pojmy ve všech slovnících…" oninput="gSrch(this.value)" autofocus>
    <label for="gt">Typ: <select id="gt" onchange="gSrch(document.getElementById('gs').value)"><option value="">Vše</option>${TYPY.map(t=>`<option value="${t.id}">${t.lbl}</option>`).join('')}</select></label>
    <label for="gsl">Slovník: <select id="gsl" onchange="gSrch(document.getElementById('gs').value)"><option value="">Všechny</option>${S.slovniky.map(s=>`<option value="${s.id}">${e(s.nazev_cs)}</option>`).join('')}</select></label></div>
    <div id="gr"><p class="emp">Začněte psát…</p></div>
  </div>`;
}
function gSrch(q){
  const tf=document.getElementById('gt')?.value||'',sf=document.getElementById('gsl')?.value||'',ql=q.toLowerCase().trim(),res=[];
  S.slovniky.forEach(s=>{if(sf&&s.id!==sf)return;s.pojmy.forEach(p=>{if(tf&&p.typ!==tf)return;if(!ql){res.push({s,p});return;}const hay=[p.nc,p.ne,p.dc,p.de,p.pc,p.pe,...(p.ac||[]),...(p.ae||[])].join(' ').toLowerCase();if(hay.includes(ql))res.push({s,p});});});
  const a=document.getElementById('gr');if(!a)return;
  if(!res.length){a.innerHTML='<p class="emp">Žádné výsledky.</p>';return;}
  a.innerHTML=`<p class="xs" style="margin-bottom:7px">Nalezeno: ${res.length} pojmů</p><div class="tw"><table><thead><tr><th>Název</th><th>Typ</th><th>Slovník</th><th>Definice</th><th>Akce</th></tr></thead><tbody>
  ${res.map(({s,p})=>`<tr><td><strong>${e(p.nc)}</strong>${p.ne?`<br><span class="xs">${e(p.ne)}</span>`:''}</td><td><span class="tb t${e(p.typ)}">${tLbl(p.typ)}</span> <span class="bdg ${sCls(p.stav||'rozpracovany')}">${sLbl(p.stav||'rozpracovany')}</span></td><td>${e(s.nazev_cs)}</td><td class="xs">${e((p.dc||'').substring(0,100))}${(p.dc||'').length>100?'…':''}</td><td><button class="bs sm" onclick="S.akSl='${s.id}';selPj('${p.id}')">Otevřít</button></td></tr>`).join('')}</tbody></table></div>`;
}

function vPrehled(){
  const s=getASl();
  return`<h2 class="sh">Verze a přehled změn</h2>
  ${!s?'<div class="al ali">Vyberte slovník v levém panelu.</div>':''}
  ${s?vrzPrehled(s):''}
  ${S.slovniky.length>1?`<div class="panel"><div class="ptit">Porovnání dvou slovníků</div>
    <div class="g2">
      <div class="fg"><label for="cpa">Slovník A</label><select id="cpa">${S.slovniky.map(sv=>`<option value="${sv.id}">${e(sv.nazev_cs)}</option>`).join('')}</select></div>
      <div class="fg"><label for="cpb">Slovník B</label><select id="cpb">${S.slovniky.map((sv,i)=>`<option value="${sv.id}" ${i===1?'selected':''}>${e(sv.nazev_cs)}</option>`).join('')}</select></div>
    </div>
    <button class="bs" onclick="shCmp()">Porovnat slovníky</button>
  </div>`:''}`;
}
function vrzPrehled(s){
  return`<div class="panel"><div class="jb" style="margin-bottom:9px"><div class="ptit" style="margin:0">Verze slovníku: ${e(s.nazev_cs)}</div><button class="bp sm" onclick="V('verze',{sl:'${s.id}'})">Vytvořit novou verzi</button></div>
  <p class="xs" style="margin-bottom:9px">Aktuální verze: <strong>${e(s.ak_ver)}</strong></p>
  <div class="tw"><table><thead><tr><th>Verze</th><th>Datum</th><th>Popis změn</th><th>Pojmů</th><th>Akce</th></tr></thead><tbody>
  ${s.verze.slice().reverse().map(v=>`<tr>
    <td><strong>${e(v.cislo)}</strong>${v.cislo===s.ak_ver?' <span class="bdg b3">aktuální</span>':''}</td>
    <td>${e(v.datum)}</td><td>${e(v.popis)}</td><td>${v.snap?v.snap.length:'—'}</td>
    <td>${v.snap?`<button class="bs sm" onclick="obnovit('${s.id}','${v.cislo}')">Obnovit</button> `:''}${v.snap&&v.cislo!==s.ak_ver?`<button class="bs sm" onclick="porVerzeSestavaSl(s,v)">Vs. aktuální</button>`:''}
    </td></tr>`).join('')}
  </tbody></table></div></div>`;
}
function shCmp(){const a=document.getElementById('cpa').value,b=document.getElementById('cpb').value;if(a===b){toast('Vyberte různé slovníky.','w');return;}S._cA=a;S._cB=b;S._cSl=null;S._cV=null;V('porovnani');}
function porVer(slId,v){S._cSl=slId;S._cV=v;S._cA=null;S._cB=null;V('porovnani');}
// ── VIEW: SPRÁVA VERZÍ ──
function vVerze(){
  const s=getASl();if(!s)return'<p>Vyberte slovník.</p>';
  return`<h2 class="sh">Správa verzí: ${e(s.nazev_cs)}</h2>
  <div class="panel"><div class="ptit">Uložit novou verzi</div>
    <p class="xs" style="margin-bottom:10px">Uložení vytvoří snapshot pojmů pro pozdější obnovení nebo porovnání.</p>
    <form onsubmit="ulVer(event,'${s.id}')">
      <div class="g2"><div class="fg"><label for="vc">Číslo verze <span class="req" aria-hidden="true">*</span></label><input type="text" id="vc" name="c" required placeholder="1.0, 2.3-beta…"></div>
      <div class="fg"><label for="vd">Datum</label><input type="date" id="vd" name="d" value="${new Date().toISOString().slice(0,10)}"></div></div>
      <div class="fg"><label for="vp">Popis změn</label><textarea id="vp" name="p" placeholder="Co se v této verzi změnilo…"></textarea></div>
      <div class="bg"><button type="submit" class="bp">Uložit verzi</button><button type="button" class="bs" onclick="V('editSlovnik')">Zpět</button></div>
    </form>
  </div>
  ${vrzPrehled(s)}`;
}
function ulVer(ev,slId){ev.preventDefault();const f=ev.target,s=getSl(slId);if(!s)return;const c=f.c.value.trim();if(s.verze.find(v=>v.cislo===c)){toast('Verze '+c+' již existuje.','w');return;}s.verze.push({cislo:c,datum:f.d.value,popis:f.p.value.trim(),snap:JSON.parse(JSON.stringify(s.pojmy))});s.ak_ver=c;s.aktualizovano=f.d.value;saveL();toast('Verze '+c+' uložena.');V('verze');}
function obnovit(slId,vc){const s=getSl(slId),v=s?.verze.find(x=>x.cislo===vc);if(!v||!v.snap)return;oDlg('Obnovit verzi',`<p>Obnovit na verzi <strong>${e(vc)}</strong>?</p><div class="al alw" style="margin-top:8px">Aktuální pojmy budou nahrazeny snapshotem. Doporučujeme nejprve uložit aktuální verzi.</div>`,`<button class="bd" onclick="doObnovit('${slId}','${vc}')">Obnovit</button><button class="bs" onclick="cDlg()">Zrušit</button>`);}
function doObnovit(slId,vc){const s=getSl(slId),v=s.verze.find(x=>x.cislo===vc);s.pojmy=JSON.parse(JSON.stringify(v.snap));s.ak_ver=vc;saveL();cDlg();toast('Obnoveno na verzi '+vc+'.');V('editSlovnik');}
// ── VIEW: POROVNÁNÍ ──
// ── SESTAVY ZMĚN ──
// Mapování interních klíčů pojmu na čitelné popisky
const POLE_LABELS={nc:'Název (česky)',ne:'Název (anglicky)',dc:'Definice (česky)',de:'Definice (anglicky)',pc:'Popis (česky)',pe:'Popis (anglicky)',typ:'Typ pojmu',iri:'IRI',ac:'Alternativní názvy (CS)',ae:'Alternativní názvy (EN)',ppdf:'Sdílen v PPDF',zz:'Způsob získání',to:'Typ obsahu',zs:'Způsoby sdílení',ov:'Obor hodnot',dob:'Definiční obor',ag:'Agenda',ais:'AIS',nad:'Nadřazený pojem',ekv:'Ekvivalentní pojmy',dus:'Definující ustanovení',sus:'Související ustanovení',nv:'Nadřazená vlastnost',nvz:'Nadřazený vztah',nt:'Nadřazená třída',nus:'Ustanovení neveřejnosti'};
function fmtVal(key,val){
  if(val===null||val===undefined||val==='')return'<em style="color:var(--tx3)">nevyplněno</em>';
  if(typeof val==='boolean')return val?'Ano':'Ne';
  if(Array.isArray(val)){
    if(!val.length)return'<em style="color:var(--tx3)">prázdný seznam</em>';
    return val.map(v=>e(String(v))).join(', ');
  }
  if(key==='typ')return tLbl(val);
  return e(String(val));
}
function zmenyPojmu(old,cur){
  // Vrátí pole {key, label, stare, nove} pro každé změněné pole
  const skip=new Set(['id','ap']);
  const fields=Object.keys({...old,...cur}).filter(k=>!skip.has(k));
  return fields.filter(k=>JSON.stringify(old[k])!==JSON.stringify(cur[k])).map(k=>({key:k,label:POLE_LABELS[k]||k,stare:old[k],nove:cur[k]}));
}

function vPorA(){
  if(S._cSl&&S._cV){const s=getSl(S._cSl);const v=s?.verze.find(x=>x.cislo===S._cV);if(!s||!v||!v.snap)return'<p>Data nenalezena.</p>';return porVerze(s,v);}
  if(S._cA&&S._cB){const sA=getSl(S._cA),sB=getSl(S._cB);if(!sA||!sB)return'<p>Slovníky nenalezeny.</p>';return porSl(sA,sB);}
  return'<p>Žádná data k porovnání.</p>';
}

function porVerze(s,v){
  const old=v.snap, cur=s.pojmy;
  const oi=new Map(old.map(p=>[p.id,p])), ci=new Map(cur.map(p=>[p.id,p]));
  const added=cur.filter(p=>!oi.has(p.id));
  const removed=old.filter(p=>!ci.has(p.id));
  const changed=cur.filter(p=>oi.has(p.id)&&JSON.stringify(p)!==JSON.stringify(oi.get(p.id)));
  const total=added.length+removed.length+changed.length;
  const now=new Date().toLocaleDateString('cs-CZ');

  // Souhrnný pruh
  let html=`
  <div style="margin-bottom:5px"><button class="bs" onclick="V('verze')">← Zpět na verze</button> <button class="bs" onclick="tiskSestavu()" style="margin-left:4px">🖨 Tisknout / uložit jako PDF</button></div>
  <div id="sestava" style="background:var(--sf);border:1px solid var(--br);border-radius:var(--r);padding:24px 28px;max-width:820px">
    <div style="border-bottom:2px solid var(--ac);padding-bottom:12px;margin-bottom:18px">
      <h2 style="font-family:var(--fn);font-size:1.4rem;color:var(--ac);margin-bottom:4px">Sestava změn slovníku</h2>
      <h3 style="font-family:var(--fn);font-size:1.1rem;font-weight:normal;color:var(--tx2)">${e(s.nazev_cs)}</h3>
      <div style="display:flex;gap:24px;margin-top:10px;flex-wrap:wrap">
        <span class="xs"><strong>Porovnání:</strong> verze ${e(v.cislo)} (${e(v.datum)}) → aktuální stav (${e(s.ak_ver)})</span>
        <span class="xs"><strong>Vygenerováno:</strong> ${now}</span>
        <span class="xs"><strong>Organizace:</strong> ${e(s.organizace)||'—'}</span>
        <span class="xs"><strong>Autor:</strong> ${e(s.autor)||'—'}</span>
      </div>
    </div>

    <div style="display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap">
      <div style="background:var(--scl);color:var(--sc);border:1px solid var(--sc);border-radius:var(--r);padding:10px 16px;text-align:center;min-width:90px">
        <div style="font-size:1.8rem;font-weight:bold;font-family:var(--fn)">${added.length}</div>
        <div style="font-size:12px;text-transform:uppercase;letter-spacing:.05em">Přidáno</div>
      </div>
      <div style="background:var(--dgl);color:var(--dg);border:1px solid var(--dg);border-radius:var(--r);padding:10px 16px;text-align:center;min-width:90px">
        <div style="font-size:1.8rem;font-weight:bold;font-family:var(--fn)">${removed.length}</div>
        <div style="font-size:12px;text-transform:uppercase;letter-spacing:.05em">Odstraněno</div>
      </div>
      <div style="background:var(--wnl);color:var(--wn);border:1px solid var(--wn);border-radius:var(--r);padding:10px 16px;text-align:center;min-width:90px">
        <div style="font-size:1.8rem;font-weight:bold;font-family:var(--fn)">${changed.length}</div>
        <div style="font-size:12px;text-transform:uppercase;letter-spacing:.05em">Upraveno</div>
      </div>
      <div style="background:var(--bg2);color:var(--tx2);border:1px solid var(--br);border-radius:var(--r);padding:10px 16px;text-align:center;min-width:90px">
        <div style="font-size:1.8rem;font-weight:bold;font-family:var(--fn)">${cur.length}</div>
        <div style="font-size:12px;text-transform:uppercase;letter-spacing:.05em">Celkem pojmů</div>
      </div>
    </div>`;

  if(!total){
    html+=`<div class="al als">Oproti verzi ${e(v.cislo)} nebyly nalezeny žádné změny.</div>`;
  }

  // Přidané pojmy
  if(added.length){
    html+=`<section aria-labelledby="sec-added">
    <h3 id="sec-added" style="font-family:var(--fn);font-size:1.05rem;color:var(--sc);border-left:4px solid var(--sc);padding-left:10px;margin-bottom:12px">Nové pojmy (${added.length})</h3>`;
    added.forEach(p=>{
      html+=`<article style="background:var(--scl);border:1px solid #b3d9bb;border-radius:var(--r);padding:14px 16px;margin-bottom:10px" aria-label="Nový pojem ${e(p.nc)}">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
          <span style="background:var(--sc);color:#fff;border-radius:50%;width:22px;height:22px;display:inline-flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0" aria-hidden="true">+</span>
          <strong style="font-size:1rem;font-family:var(--fn)">${e(p.nc)}</strong>
          <span class="tb t${e(p.typ)}">${tLbl(p.typ)}</span>
          ${p.ne?`<span class="xs">${e(p.ne)}</span>`:''}
        </div>
        ${p.dc?`<div class="xs" style="margin-bottom:5px"><strong>Definice:</strong> ${e(p.dc)}</div>`:''}
        ${p.pc&&!p.dc?`<div class="xs" style="margin-bottom:5px"><strong>Popis:</strong> ${e(p.pc)}</div>`:''}
        ${p.iri?`<div class="xs"><strong>IRI:</strong> <code>${e(p.iri)}</code></div>`:''}
      </article>`;
    });
    html+=`</section>`;
  }

  // Odstraněné pojmy
  if(removed.length){
    html+=`<section aria-labelledby="sec-removed">
    <h3 id="sec-removed" style="font-family:var(--fn);font-size:1.05rem;color:var(--dg);border-left:4px solid var(--dg);padding-left:10px;margin-bottom:12px;margin-top:18px">Odstraněné pojmy (${removed.length})</h3>`;
    removed.forEach(p=>{
      html+=`<article style="background:var(--dgl);border:1px solid #e8b3b3;border-radius:var(--r);padding:14px 16px;margin-bottom:10px" aria-label="Odstraněný pojem ${e(p.nc)}">
        <div style="display:flex;align-items:center;gap:8px">
          <span style="background:var(--dg);color:#fff;border-radius:50%;width:22px;height:22px;display:inline-flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0" aria-hidden="true">−</span>
          <strong style="font-size:1rem;font-family:var(--fn);text-decoration:line-through">${e(p.nc)}</strong>
          <span class="tb t${e(p.typ)}">${tLbl(p.typ)}</span>
        </div>
        ${p.dc?`<div class="xs" style="margin-top:6px;color:var(--tx3)"><strong>Definice byla:</strong> ${e(p.dc)}</div>`:''}
      </article>`;
    });
    html+=`</section>`;
  }

  // Upravené pojmy — detailně pole za polem
  if(changed.length){
    html+=`<section aria-labelledby="sec-changed">
    <h3 id="sec-changed" style="font-family:var(--fn);font-size:1.05rem;color:var(--wn);border-left:4px solid var(--wn);padding-left:10px;margin-bottom:12px;margin-top:18px">Upravené pojmy (${changed.length})</h3>`;
    changed.forEach(p=>{
      const o=oi.get(p.id);
      const zm=zmenyPojmu(o,p);
      html+=`<article style="background:var(--sf);border:1px solid var(--wn);border-radius:var(--r);padding:14px 16px;margin-bottom:14px" aria-label="Upravený pojem ${e(p.nc)}">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
          <span style="background:var(--wn);color:#fff;border-radius:50%;width:22px;height:22px;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:bold;flex-shrink:0" aria-hidden="true">✎</span>
          <strong style="font-size:1rem;font-family:var(--fn)">${e(p.nc)}</strong>
          <span class="tb t${e(p.typ)}">${tLbl(p.typ)}</span>
          <span class="xs" style="color:var(--tx3)">${zm.length} ${zm.length===1?'změna':'změny/změn'}</span>
        </div>
        <table style="width:100%;border-collapse:collapse;font-size:13px">
          <thead><tr>
            <th style="text-align:left;padding:5px 8px;background:var(--bg2);border-bottom:1px solid var(--br);width:22%">Pole</th>
            <th style="text-align:left;padding:5px 8px;background:#ffeef0;border-bottom:1px solid var(--br);width:39%">Bylo</th>
            <th style="text-align:left;padding:5px 8px;background:#e6ffed;border-bottom:1px solid var(--br);width:39%">Nově</th>
          </tr></thead>
          <tbody>
            ${zm.map(z=>`<tr>
              <td style="padding:6px 8px;border-bottom:1px solid var(--bg3);font-weight:bold;vertical-align:top">${e(z.label)}</td>
              <td style="padding:6px 8px;border-bottom:1px solid var(--bg3);background:#fff8f8;vertical-align:top;color:var(--dg)">${fmtVal(z.key,z.stare)}</td>
              <td style="padding:6px 8px;border-bottom:1px solid var(--bg3);background:#f8fff8;vertical-align:top;color:var(--sc)">${fmtVal(z.key,z.nove)}</td>
            </tr>`).join('')}
          </tbody>
        </table>
      </article>`;
    });
    html+=`</section>`;
  }


  // Nevyřízené autorské poznámky slovníku v sestavě
  const nevyrPoz=(s.poznamky||[]).filter(n=>n.stav==='nevyrizena');
  const nevyrPojPoz=[];
  s.pojmy.forEach(pp=>{(pp.poznamky||[]).filter(n=>n.stav==='nevyrizena').forEach(n=>nevyrPojPoz.push({n,nc:pp.nc}));});
  if(nevyrPoz.length||nevyrPojPoz.length){
    html+=`<section style="margin-top:18px;border-top:2px dashed #d4c84a;padding-top:12px" aria-labelledby="sec-poz">
      <h3 id="sec-poz" style="font-family:var(--fn);font-size:1rem;color:#7a5a00;margin-bottom:9px">Nevyřízené autorské poznámky (${nevyrPoz.length+nevyrPojPoz.length})</h3>`;
    nevyrPoz.forEach(n=>{html+=`<div class="pnote" style="margin-bottom:6px"><span class="xs"><strong>Slovník</strong> — ${e(n.datum)}</span><div class="pnote-txt mt8">${e(n.txt)}</div></div>`;});
    nevyrPojPoz.forEach(({n,nc})=>{html+=`<div class="pnote" style="margin-bottom:6px"><span class="xs"><strong>Pojem: ${e(nc)}</strong> — ${e(n.datum)}</span><div class="pnote-txt mt8">${e(n.txt)}</div></div>`;});
    html+='</section>';
  }

  html+=`<div style="border-top:1px solid var(--br);margin-top:20px;padding-top:10px;font-size:12px;color:var(--tx3)">
    Sestava vygenerována aplikací Správce datových slovníků OFN &bull; ${now}
  </div>
  </div>`;

  return html;
}

function porSl(sA,sB){
  const mA=new Map(sA.pojmy.map(p=>[p.nc.toLowerCase(),p]));
  const mB=new Map(sB.pojmy.map(p=>[p.nc.toLowerCase(),p]));
  const jenA=sA.pojmy.filter(p=>!mB.has(p.nc.toLowerCase()));
  const jenB=sB.pojmy.filter(p=>!mA.has(p.nc.toLowerCase()));
  const oba=sA.pojmy.filter(p=>mB.has(p.nc.toLowerCase()));
  const now=new Date().toLocaleDateString('cs-CZ');

  return`
  <div style="margin-bottom:5px"><button class="bs" onclick="V('prehled')">← Zpět</button> <button class="bs" onclick="tiskSestavu()" style="margin-left:4px">🖨 Tisknout / uložit jako PDF</button></div>
  <div id="sestava" style="background:var(--sf);border:1px solid var(--br);border-radius:var(--r);padding:24px 28px;max-width:820px">
    <div style="border-bottom:2px solid var(--ac);padding-bottom:12px;margin-bottom:18px">
      <h2 style="font-family:var(--fn);font-size:1.4rem;color:var(--ac);margin-bottom:4px">Sestava porovnání slovníků</h2>
      <div style="display:flex;gap:24px;margin-top:8px;flex-wrap:wrap">
        <span class="xs"><strong>Slovník A:</strong> ${e(sA.nazev_cs)} (${e(sA.ak_ver)}, ${sA.pojmy.length} pojmů)</span>
        <span class="xs"><strong>Slovník B:</strong> ${e(sB.nazev_cs)} (${e(sB.ak_ver)}, ${sB.pojmy.length} pojmů)</span>
        <span class="xs"><strong>Vygenerováno:</strong> ${now}</span>
      </div>
    </div>

    <div style="display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap">
      <div style="background:var(--bg2);border:1px solid var(--br);border-radius:var(--r);padding:10px 16px;text-align:center;min-width:90px">
        <div style="font-size:1.8rem;font-weight:bold;font-family:var(--fn)">${oba.length}</div>
        <div style="font-size:12px;text-transform:uppercase;letter-spacing:.05em">Společné</div>
      </div>
      <div style="background:var(--inl);color:var(--in);border:1px solid var(--in);border-radius:var(--r);padding:10px 16px;text-align:center;min-width:90px">
        <div style="font-size:1.8rem;font-weight:bold;font-family:var(--fn)">${jenA.length}</div>
        <div style="font-size:12px;text-transform:uppercase;letter-spacing:.05em">Jen v A</div>
      </div>
      <div style="background:#f0e8ff;color:#4a148c;border:1px solid #9c67c8;border-radius:var(--r);padding:10px 16px;text-align:center;min-width:90px">
        <div style="font-size:1.8rem;font-weight:bold;font-family:var(--fn)">${jenB.length}</div>
        <div style="font-size:12px;text-transform:uppercase;letter-spacing:.05em">Jen v B</div>
      </div>
    </div>

    ${oba.length?`<section aria-labelledby="sec-oba"><h3 id="sec-oba" style="font-family:var(--fn);font-size:1.05rem;color:var(--tx2);border-left:4px solid var(--br2);padding-left:10px;margin-bottom:10px">Společné pojmy (${oba.length})</h3>
    <div class="tw"><table><thead><tr><th>Název</th><th>Typ</th><th>Definice A</th><th>Definice B</th></tr></thead><tbody>
    ${oba.map(p=>{const pb=mB.get(p.nc.toLowerCase());const defSame=p.dc===pb.dc;return`<tr>
      <td><strong>${e(p.nc)}</strong></td>
      <td><span class="tb t${e(p.typ)}">${tLbl(p.typ)}</span> <span class="bdg ${sCls(p.stav||'rozpracovany')}">${sLbl(p.stav||'rozpracovany')}</span></td>
      <td style="font-size:13px;color:${defSame?'var(--tx2)':'var(--dg)'}">${e((p.dc||'—').substring(0,120))}</td>
      <td style="font-size:13px;color:${defSame?'var(--tx2)':'var(--sc)'}">${e((pb.dc||'—').substring(0,120))}</td>
    </tr>`;}).join('')}

function vExpSl(){
  const s=getASl();if(!s)return'<p>Vyberte slovník.</p>';
  const jld=buildJLD(s),pretty=JSON.stringify(jld,null,2);
  return`<h2 class="sh">Export JSON-LD: ${e(s.nazev_cs)}</h2>
  <div class="panel">
    <div class="bg" style="margin-bottom:11px"><button class="bp" onclick="expJLD('${s.id}')">Stáhnout soubor</button><button class="bs" onclick="cpJLD('${s.id}')">Kopírovat do schránky</button><button class="bs" onclick="V('editSlovnik')">Zpět</button></div>
    <label for="jlp" class="sr">Náhled JSON-LD</label>
    <textarea id="jlp" readonly style="font-family:monospace;font-size:12px;min-height:500px;background:var(--bg2)">${e(pretty)}</textarea>
  </div>`;
}
function expJLD(slId){
  const s=getSl(slId)||getASl();if(!s)return;
  const nm=(s.nazev_cs||'slovnik').replace(/\s+/g,'_').toLowerCase()+'_'+s.ak_ver+'.jsonld';
  dl(JSON.stringify(buildJLD(s),null,2),nm,'application/ld+json');
  toast('Exportováno: '+nm);
}
function cpJLD(slId){const s=getSl(slId);if(!s)return;navigator.clipboard.writeText(JSON.stringify(buildJLD(s),null,2)).then(()=>toast('JSON-LD zkopírován.'));}
function lo(cs,en){const o={cs:cs||''};if(en)o.en=en;return o;}
function buildJLD(s){
  const urovObj=UROVNE.find(u=>u.id===(s.uroven||'konceptualni'))||UROVNE[1];
  const doc={"@context":"https://ofn.gov.cz/slovníky/2026-02-26/kompletní/kontext.jsonld","iri":s.iri||'_:'+s.id,"typ":urovObj.typ,"název":lo(s.nazev_cs,s.nazev_en)};
  if(s.popis_cs)doc["popis"]=lo(s.popis_cs,s.popis_en);
  if(s.vytvoreno)doc["vytvořeno"]={"typ":"Časový okamžik","datum":s.vytvoreno};
  if(s.aktualizovano)doc["aktualizováno"]={"typ":"Časový okamžik","datum":s.aktualizovano};
  doc["pojmy"]=s.pojmy.map(p=>pjJLD(p));
  return doc;
}
function pjJLD(p){
  const td=TYPY.find(t=>t.id===p.typ);
  const obj={"iri":p.iri||'_:'+p.id,"typ":td?td.ofn:['Koncept','Pojem'],"název":lo(p.nc,p.ne)};
  if((p.ac&&p.ac.length)||(p.ae&&p.ae.length)){const a={};if(p.ac&&p.ac.length)a.cs=p.ac;if(p.ae&&p.ae.length)a.en=p.ae;obj["alternativní-název"]=a;}
  if(p.sn&&p.sn.length)obj["skrytý-název"]={cs:p.sn};
  if(p.pc)obj["popis"]=lo(p.pc,p.pe);
  if(p.dc)obj["definice"]=lo(p.dc,p.de);
  if(p.dus&&p.dus.length)obj["definující-ustanovení-právního-předpisu"]=p.dus;
  if(p.sus&&p.sus.length)obj["související-ustanovení-právního-předpisu"]=p.sus;
  if(p.dnl&&p.dnl.length)obj["definující-nelegislativní-zdroj"]=p.dnl.map(z=>{const o={"typ":"Digitální objekt","název":lo(z.n||z.nazev_cs||'')};if(z.p)o["popis"]=lo(z.p);if(z.u||z.url)o["url"]=z.u||z.url;return o;});
  if(p.snl&&p.snl.length)obj["související-nelegislativní-zdroj"]=p.snl.map(z=>{const o={"typ":"Digitální objekt","název":lo(z.n||z.nazev_cs||'')};if(z.p)o["popis"]=lo(z.p);if(z.u||z.url)o["url"]=z.u||z.url;return o;});
  if(p.ekv&&p.ekv.length)obj["ekvivalentní-pojem"]=p.ekv;
  // nadřazená-třída vs nadřazený-pojem podle typu
  if(p.nad&&p.nad.length){
    if(p.typ==='TypObjektu'||p.typ==='TypSubjektu')obj["nadřazená-třída"]=p.nad;
    else obj["nadřazený-pojem"]=p.nad;
  }
  if(p.ppdf)obj["je-sdílen-v-ppdf"]=true;
  if(p.zz)obj["způsob-získání-údaje"]=p.zz;
  if(p.to)obj["typ-obsahu-údaje"]=p.to;
  if(p.zs&&p.zs.length)obj["způsoby-sdílení-údaje"]=p.zs;
  if(p.typ==='Vlastnost'||p.typ==='Vztah'){if(p.ov)obj["obor-hodnot"]=p.ov;if(p.dob)obj["definiční-obor"]=p.dob;if(p.typ==='Vlastnost'&&p.nv&&p.nv.length)obj["nadřazená-vlastnost"]=p.nv;if(p.typ==='Vztah'&&p.nvz&&p.nvz.length)obj["nadřazený-vztah"]=p.nvz;}
  if(p.typ==='Trida'){if(p.nt&&p.nt.length)obj["nadřazená-třída"]=p.nt;if(p.ci&&p.cn)obj["instance-definovány-číselníkem"]={"iri":p.ci,"typ":"Číselník","datová-sada-v-nkod":p.cn};}
  if(p.typ==='TypObjektu'||p.typ==='TypSubjektu'){if(p.ag)obj["agenda"]=p.ag;if(p.ais)obj["agendový-informační-systém"]=p.ais;}
  // Ustanovení neveřejnosti - exportovat pro jakýkoliv typ s vyplněnými nus
  if(p.nus&&p.nus.length){
    obj["ustanovení-dokládající-neveřejnost-údaje"]=p.nus;
    // Přidat 'Neveřejný údaj' do typ array pokud ještě není
    if(!Array.isArray(obj.typ))obj.typ=[obj.typ];
    if(!obj.typ.includes('Neveřejný údaj'))obj.typ.push('Neveřejný údaj');
  }
  return obj;
}

function vImpSl(){
  return`<h2 class="sh">Import slovníku z JSON-LD</h2>
  <div class="panel">
    <p class="xs" style="margin-bottom:11px">Importujte slovník z JSON-LD souboru ve formátu OFN. Bude přidán jako nový slovník v projektu.</p>
    <div class="fg"><label for="impf">Soubor JSON-LD</label><input type="file" id="impf" accept=".json,.jsonld" onchange="doImpF(event)"></div>
    <hr>
    <div class="fg"><label for="impt">Nebo vložte JSON-LD obsah přímo:</label><textarea id="impt" style="font-family:monospace;font-size:12px;min-height:180px" placeholder='{"@context":"https://ofn.gov.cz/...","iri":"...","typ":["Slovník"],...}'></textarea></div>
    <div class="bg"><button class="bp" onclick="doImpT()">Importovat</button><button class="bs" onclick="V('projekt')">Zrušit</button></div>
  </div>`;
}
function doImpF(ev){const f=ev.target.files[0];if(!f)return;const r=new FileReader();r.onload=e=>{document.getElementById('impt').value=e.target.result;};r.readAsText(f);}
function doImpT(){
  const txt=document.getElementById('impt')?.value.trim();if(!txt){toast('Zadejte obsah.','w');return;}
  try{const d=JSON.parse(txt);const s=impJLD(d);S.slovniky.push(s);S.akSl=s.id;saveL();toast('Importováno: '+s.nazev_cs+' ('+s.pojmy.length+' pojmů)');V('editSlovnik');}
  catch(x){toast('Chyba parsování: '+x.message,'d');}
}
function impJLD(d){
  const typs=Array.isArray(d.typ)?d.typ:(d.typ?[d.typ]:[]);
  const impUrov=typs.includes('Konceptuální model')?'konceptualni':'tezaurus';
  const s=mkSl({
    iri:d.iri||'',
    uroven:impUrov,
    nc:(d['název']&&d['název'].cs)||'Importovaný slovník',
    ne:(d['název']&&d['název'].en)||'',
    pc:(d['popis']&&d['popis'].cs)||'',
    pe:(d['popis']&&d['popis'].en)||'',
    dc:(d['definice']&&d['definice'].cs)||'',
    de:(d['definice']&&d['definice'].en)||'',
    vyv:(d['vytvořeno']&&d['vytvořeno'].datum)||td(),
    akd:(d['aktualizováno']&&d['aktualizováno'].datum)||td(),
  });
  (d.pojmy||[]).forEach(pd=>{
    const typy=Array.isArray(pd.typ)?pd.typ:[pd.typ];
    // Určení primárního typu — pořadí priorit (specifičtější před obecnějším)
    let typ='Pojem';
    if(typy.includes('Vztah'))typ='Vztah';
    else if(typy.includes('Vlastnost'))typ='Vlastnost';
    else if(typy.includes('Typ objektu práva'))typ='TypObjektu';
    else if(typy.includes('Typ subjektu práva'))typ='TypSubjektu';
    else if(typy.includes('Třída'))typ='Trida';
    else if(typy.includes('Neveřejný údaj'))typ='NeverejnyUdaj';
    else if(typy.includes('Veřejný údaj'))typ='VerejnyUdaj';

    // alternativní-název může být objekt nebo pole
    const altCs=pd['alternativní-název']&&pd['alternativní-název'].cs;
    const altEn=pd['alternativní-název']&&pd['alternativní-název'].en;
    const toArr=v=>!v?[]:Array.isArray(v)?v:[v];
    const toIriArr=v=>!v?[]:Array.isArray(v)?v:[v];

    s.pojmy.push(mkPj({
      typ,
      iri:pd.iri||'',
      nc:(pd['název']&&pd['název'].cs)||'',
      ne:(pd['název']&&pd['název'].en)||'',
      ac:toArr(altCs),
      ae:toArr(altEn),
      sn:toArr(pd['skrytý-název']&&pd['skrytý-název'].cs),
      pc:(pd['popis']&&pd['popis'].cs)||'',
      pe:(pd['popis']&&pd['popis'].en)||'',
      dc:(pd['definice']&&pd['definice'].cs)||'',
      de:(pd['definice']&&pd['definice'].en)||'',
      dus:toIriArr(pd['definující-ustanovení-právního-předpisu']),
      sus:toIriArr(pd['související-ustanovení-právního-předpisu']),
      nus:toIriArr(pd['ustanovení-dokládající-neveřejnost-údaje']),
      dnl:(pd['definující-nelegislativní-zdroj']||[]).map(z=>({n:(z['název']&&z['název'].cs)||'',p:(z['popis']&&z['popis'].cs)||'',u:z.url||''})),
      snl:(pd['související-nelegislativní-zdroj']||[]).map(z=>({n:(z['název']&&z['název'].cs)||'',p:(z['popis']&&z['popis'].cs)||'',u:z.url||''})),
      ekv:toIriArr(pd['ekvivalentní-pojem']),
      // Hierarchie: nadřazený-pojem nebo nadřazená-třída
      nad:toIriArr(typ==='Trida'?pd['nadřazený-pojem']:pd['nadřazený-pojem']||pd['nadřazená-třída']),
      nt:toIriArr(typ==='Trida'?pd['nadřazená-třída']:null),
      // Typ-specifická pole
      ov:pd['obor-hodnot']||'',
      dob:pd['definiční-obor']||'',
      ag:pd['agenda']||'',
      ais:pd['agendový-informační-systém']||'',
      ppdf:pd['je-sdílen-v-ppdf']||false,
      zz:pd['způsob-získání-údaje']||'',
      to:pd['typ-obsahu']||'',
      zs:toArr(pd['způsoby-sdílení']),
    }));
  });
  return s;
}
