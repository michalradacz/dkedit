<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Správce datového katalogu úřadu</title>
<style>
:root{--bg:#f5f3ef;--bg2:#eceae4;--bg3:#dedad2;--sf:#fff;--br:#c8c4bb;--br2:#a8a49b;--tx:#1a1917;--tx2:#4a4845;--tx3:#7a7875;--ac:#1a5c8a;--ach:#144d75;--acl:#e8f1f8;--dg:#8a1a1a;--dgl:#f8e8e8;--wn:#7a5a00;--wnl:#fdf5d8;--sc:#1a6a2a;--scl:#e8f5eb;--in:#1a4a7a;--inl:#e8f0f8;--fn:'Georgia',serif;--ui:system-ui,sans-serif;--r:4px;--sh:0 1px 3px rgba(0,0,0,.12)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--ui);background:var(--bg);color:var(--tx);font-size:15px;line-height:1.5}
a{color:var(--ac)}a:hover{color:var(--ach)}
.skip{position:absolute;top:-100px;left:0;background:var(--ac);color:#fff;padding:8px 16px;text-decoration:none;font-weight:bold;z-index:1000}.skip:focus{top:0}
#hdr{background:var(--ac);color:#fff;padding:10px 18px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
#hdr h1{font-family:var(--fn);font-size:1.2rem;font-weight:normal;flex:1}
#hdr nav{display:flex;gap:6px;flex-wrap:wrap}
#hdr nav button{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.3);padding:5px 11px;border-radius:var(--r);cursor:pointer;font-size:13px}
#hdr nav button:hover,#hdr nav button[aria-current="page"]{background:rgba(255,255,255,.3)}
#layout{display:flex;min-height:calc(100vh - 50px)}
#side{width:265px;min-width:200px;background:var(--sf);border-right:1px solid var(--br);padding:13px;overflow-y:auto;flex-shrink:0;transition:width .2s,padding .2s,opacity .2s}
#side.hidden{width:0;min-width:0;padding:0;overflow:hidden;opacity:0;border:none}
#toggle-side{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.3);padding:5px 9px;border-radius:var(--r);cursor:pointer;font-size:16px;line-height:1;flex-shrink:0}
#toggle-side:hover{background:rgba(255,255,255,.3)}
#main{flex:1;padding:18px;overflow-y:auto;max-width:1000px}
.panel{background:var(--sf);border:1px solid var(--br);border-radius:var(--r);padding:17px;margin-bottom:13px;box-shadow:var(--sh)}
.ptit{font-family:var(--fn);font-size:1.05rem;color:var(--ac);margin-bottom:11px;padding-bottom:7px;border-bottom:1px solid var(--br)}
fieldset{border:1px solid var(--br);border-radius:var(--r);padding:11px;margin-bottom:11px}
legend{font-weight:bold;font-size:.87rem;padding:0 5px;color:var(--tx2)}
.fg{margin-bottom:10px}.fg:last-child{margin-bottom:0}
label{display:block;font-size:.86rem;font-weight:bold;color:var(--tx2);margin-bottom:3px}
label .req{color:var(--dg);margin-left:2px}label .hint{font-weight:normal;color:var(--tx3);font-size:.8rem}
input[type=text],input[type=url],input[type=date],input[type=email],textarea,select{width:100%;padding:6px 9px;border:1px solid var(--br);border-radius:var(--r);background:var(--sf);color:var(--tx);font-family:var(--ui);font-size:14px;line-height:1.4}
input:focus,textarea:focus,select:focus{outline:2px solid var(--ac);outline-offset:1px;border-color:var(--ac)}
textarea{resize:vertical;min-height:62px}
.ir{display:flex;gap:7px;align-items:flex-start}.ir input,.ir select{flex:1}
.cbl{display:flex;align-items:center;gap:5px;font-size:.9rem;cursor:pointer;margin-bottom:3px}
button{font-family:var(--ui);cursor:pointer;border-radius:var(--r);font-size:14px;line-height:1;border:1px solid transparent;padding:7px 13px}
button:focus{outline:2px solid var(--ac);outline-offset:2px}
.bp{background:var(--ac);color:#fff;border-color:var(--ac)}.bp:hover{background:var(--ach)}
.bs{background:var(--sf);color:var(--ac);border-color:var(--br2)}.bs:hover{background:var(--acl)}
.bd{background:var(--sf);color:var(--dg);border-color:var(--br2)}.bd:hover{background:var(--dgl);border-color:var(--dg)}
.sm{padding:4px 9px;font-size:13px}
.bg{display:flex;gap:7px;flex-wrap:wrap;margin-top:10px}
.ilist{list-style:none}.ilist li{border-bottom:1px solid var(--bg3)}.ilist li:last-child{border-bottom:none}
.ilist a,.ilist button.ll{display:block;width:100%;text-align:left;padding:7px 9px;text-decoration:none;color:var(--tx);background:none;border:none;border-radius:var(--r);font-size:13px;cursor:pointer}
.ilist a:hover,.ilist button.ll:hover,.ilist a[aria-current],.ilist button.ll[aria-current]{background:var(--acl);color:var(--ac)}
.ilist button.ll[aria-current]{font-weight:bold}
.bdg{display:inline-block;font-size:11px;padding:1px 6px;border-radius:10px;margin-left:3px;vertical-align:middle}
.b0{background:var(--wnl);color:var(--wn)}.b1{background:var(--bg3);color:var(--tx2)}.b2{background:var(--inl);color:var(--in)}.b3{background:var(--scl);color:var(--sc)}.b4{background:#e8f5e8;color:#1a5a1a}.b5{background:var(--bg3);color:var(--tx2)}.b6{background:var(--dgl);color:var(--dg)}
.tb{display:inline-block;font-size:11px;padding:1px 7px;border-radius:10px;font-weight:bold}
.tPojem{background:#e8eaf6;color:#303f9f}.tTypObjektu{background:#e3f2fd;color:#1565c0}.tTypSubjektu{background:#fce4ec;color:#880e4f}.tVlastnost{background:#e8f5e9;color:#1b5e20}.tVztah{background:#fff3e0;color:#e65100}.tTrida{background:#f3e5f5;color:#4a148c}.tVerejnyUdaj{background:#e0f2f1;color:#004d40}.tNeverejnyUdaj{background:#fbe9e7;color:#bf360c}
table{width:100%;border-collapse:collapse;font-size:14px}
th{background:var(--bg2);text-align:left;padding:7px 9px;font-size:13px;font-weight:bold;color:var(--tx2);border-bottom:2px solid var(--br)}
td{padding:7px 9px;border-bottom:1px solid var(--bg3);vertical-align:top}
tr:hover td{background:var(--bg)}.tw{overflow-x:auto}
.al{padding:9px 13px;border-radius:var(--r);margin-bottom:10px;font-size:14px;border-left:4px solid}
.ali{background:var(--inl);color:var(--in);border-color:var(--in)}.alw{background:var(--wnl);color:var(--wn);border-color:var(--wn)}.ald{background:var(--dgl);color:var(--dg);border-color:var(--dg)}.als{background:var(--scl);color:var(--sc);border-color:var(--sc)}
.tgl{display:flex;flex-wrap:wrap;gap:4px;margin-top:3px}
.tg{background:var(--acl);color:var(--ac);border:1px solid var(--br);border-radius:12px;padding:2px 8px;font-size:13px;display:flex;align-items:center;gap:3px}
.tg button{background:none;border:none;color:var(--dg);padding:0 2px;font-size:14px;line-height:1;cursor:pointer}
.anote{background:#fffef0;border:1px solid #d4c84a;border-radius:var(--r);padding:9px 11px;font-size:13px;color:#5a5200;font-style:italic;margin-top:10px}
.anote::before{content:"\2712 Autorská poznámka: ";font-weight:bold;font-style:normal}
.sbar{display:flex;gap:7px;margin-bottom:11px;align-items:center;flex-wrap:wrap}.sbar input{flex:1;min-width:140px}
#stbar{position:fixed;bottom:0;left:0;right:0;color:#fff;font-size:13px;padding:5px 15px;display:flex;align-items:center;gap:11px;z-index:200;display:none}
#stbar .stm{flex:1}#stbar button{background:none;border:none;color:#fff;cursor:pointer}
dialog{border:none;border-radius:var(--r);box-shadow:0 8px 32px rgba(0,0,0,.25);padding:0;max-width:640px;width:95%;max-height:90vh;overflow:hidden;display:flex;flex-direction:column}
dialog::backdrop{background:rgba(0,0,0,.5)}
.dh{background:var(--ac);color:#fff;padding:12px 16px;display:flex;align-items:center;gap:9px}
.dh h2{flex:1;font-size:1rem;font-weight:bold;font-family:var(--fn)}.dh button{background:none;border:none;color:#fff;font-size:18px;cursor:pointer}
.db{padding:16px;overflow-y:auto;flex:1}.df{padding:10px 16px;border-top:1px solid var(--br);display:flex;justify-content:flex-end;gap:7px;background:var(--bg)}
.sr{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
.sh{font-family:var(--fn);font-size:1.3rem;color:var(--ac);margin-bottom:13px}
.emp{text-align:center;color:var(--tx3);padding:26px 13px;font-style:italic}
hr{border:none;border-top:1px solid var(--br);margin:12px 0}
.xs{font-size:13px;color:var(--tx3)}.flex{display:flex;gap:7px;align-items:center;flex-wrap:wrap}
.jb{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:7px}
.mt8{margin-top:8px}.mt12{margin-top:12px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:580px){.g2{grid-template-columns:1fr}#layout{flex-direction:column}#side{width:100%;border-right:none;border-bottom:1px solid var(--br)}}
.ss{margin-bottom:17px}.ssh{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--tx3);font-weight:bold;margin-bottom:5px;padding:0 3px}
.da{background:#e6ffed;color:#1a6a2a}.dr{background:#ffeef0;color:#8a1a1a;text-decoration:line-through}.dc{background:#fff3cd;color:#7a5a00}

/* Poznámky */
.pnote{background:#fffef0;border:1px solid #d4c84a;border-radius:var(--r);padding:9px 12px;margin-bottom:7px;font-size:13px}
.pnote.vyrizena{background:#f5f5f5;border-color:var(--br);opacity:.7}
.pnote-hdr{display:flex;align-items:center;gap:7px;margin-bottom:5px;flex-wrap:wrap}
.pnote-txt{color:var(--tx2);white-space:pre-wrap;word-break:break-word}
.nbadge-n{background:#fff3cd;color:#7a5a00;border-radius:10px;padding:1px 8px;font-size:11px;font-weight:bold}
.nbadge-v{background:#e8f5e9;color:#1a6a2a;border-radius:10px;padding:1px 8px;font-size:11px}

/* Bulk operations */
.bulk-bar{background:var(--ac);color:#fff;padding:8px 12px;border-radius:var(--r);margin-bottom:10px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.bulk-bar .bc{font-size:13px;font-weight:bold}
.bulk-bar button{background:rgba(255,255,255,.2);color:#fff;border:1px solid rgba(255,255,255,.4);padding:4px 10px;font-size:13px}
.bulk-bar button:hover{background:rgba(255,255,255,.35)}
.bulk-bar .bcc{background:none;border:none;color:rgba(255,255,255,.8);cursor:pointer;font-size:13px;margin-left:auto}
table input[type=checkbox]{width:auto;cursor:pointer}
.sel-row td{background:var(--acl)!important}

/* Sidebar cards */
.sd-card{border:1px solid var(--br);border-radius:var(--r);margin-bottom:7px;background:var(--sf);overflow:hidden}
.sd-card.active{border-color:var(--ac);background:var(--acl)}
.sd-card-hdr{display:flex;align-items:center;gap:5px;padding:6px 9px;cursor:pointer;user-select:none}
.sd-card-hdr:hover{background:var(--bg2)}
.sd-card.active .sd-card-hdr{background:var(--acl)}
.sd-card-name{flex:1;font-size:13px;font-weight:bold;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sd-card-actions{display:flex;gap:4px;padding:4px 7px 7px;border-top:1px solid var(--br);flex-wrap:wrap}
.sd-card-actions button{font-size:11px;padding:3px 7px;flex:1;min-width:60px}
.sd-card-meta{padding:2px 9px 6px;font-size:11px;color:var(--tx3)}
</style>
</head>

const uid=()=>'i'+Math.random().toString(36).substr(2,8)+Date.now().toString(36);

const e=s=>{if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')};
const tLbl=t=>{const x=TYPY.find(x=>x.id===t);return x?x.lbl:t};
const sLbl=s=>{const x=STAVY.find(x=>x.id===s);return x?x.lbl:s};
const sCls=s=>{const x=STAVY.find(x=>x.id===s);return x?x.c:'b1'};
const getSl=id=>S.slovniky.find(s=>s.id===id);
const getASl=()=>S.akSl?getSl(S.akSl):null;
const sos=(arr,cur,vf,lf)=>arr.map(x=>`<option value="${e(vf(x))}" ${cur===vf(x)?'selected':''}>${e(lf(x))}</option>`).join('');
const dl=(txt,nm,mt)=>{const b=new Blob([txt],{type:mt});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download=nm;a.click();URL.revokeObjectURL(u)};
const allPj=(slId,exId)=>{const r=[];S.slovniky.forEach(s=>s.pojmy.forEach(p=>{if(p.id!==exId)r.push({...p,_sn:s.nazev_cs,_ext:s.id!==slId})}));return r};
// ── PERSISTENCE ──
const saveL=()=>{try{localStorage.setItem('ofnv3',JSON.stringify(S));localStorage.setItem('ofnv3_ver',APP_VER);}catch(e){}};
const APP_VER='v4';
const loadL=()=>{
  try{
    const ver=localStorage.getItem('ofnv3_ver');
    const d=localStorage.getItem('ofnv3');
    if(d&&ver===APP_VER){
      S=JSON.parse(d);
      if(!S.ciselniky)S.ciselniky=[];
      if(!S.akCs)S.akCs=null;
      if(!S.akPl)S.akPl=null;
      if(!S.projekt.orgIriBase)S.projekt.orgIriBase='';
      // migrate poznamky on slovniky/pojmy
      S.slovniky.forEach(sl=>{
        if(!sl.poznamky)sl.poznamky=[];
        sl.pojmy.forEach(p=>{if(!p.poznamky)p.poznamky=[];});
      });
      S.ciselniky.forEach(c=>{
        if(!c.poznamky)c.poznamky=[];
        if(!c.polozky)c.polozky=[];
        c.polozky.forEach(p=>{if(!p.poznamky)p.poznamky=[];});
      });
    }
  }catch(ex){console.warn('loadL error',ex);}
};
function expProj(){dl(JSON.stringify(S,null,2),(S.projekt.nazev||'projekt')+'_sl.json','application/json');toast('Projekt uložen.');}
function doImpProj(ev){

  r.readAsText(f);ev.target.value='';
}

function rSide(){

  // Helper: make a button
  function mkBtn(cls,label,title,fn){
    var b=document.createElement("button");
    b.className=cls;b.textContent=label;b.title=title;
    b.addEventListener("click",fn);return b;
  }

  // Slovníky
  var slDiv=document.getElementById("sd-sl");
  if(slDiv){
    slDiv.innerHTML="";
    if(!S.slovniky.length){
      var p=document.createElement("p");
      p.className="xs";p.style.cssText="color:var(--tx3);padding:4px 2px";
      p.textContent="Žádné slovníky.";slDiv.appendChild(p);
    }
    S.slovniky.forEach(function(s){
      var isAkt=s.id===S.akSl;
      var nv=countNotes(s,"nevyrizena")+(s.pojmy||[]).reduce(function(a,p){return a+countNotes(p,"nevyrizena");},0);

      var card=document.createElement("div");
      card.className="sd-card"+(isAkt?" active":"");

      // Header (clickable)
      var hdr=document.createElement("div");
      hdr.className="sd-card-hdr";
      hdr.setAttribute("role","button");hdr.setAttribute("tabindex","0");
      hdr.setAttribute("aria-current",isAkt?"true":"false");
      hdr.title=s.nazev_cs||"";
      hdr.addEventListener("click",function(){selSl(s.id);});
      hdr.addEventListener("keydown",function(e){if(e.key==="Enter"||e.key===" "){e.preventDefault();selSl(s.id);}});

      var nameSpan=document.createElement("span");
      nameSpan.className="sd-card-name";
      nameSpan.textContent=s.nazev_cs||"(bez názvu)";
      hdr.appendChild(nameSpan);

      if(nv){var nb=document.createElement("span");nb.className="nbadge-n";nb.textContent=nv;hdr.appendChild(nb);}

      var sb=document.createElement("span");
      sb.className="bdg "+sCls(s.stav);sb.style.fontSize="10px";sb.textContent=sLbl(s.stav);
      hdr.appendChild(sb);
      card.appendChild(hdr);

      // Meta
      var meta=document.createElement("div");
      meta.className="sd-card-meta";
      meta.textContent=s.pojmy.length+" pojmů · v"+s.ak_ver;
      card.appendChild(meta);

      // Actions
      var acts=document.createElement("div");acts.className="sd-card-actions";
      acts.appendChild(mkBtn("bp","Otevřít","Otevřít slovník",function(){selSl(s.id);}));
      acts.appendChild(mkBtn("bs","+ Pojem","Přidat pojem",function(){V("novyPojem",{sl:s.id});}));
      if(isAkt)acts.appendChild(mkBtn("bs","🖨","Sestava pojmů",function(){V("sestavaSl");}));
      card.appendChild(acts);

      slDiv.appendChild(card);
    });
  }

  // Číselníky

      p.textContent="Žádné číselníky.";csDiv.appendChild(p);
    }
    S.ciselniky.forEach(function(c){
      var isAkt=c.id===S.akCs;
      var nv=countNotes(c,"nevyrizena")+(c.polozky||[]).reduce(function(a,p){return a+countNotes(p,"nevyrizena");},0);

      var card=document.createElement("div");
      card.className="sd-card"+(isAkt?" active":"");

      var hdr=document.createElement("div");
      hdr.className="sd-card-hdr";
      hdr.setAttribute("role","button");hdr.setAttribute("tabindex","0");
      hdr.setAttribute("aria-current",isAkt?"true":"false");
      hdr.title=c.nazev_cs||"";
      hdr.addEventListener("click",function(){selCs(c.id);});
      hdr.addEventListener("keydown",function(ev){if(ev.key==="Enter"||ev.key===" "){ev.preventDefault();selCs(c.id);}});

      var nameSpan=document.createElement("span");
      nameSpan.className="sd-card-name";
      nameSpan.textContent=c.nazev_cs||"(bez názvu)";
      hdr.appendChild(nameSpan);

      if(nv){var nb=document.createElement("span");nb.className="nbadge-n";nb.textContent=nv;hdr.appendChild(nb);}

      var sb=document.createElement("span");
      sb.className="bdg "+sCls(c.stav);sb.style.fontSize="10px";sb.textContent=sLbl(c.stav);
      hdr.appendChild(sb);
      card.appendChild(hdr);

      var meta=document.createElement("div");
      meta.className="sd-card-meta";
      meta.textContent=c.polozky.length+" položek · v"+c.ak_ver;
      card.appendChild(meta);

      var acts=document.createElement("div");acts.className="sd-card-actions";
      acts.appendChild(mkBtn("bp","Otevřít","Otevřít číselník",function(){selCs(c.id);}));
      acts.appendChild(mkBtn("bs","+ Položka","Přidat položku",function(){S.akCs=c.id;V("novaPl",{cs:c.id});}));
      if(isAkt)acts.appendChild(mkBtn("bs","🖨","Sestava položek",function(){V("sestavaCs");}));
      card.appendChild(acts);

      csDiv.appendChild(card);
    });
  }
}

function slCard(s){

function selPj(id){S.akPj=id;V('editPojem');}
function vEdPj(){
  const s=getASl();if(!s)return'<p>Vyberte slovník.</p>';const p=s.pojmy.find(x=>x.id===S.akPj);if(!p)return'<p>Pojem nenalezen.</p>';
  return`<div class="jb" style="margin-bottom:10px"><h2 class="sh" style="margin:0">${e(p.nc)||'(bez názvu)'}</h2><span class="tb t${e(p.typ)}">${tLbl(p.typ)}</span></div>
  <div class="panel"><form onsubmit="savPj(event,'${s.id}','${p.id}')"><div class="fg"><label for="ep-t">Typ pojmu</label><select id="ep-t" name="typ">${sos(TYPY,p.typ,x=>x.id,x=>x.lbl)}</select></div>
  ${pjForm(p,s,true)}<div class="bg"><button type="submit" class="bp">Uložit pojem</button><button type="button" class="bd" onclick="delPj('${s.id}','${p.id}')">Smazat</button><button type="button" class="bs" onclick="V('editSlovnik')">Zpět</button></div></form>
  ${noteWidget(p.poznamky||[],'pj:'+s.id+':'+p.id)}
  ${(p.typ==='Trida'||p.typ==='TypObjektu'||p.typ==='TypSubjektu')?(function(){
    var iriP=p.iri||p.id;
    var vlastnosti=[];var vztahy=[];
    S.slovniky.forEach(function(sl){sl.pojmy.forEach(function(q){
      if(q.id===p.id)return;
      if(q.typ==='Vlastnost'&&(q.dob===iriP||q.dob===p.id))vlastnosti.push({q:q,sl:sl});
      if(q.typ==='Vztah'&&(q.dob===iriP||q.dob===p.id))vztahy.push({q:q,sl:sl});
    });});
    if(!vlastnosti.length&&!vztahy.length)return '';
    var out='<div class="panel" style="margin-top:12px"><div class="ptit">Vlastnosti a vztahy této třídy</div>';
    if(vlastnosti.length){
      out+='<p class="xs" style="margin-bottom:6px;font-weight:bold">Vlastnosti ('+vlastnosti.length+')</p>';
      out+='<div class="tw"><table><thead><tr><th>Vlastnost</th><th>Datový typ / obor hodnot</th><th>Stav</th><th></th></tr></thead><tbody>';
      vlastnosti.forEach(function(item){var q=item.q;var sl=item.sl;
        var ovI=pjNazevByIri(q.ov);
        out+='<tr><td><strong>'+e(q.nc)+'</strong>'+(q.ne?'<br><span class="xs">'+e(q.ne)+'</span>':'')+'</td>';
        out+='<td><span class="xs">'+(ovI?e(ovI.nc):e(q.ov||'—'))+'</span></td>';
        out+='<td><span class="bdg '+sCls(q.stav||'rozpracovany')+'">'+sLbl(q.stav||'rozpracovany')+'</span></td>';
        out+='<td><button class="bs sm" onclick="selPjBySlId(\''+q.id+'\',\''+sl.id+'\')">Otevřít</button></td></tr>';
      });
      out+='</tbody></table></div>';
    }
    if(vztahy.length){
      out+='<p class="xs" style="margin-top:10px;margin-bottom:6px;font-weight:bold">Vztahy ('+vztahy.length+')</p>';
      out+='<div class="tw"><table><thead><tr><th>Vztah</th><th>Cílová třída</th><th>Stav</th><th></th></tr></thead><tbody>';
      vztahy.forEach(function(item){var q=item.q;var sl=item.sl;
        var ovI=pjNazevByIri(q.ov);
        out+='<tr><td><strong>'+e(q.nc)+'</strong>'+(q.ne?'<br><span class="xs">'+e(q.ne)+'</span>':'')+'</td>';
        out+='<td><span class="xs">'+(ovI?'<a href="#" onclick="selPjBySlId(\''+ovI.id+'\',\''+ovI.slId+'\');return false">'+e(ovI.nc)+'</a>':e(q.ov||'—'))+'</span></td>';
        out+='<td><span class="bdg '+sCls(q.stav||'rozpracovany')+'">'+sLbl(q.stav||'rozpracovany')+'</span></td>';
        out+='<td><button class="bs sm" onclick="selPjBySlId(\''+q.id+'\',\''+sl.id+'\')">Otevřít</button></td></tr>';
      });
      out+='</tbody></table></div>';
    }
    out+='</div>';return out;
  })():''}
  </div>`;
}
function savPj(ev,slId,pId){ev.preventDefault();const s=getSl(slId);if(!s)return;const i=s.pojmy.findIndex(x=>x.id===pId);if(i<0)return;const u=colPj(ev.target,slId);u.id=pId;if(u.typ==='NeverejnyUdaj'&&(!u.nus||!u.nus.length)){toast('Upozornění: Neveřejný údaj vyžaduje alespoň jedno ustanovení dokládající neveřejnost.','w');}if(!u.iri&&s.iri)u.iri=suggestPojemIri(u.nc,s.iri);s.pojmy[i]=u;s.aktualizovano=td();saveL();toast('Pojem uložen.');render();}
function delPj(slId,pId){const p=getSl(slId)?.pojmy.find(x=>x.id===pId);oDlg('Smazat pojem',`<p>Smazat pojem <strong>${e(p?p.nc:pId)}</strong>?</p>`,`<button class="bd" onclick="cfDelPj('${slId}','${pId}')">Ano, smazat</button><button class="bs" onclick="cDlg()">Zrušit</button>`);}
function cfDelPj(slId,pId){const s=getSl(slId);if(s){s.pojmy=s.pojmy.filter(p=>p.id!==pId);s.aktualizovano=td();if(S.akPj===pId)S.akPj=null;}saveL();cDlg();toast('Pojem smazán.');V('editSlovnik');}

function typSp(p,s,all){
  const t=p.typ;let h='';

  const R='<span class="req" aria-hidden="true">*</span>';
  if(t==='Vlastnost'||t==='Vztah'){
    if(t==='Vlastnost'){
      h+=`<div class="fg"><label for="pf-ov">Datový typ (obor hodnot) ${R} <span class="hint">(xsd:string, xsd:boolean…)</span></label>
        <div class="ir"><input type="text" id="pf-ov" name="ov" value="${e(p.ov)}" required placeholder="xsd:string" list="xsd-list"></div>
        <datalist id="xsd-list">${XSD.map(x=>`<option value="${x.id}">${x.lbl}</option>`).join('')}</datalist></div>`;
    }else{
      h+=`<div class="fg"><label>Cílová třída (obor hodnot) ${R}</label>
        <div class="ir">
        <select name="ov" required onchange="document.querySelector('[name=ov_h]').value=this.value">
          <option value="${e(p.ov)}">${p.ov?e(all.find(a=>(a.iri||a.id)===p.ov)?.nc||p.ov):'— vyberte třídu —'}</option>
          ${tridy.filter(a=>(a.iri||a.id)!==p.ov).map(a=>`<option value="${e(a.iri||a.id)}">[${tLbl(a.typ)}] ${e(a.nc)}</option>`).join('')}
          ${!tridy.length?'<option disabled>— žádné třídy v projektu —</option>':''}
        </select>
        ${p.ov?(()=>{const oi=pjNazevByIri(p.ov);return oi?`<button type="button" class="bs sm" onclick="selPjBySlId('${oi.id}','${oi.slId}')" title="Otevřít cílovou třídu">→</button>`:'';})():''}
        </div></div>`;
    }
    h+=`<div class="fg"><label>Zdrojová třída (definiční obor) ${R}</label>
      <div class="ir">
      <select name="dob" required onchange="document.querySelector('[name=dob_h]').value=this.value">
        <option value="${e(p.dob)}">${p.dob?e(all.find(a=>(a.iri||a.id)===p.dob)?.nc||p.dob):'— vyberte třídu —'}</option>
        ${tridy.filter(a=>(a.iri||a.id)!==p.dob).map(a=>`<option value="${e(a.iri||a.id)}">[${tLbl(a.typ)}] ${e(a.nc)}</option>`).join('')}
        ${!tridy.length?'<option disabled>— žádné třídy v projektu —</option>':''}
      </select>
      ${p.dob?(()=>{const di=pjNazevByIri(p.dob);return di?`<button type="button" class="bs sm" onclick="selPjBySlId('${di.id}','${di.slId}')" title="Otevřít třídu">→</button>`:'';})():''}
      </div></div>`;
    if(t==='Vlastnost')h+=`<div class="fg"><label>Nadřazená vlastnost</label><select name="nviri"><option value="">— žádná —</option>${all.filter(x=>x.typ==='Vlastnost').map(a=>`<option value="${e(a.iri||a.id)}" ${(p.nv||[]).includes(a.iri||a.id)?'selected':''}>${e(a.nc)}</option>`).join('')}</select></div>`;
    if(t==='Vztah')h+=`<div class="fg"><label>Nadřazený vztah</label><select name="nvziri"><option value="">— žádný —</option>${all.filter(x=>x.typ==='Vztah').map(a=>`<option value="${e(a.iri||a.id)}" ${(p.nvz||[]).includes(a.iri||a.id)?'selected':''}>${e(a.nc)}</option>`).join('')}</select></div>`;
  }
  if(t==='Trida'){

function fmtVal(key,val){
  if(val===null||val===undefined||val==='')return'<em style="color:var(--tx3)">nevyplněno</em>';

function zmenyPojmu(old,cur){

  const oi=new Map(old.map(p=>[p.id,p])), ci=new Map(cur.map(p=>[p.id,p]));

  const now=new Date().toLocaleDateString('cs-CZ');

  // Souhrnný pruh
  let html=`
  <div style="margin-bottom:5px"><button class="bs" onclick="V('verze')">← Zpět na verze</button> <button class="bs" onclick="tiskSestavu()" style="margin-left:4px">🖨 Tisknout / uložit jako PDF</button></div>

function vExpSl(){
  const s=getASl();if(!s)return'<p>Vyberte slovník.</p>';
  const jld=buildJLD(s),pretty=JSON.stringify(jld,null,2);
  return`<h2 class="sh">Export JSON-LD: ${e(s.nazev_cs)}</h2>
  <div class="panel">
    <div class="bg" style="margin-bottom:11px"><button class="bp" onclick="expJLD('${s.id}')">Stáhnout soubor</button><button class="bs" onclick="cpJLD('${s.id}')">Kopírovat do schránky</button><button class="bs" onclick="V('editSlovnik')">Zpět</button></div>
    <label for="jlp" class="sr">Náhled JSON-LD</label>
    <textarea id="jlp" readonly style="font-family:monospace;font-size:12px;min-height:500px;background:var(--bg2)">${e(pretty)}</textarea>
  </div>`;
}
function expJLD(slId){
  const s=getSl(slId)||getASl();if(!s)return;
  const nm=(s.nazev_cs||'slovnik').replace(/\s+/g,'_').toLowerCase()+'_'+s.ak_ver+'.jsonld';
  dl(JSON.stringify(buildJLD(s),null,2),nm,'application/ld+json');
  toast('Exportováno: '+nm);
}
function cpJLD(slId){const s=getSl(slId);if(!s)return;navigator.clipboard.writeText(JSON.stringify(buildJLD(s),null,2)).then(()=>toast('JSON-LD zkopírován.'));}
function lo(cs,en){const o={cs:cs||''};if(en)o.en=en;return o;}
function buildJLD(s){
  const urovObj=UROVNE.find(u=>u.id===(s.uroven||'konceptualni'))||UROVNE[1];
  const doc={"@context":"https://ofn.gov.cz/slovníky/2026-02-26/kompletní/kontext.jsonld","iri":s.iri||'_:'+s.id,"typ":urovObj.typ,"název":lo(s.nazev_cs,s.nazev_en)};
  if(s.popis_cs)doc["popis"]=lo(s.popis_cs,s.popis_en);
  if(s.vytvoreno)doc["vytvořeno"]={"typ":"Časový okamžik","datum":s.vytvoreno};
  if(s.aktualizovano)doc["aktualizováno"]={"typ":"Časový okamžik","datum":s.aktualizovano};
  doc["pojmy"]=s.pojmy.map(p=>pjJLD(p));
  return doc;
}
function pjJLD(p){
  const td=TYPY.find(t=>t.id===p.typ);
  const obj={"iri":p.iri||'_:'+p.id,"typ":td?td.ofn:['Koncept','Pojem'],"název":lo(p.nc,p.ne)};
  if((p.ac&&p.ac.length)||(p.ae&&p.ae.length)){const a={};if(p.ac&&p.ac.length)a.cs=p.ac;if(p.ae&&p.ae.length)a.en=p.ae;obj["alternativní-název"]=a;}
  if(p.sn&&p.sn.length)obj["skrytý-název"]={cs:p.sn};
  if(p.pc)obj["popis"]=lo(p.pc,p.pe);
  if(p.dc)obj["definice"]=lo(p.dc,p.de);
  if(p.dus&&p.dus.length)obj["definující-ustanovení-právního-předpisu"]=p.dus;
  if(p.sus&&p.sus.length)obj["související-ustanovení-právního-předpisu"]=p.sus;
  if(p.dnl&&p.dnl.length)obj["definující-nelegislativní-zdroj"]=p.dnl.map(z=>{const o={"typ":"Digitální objekt","název":lo(z.n||z.nazev_cs||'')};if(z.p)o["popis"]=lo(z.p);if(z.u||z.url)o["url"]=z.u||z.url;return o;});
  if(p.snl&&p.snl.length)obj["související-nelegislativní-zdroj"]=p.snl.map(z=>{const o={"typ":"Digitální objekt","název":lo(z.n||z.nazev_cs||'')};if(z.p)o["popis"]=lo(z.p);if(z.u||z.url)o["url"]=z.u||z.url;return o;});
  if(p.ekv&&p.ekv.length)obj["ekvivalentní-pojem"]=p.ekv;
  // nadřazená-třída vs nadřazený-pojem podle typu
  if(p.nad&&p.nad.length){
    if(p.typ==='TypObjektu'||p.typ==='TypSubjektu')obj["nadřazená-třída"]=p.nad;
    else obj["nadřazený-pojem"]=p.nad;
  }
  if(p.ppdf)obj["je-sdílen-v-ppdf"]=true;
  if(p.zz)obj["způsob-získání-údaje"]=p.zz;
  if(p.to)obj["typ-obsahu-údaje"]=p.to;
  if(p.zs&&p.zs.length)obj["způsoby-sdílení-údaje"]=p.zs;
  if(p.typ==='Vlastnost'||p.typ==='Vztah'){if(p.ov)obj["obor-hodnot"]=p.ov;if(p.dob)obj["definiční-obor"]=p.dob;if(p.typ==='Vlastnost'&&p.nv&&p.nv.length)obj["nadřazená-vlastnost"]=p.nv;if(p.typ==='Vztah'&&p.nvz&&p.nvz.length)obj["nadřazený-vztah"]=p.nvz;}
  if(p.typ==='Trida'){if(p.nt&&p.nt.length)obj["nadřazená-třída"]=p.nt;if(p.ci&&p.cn)obj["instance-definovány-číselníkem"]={"iri":p.ci,"typ":"Číselník","datová-sada-v-nkod":p.cn};}
  if(p.typ==='TypObjektu'||p.typ==='TypSubjektu'){if(p.ag)obj["agenda"]=p.ag;if(p.ais)obj["agendový-informační-systém"]=p.ais;}
  // Ustanovení neveřejnosti - exportovat pro jakýkoliv typ s vyplněnými nus
  if(p.nus&&p.nus.length){
    obj["ustanovení-dokládající-neveřejnost-údaje"]=p.nus;
    // Přidat 'Neveřejný údaj' do typ array pokud ještě není
    if(!Array.isArray(obj.typ))obj.typ=[obj.typ];
    if(!obj.typ.includes('Neveřejný údaj'))obj.typ.push('Neveřejný údaj');
  }
  return obj;
}

    <div class="fg"><label for="impt">Nebo vložte JSON-LD obsah přímo:</label><textarea id="impt" style="font-family:monospace;font-size:12px;min-height:180px" placeholder='{"@context":"https://ofn.gov.cz/...","iri":"...","typ":["Slovník"],...}'></textarea></div>
    <div class="bg"><button class="bp" onclick="doImpT()">Importovat</button><button class="bs" onclick="V('projekt')">Zrušit</button></div>
  </div>`;
}
function doImpF(ev){const f=ev.target.files[0];if(!f)return;const r=new FileReader();r.onload=e=>{document.getElementById('impt').value=e.target.result;};r.readAsText(f);}
function doImpT(){
  const txt=document.getElementById('impt')?.value.trim();if(!txt){toast('Zadejte obsah.','w');return;}
  try{const d=JSON.parse(txt);const s=impJLD(d);S.slovniky.push(s);S.akSl=s.id;saveL();toast('Importováno: '+s.nazev_cs+' ('+s.pojmy.length+' pojmů)');V('editSlovnik');}
  catch(x){toast('Chyba parsování: '+x.message,'d');}
}
function impJLD(d){
  const typs=Array.isArray(d.typ)?d.typ:(d.typ?[d.typ]:[]);
  const impUrov=typs.includes('Konceptuální model')?'konceptualni':'tezaurus';
  const s=mkSl({
    iri:d.iri||'',
    uroven:impUrov,
    nc:(d['název']&&d['název'].cs)||'Importovaný slovník',
    ne:(d['název']&&d['název'].en)||'',
    pc:(d['popis']&&d['popis'].cs)||'',
    pe:(d['popis']&&d['popis'].en)||'',
    dc:(d['definice']&&d['definice'].cs)||'',
    de:(d['definice']&&d['definice'].en)||'',
    vyv:(d['vytvořeno']&&d['vytvořeno'].datum)||td(),
    akd:(d['aktualizováno']&&d['aktualizováno'].datum)||td(),
  });
  (d.pojmy||[]).forEach(pd=>{
    const typy=Array.isArray(pd.typ)?pd.typ:[pd.typ];
    // Určení primárního typu — pořadí priorit (specifičtější před obecnějším)
    let typ='Pojem';
    if(typy.includes('Vztah'))typ='Vztah';
    else if(typy.includes('Vlastnost'))typ='Vlastnost';
    else if(typy.includes('Typ objektu práva'))typ='TypObjektu';
    else if(typy.includes('Typ subjektu práva'))typ='TypSubjektu';
    else if(typy.includes('Třída'))typ='Trida';
    else if(typy.includes('Neveřejný údaj'))typ='NeverejnyUdaj';
    else if(typy.includes('Veřejný údaj'))typ='VerejnyUdaj';

    // alternativní-název může být objekt nebo pole
    const altCs=pd['alternativní-název']&&pd['alternativní-název'].cs;
    const altEn=pd['alternativní-název']&&pd['alternativní-název'].en;
    const toArr=v=>!v?[]:Array.isArray(v)?v:[v];
    const toIriArr=v=>!v?[]:Array.isArray(v)?v:[v];

    s.pojmy.push(mkPj({
      typ,
      iri:pd.iri||'',
      nc:(pd['název']&&pd['název'].cs)||'',
      ne:(pd['název']&&pd['název'].en)||'',
      ac:toArr(altCs),
      ae:toArr(altEn),
      sn:toArr(pd['skrytý-název']&&pd['skrytý-název'].cs),
      pc:(pd['popis']&&pd['popis'].cs)||'',
      pe:(pd['popis']&&pd['popis'].en)||'',
      dc:(pd['definice']&&pd['definice'].cs)||'',
      de:(pd['definice']&&pd['definice'].en)||'',
      dus:toIriArr(pd['definující-ustanovení-právního-předpisu']),
      sus:toIriArr(pd['související-ustanovení-právního-předpisu']),
      nus:toIriArr(pd['ustanovení-dokládající-neveřejnost-údaje']),
      dnl:(pd['definující-nelegislativní-zdroj']||[]).map(z=>({n:(z['název']&&z['název'].cs)||'',p:(z['popis']&&z['popis'].cs)||'',u:z.url||''})),
      snl:(pd['související-nelegislativní-zdroj']||[]).map(z=>({n:(z['název']&&z['název'].cs)||'',p:(z['popis']&&z['popis'].cs)||'',u:z.url||''})),
      ekv:toIriArr(pd['ekvivalentní-pojem']),
      // Hierarchie: nadřazený-pojem nebo nadřazená-třída
      nad:toIriArr(typ==='Trida'?pd['nadřazený-pojem']:pd['nadřazený-pojem']||pd['nadřazená-třída']),
      nt:toIriArr(typ==='Trida'?pd['nadřazená-třída']:null),
      // Typ-specifická pole
      ov:pd['obor-hodnot']||'',
      dob:pd['definiční-obor']||'',
      ag:pd['agenda']||'',
      ais:pd['agendový-informační-systém']||'',
      ppdf:pd['je-sdílen-v-ppdf']||false,
      zz:pd['způsob-získání-údaje']||'',
      to:pd['typ-obsahu']||'',
      zs:toArr(pd['způsoby-sdílení']),
    }));
  });
  return s;
}

function noteWidget(notes,ctx){
  // ctx = string like 'sl:ID' or 'pj:SL_ID:PJ_ID'
  const eid=btoa(ctx).replace(/=/g,'');
  return`<div class="fg" id="nw-${eid}">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:7px">
      <strong style="font-size:.88rem">Autorské poznámky</strong>
      <span class="xs">(interní, nejdou do exportu)</span>
      <button type="button" class="bs sm" onclick="addNote('${eid}','${ctx}')">+ Přidat poznámku</button>
    </div>
    <div id="nl-${eid}">${renderNotes(notes,ctx,eid)}</div>
  </div>`;
}
function renderNotes(notes,ctx,eid){
  if(!notes||!notes.length)return'<p class="xs" style="color:var(--tx3);font-style:italic">Žádné poznámky.</p>';
  return notes.map((n,i)=>`
    <div class="pnote ${n.stav==='vyrizena'?'vyrizena':''}" id="pn-${n.id}">
      <div class="pnote-hdr">
        <span class="${n.stav==='vyrizena'?'nbadge-v':'nbadge-n'}">${n.stav==='vyrizena'?'✓ Vyřízená':'● Nevyřízená'}</span>
        <span class="xs">${e(n.datum)}</span>
        <button type="button" class="bs sm" onclick="toggleNote('${ctx}',${i})" style="padding:2px 8px;font-size:12px">${n.stav==='vyrizena'?'Znovu otevřít':'Označit vyřízenou'}</button>
        <button type="button" class="bd sm" onclick="delNote('${ctx}',${i})" style="padding:2px 8px;font-size:12px" aria-label="Smazat poznámku">✕</button>
      </div>
      <div class="pnote-txt">${e(n.txt)}</div>
    </div>`).join('');
}
function getNoteTarget(ctx){
  const parts=ctx.split(':');
  if(parts[0]==='sl'){return getSl(parts[1]);}
  if(parts[0]==='pj'){const s=getSl(parts[1]);return s?s.pojmy.find(p=>p.id===parts[2]):null;}
  if(parts[0]==='cs'){return getCs(parts[1]);}
  if(parts[0]==='pl'){const c=getCs(parts[1]);return c?c.polozky.find(p=>p.id===parts[2]):null;}
  return null;
}
function addNote(eid,ctx){
  const txt=prompt('Text autorské poznámky:');
  if(!txt||!txt.trim())return;
  const target=getNoteTarget(ctx);
  if(!target)return;
  if(!target.poznamky)target.poznamky=[];
  target.poznamky.push(mkNote(txt.trim()));
  saveL();
  const container=document.getElementById('nl-'+eid);
  if(container)container.innerHTML=renderNotes(target.poznamky,ctx,eid);
}
function toggleNote(ctx,idx){
  const target=getNoteTarget(ctx);
  if(!target||!target.poznamky||!target.poznamky[idx])return;
  const n=target.poznamky[idx];
  n.stav=n.stav==='vyrizena'?'nevyrizena':'vyrizena';
  saveL();
  const eid=btoa(ctx).replace(/=/g,'');
  const container=document.getElementById('nl-'+eid);
  if(container)container.innerHTML=renderNotes(target.poznamky,ctx,eid);
  // refresh sidebar note badges
  rSide();
}
function delNote(ctx,idx){
  const target=getNoteTarget(ctx);
  if(!target||!target.poznamky)return;
  target.poznamky.splice(idx,1);
  saveL();
  const eid=btoa(ctx).replace(/=/g,'');
  const container=document.getElementById('nl-'+eid);
  if(container)container.innerHTML=renderNotes(target.poznamky,ctx,eid);
}
function countNotes(obj,stavFilter){
  if(!obj||!obj.poznamky)return 0;
  if(!stavFilter)return obj.poznamky.length;
  return obj.poznamky.filter(n=>n.stav===stavFilter).length;
}
function allNotes(){
  const res=[];
  S.slovniky.forEach(s=>{
    (s.poznamky||[]).forEach(n=>res.push({n,ctx:'sl:'+s.id,ctxLbl:'Slovník: '+s.nazev_cs,nazev:s.nazev_cs,typ:'slovnik'}));
    s.pojmy.forEach(p=>{
      (p.poznamky||[]).forEach(n=>res.push({n,ctx:'pj:'+s.id+':'+p.id,ctxLbl:'Pojem: '+p.nc+' ('+s.nazev_cs+')',nazev:p.nc,typ:p.typ}));
    });
  });
  (S.ciselniky||[]).forEach(c=>{
    (c.poznamky||[]).forEach(n=>res.push({n,ctx:'cs:'+c.id,ctxLbl:'Číselník: '+c.nazev_cs,nazev:c.nazev_cs,typ:'ciselniky'}));
    c.polozky.forEach(p=>{
      (p.poznamky||[]).forEach(n=>res.push({n,ctx:'pl:'+c.id+':'+p.id,ctxLbl:'Položka: '+p.nazev_cs+' ('+c.nazev_cs+')',nazev:p.nazev_cs,typ:'polozka'}));
    });
  });
  return res;
}

function filtNotes(){

  if(slId)all=all.filter(x=>x.ctx.includes(slId));
  if(typ)all=all.filter(x=>x.typ===typ);
  const el=document.getElementById('notes-list');
  if(el)el.innerHTML=renderNotesList(all);
}
function renderNotesList(notes){

      </div>
      <div class="pnote-txt">${e(n.txt)}</div>

}
function toggleNoteGlobal(ctx,nid){
  const target=getNoteTarget(ctx);
  if(!target||!target.poznamky)return;
  const n=target.poznamky.find(x=>x.id===nid);
  if(!n)return;
  n.stav=n.stav==='vyrizena'?'nevyrizena':'vyrizena';
  saveL();filtNotes();
}

// ── IRI AUTO-GENEROVÁNÍ ──
function slugify(text){
  // Czech-aware slug: strip diacritics, lowercase, replace spaces with hyphens
  return text.normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .toLowerCase().trim()
    .replace(/[^a-z0-9\s-]/g,'')
    .replace(/\s+/g,'-')
    .replace(/-+/g,'-')
    .replace(/^-|-$/g,'');
}
function suggestPojemIri(nazevCs, slovnikIri){
  if(!nazevCs||!slovnikIri) return '';
  const base = slovnikIri.replace(/\/+$/,'');
  return base + '/pojem/' + slugify(nazevCs);
}
function suggestSlovnikIri(nazevCs, orgBase){
  if(!nazevCs) return '';
  const base = (orgBase||'https://slovník.gov.cz/datový').replace(/\/+$/,'');
  return base + '/' + slugify(nazevCs);
}
function suggestCiselnikIri(nazevCs, orgBase){
  if(!nazevCs) return '';
  const base = (orgBase||'https://data.gov.cz/zdroj/číselníky').replace(/\/+$/,'');
  return base + '/' + slugify(nazevCs);
}
function suggestPolozkaIri(kodOrNazev, ciselnikIri){
  if(!kodOrNazev||!ciselnikIri) return '';
  return ciselnikIri.replace(/\/+$/,'') + '/položky/' + slugify(kodOrNazev);
}

function mkCs(d={}){

    id:uid(),

    akronym:d.akronym||'',
    nazev_cs:d.nc||'',

    definice_en:d.de||'',
    popis_cs:d.pc||'',
    popis_en:d.pe||'',
    platnost_od:d.pod||'',

    vytvoreno:d.vyv||td(),
    aktualizovano:d.akd||td(),

function mkPl(d={}){
  return{
    id:uid(),
    iri:d.iri||'',
    typ:'Položka',
    kod:d.kod||'',
    nazev_cs:d.nc||'',
    nazev_en:d.ne||'',
    alt_nazev_cs:d.anc||'',
    alt_nazev_en:d.ane||'',
    zkr_nazev_cs:d.znc||'',
    zkr_nazev_en:d.zne||'',
    definice_cs:d.dc||'',
    definice_en:d.de||'',
    popis_cs:d.pc||'',
    popis_en:d.pe||'',
    platnost_od:d.pod||'',
    platnost_do:d.pdo||'',
    poznamky:d.poznamky||[],
  };
}
const getCs=id=>S.ciselniky.find(c=>c.id===id);
const getACs=()=>S.akCs?getCs(S.akCs):null;
const getPl=(csId,plId)=>{const c=getCs(csId);return c?c.polozky.find(p=>p.id===plId):null;};

// ── SEZNAM ČÍSELNÍKŮ ──
function vCiselniky(){
  if(S.akCs&&getCs(S.akCs))return vEdCs();
  return`<h2 class="sh">Číselníky projektu</h2>
  ${!S.ciselniky.length?'<div class="al ali">Zatím žádný číselník. Vytvořte první tlačítkem níže.</div>':''}
  <div class="bg" style="margin-bottom:13px">
    <button class="bp" onclick="V('novyCs')">+ Vytvořit nový číselník</button>
    <button class="bs" onclick="V('importCs')">Importovat JSON-LD</button>
  </div>
  ${S.ciselniky.map(c=>csCard(c)).join('')}`;
}
function csCard(c){
  const nv=countNotes(c,'nevyrizena')+(c.polozky||[]).reduce((a,p)=>a+countNotes(p,'nevyrizena'),0);
  return`<div class="panel">
    <div class="jb">
      <div>
        <h3 style="font-family:var(--fn);font-size:1.05rem">${e(c.nazev_cs)||'(bez názvu)'}</h3>
        ${c.nazev_en?`<div class="xs">${e(c.nazev_en)}</div>`:''}
        ${c.akronym?`<div class="xs"><strong>Akronym:</strong> ${e(c.akronym)}</div>`:''}
        ${c.kod?`<div class="xs"><strong>Kód:</strong> ${e(c.kod)}</div>`:''}
      </div>
      <div class="flex"><span class="bdg ${sCls(c.stav)}">${sLbl(c.stav)}</span><span class="xs">v${e(c.ak_ver)}</span>${nv?`<span class="nbadge-n">${nv}</span>`:''}</div>
    </div>
    ${c.popis_cs?`<p style="margin:6px 0;color:var(--tx2);font-size:14px">${e(c.popis_cs)}</p>`:''}
    <div class="xs" style="margin:3px 0">${c.iri?`<strong>IRI:</strong> <code>${e(c.iri)}</code>`:'<em>IRI není zadáno</em>'}</div>
    <div class="xs" style="margin:3px 0 9px"><strong>Položek:</strong> ${c.polozky.length}</div>
    <div class="bg">
      <button class="bp sm" onclick="selCs('${c.id}')">Otevřít</button>
      <button class="bs sm" onclick="V('verzeCis',{cs:'${c.id}'})">Verze</button>
      <button class="bs sm" onclick="expCsJLD('${c.id}')">Export JSON-LD</button>
      <button class="bd sm" onclick="delCs('${c.id}')">Smazat</button>
    </div>
  </div>`;
}

// ── NOVÝ ČÍSELNÍK ──

  return`<h2 class="sh">Nový číselník</h2>

}
function csForm(c){

      <div class="fg"><label for="csf-nc">Název (česky) <span class="req" aria-hidden="true">*</span></label><input type="text" id="csf-nc" name="nc" value="${e(c.nazev_cs||c.nc||'')}" required oninput="autoIriCiselnik(this,'csf-iri')"></div>

    <div class="g2">
      <div class="fg"><label for="csf-kod">Kód číselníku</label><input type="text" id="csf-kod" name="kod" value="${e(c.kod||'')}" placeholder="napr. CS001"></div>
      <div class="fg"><label for="csf-akr">Akronym</label><input type="text" id="csf-akr" name="akronym" value="${e(c.akronym||'')}" placeholder="napr. TTC"></div>
    </div>
    <div class="fg"><label for="csf-iri">IRI číselníku <span class="hint">(globální identifikátor)</span></label>
      <div class="ir"><input type="url" id="csf-iri" name="iri" value="${e(c.iri||'')}" placeholder="https://data.gov.cz/zdroj/číselníky/...">
      <button type="button" class="bs sm" onclick="genIriCiselnik()" title="Generovat IRI z názvu">⚙ Generovat</button></div>
    </div>
    <div class="fg"><label for="csf-nkod">Datová sada v NKOD <span class="hint">(URL datové sady v Národním katalogu otevřených dat)</span></label>
      <input type="url" id="csf-nkod" name="nkod" value="${e(c.nkod_url||'')}" placeholder="https://data.gov.cz/zdroj/datové-sady/..."></div>
  </fieldset>
  <fieldset><legend>Popis a definice</legend>
    <div class="g2">
      <div class="fg"><label for="csf-pc">Popis (česky)</label><textarea id="csf-pc" name="pc">${e(c.popis_cs||c.pc||'')}</textarea></div>
      <div class="fg"><label for="csf-pe">Popis (anglicky)</label><textarea id="csf-pe" name="pe">${e(c.popis_en||c.pe||'')}</textarea></div>
    </div>
    <div class="g2">
      <div class="fg"><label for="csf-dc">Definice (česky)</label><textarea id="csf-dc" name="dc">${e(c.definice_cs||c.dc||'')}</textarea></div>
      <div class="fg"><label for="csf-de">Definice (anglicky)</label><textarea id="csf-de" name="de">${e(c.definice_en||c.de||'')}</textarea></div>
    </div>
  </fieldset>
  <fieldset><legend>Správa a platnost</legend>
    <div class="g2">
      <div class="fg"><label for="csf-stav">Stav</label><select id="csf-stav" name="stav">${sos(STAVY,c.stav,x=>x.id,x=>x.lbl)}</select></div>
      <div class="fg"><label for="csf-pod">Platnost od</label><input type="date" id="csf-pod" name="pod" value="${e(c.platnost_od||c.pod||'')}"></div>
    </div>
    <div class="fg"><label for="csf-pdo">Platnost do <span class="hint">(prázdné = bez omezení)</span></label><input type="date" id="csf-pdo" name="pdo" value="${e(c.platnost_do||c.pdo||'')}"></div>
  </fieldset>`;
}
function autoIriCiselnik(el,iriId){
  const iriInp=document.getElementById(iriId);
  if(!iriInp||iriInp.value.trim())return;
  iriInp.value=suggestCiselnikIri(el.value,S.projekt.orgIriBase||'');
}
function crCs(ev){
  ev.preventDefault();const f=ev.target;
  const c=mkCs({nc:f.nc.value.trim(),ne:f.ne.value.trim(),iri:f.iri.value.trim(),kod:f.kod.value.trim(),akronym:f.akronym.value.trim(),pc:f.pc.value.trim(),pe:f.pe.value.trim(),dc:f.dc.value.trim(),de:f.de.value.trim(),pod:f.pod.value,pdo:f.pdo.value,nkod:f.nkod.value.trim(),stav:f.stav.value});
  S.ciselniky.push(c);S.akCs=c.id;S.akPl=null;saveL();toast('Číselník vytvořen.');V('editCs');
}
function selCs(id){S.akCs=id;S.akPl=null;V('editCs');}
function delCs(id){
  const c=getCs(id);if(!c)return;
  oDlg('Smazat číselník',`<p>Smazat číselník <strong>${e(c.nazev_cs)}</strong> a všechny jeho položky (${c.polozky.length})?</p><p class="xs" style="color:var(--dg);margin-top:7px">Nevratná akce.</p>`,
    `<button class="bd" onclick="cfDelCs('${id}')">Ano, smazat</button><button class="bs" onclick="cDlg()">Zrušit</button>`);
}
function cfDelCs(id){
  S.ciselniky=S.ciselniky.filter(x=>x.id!==id);
  if(S.akCs===id){S.akCs=S.ciselniky.length?S.ciselniky[0].id:null;S.akPl=null;}
  saveL();cDlg();toast('Číselník smazán.');V('ciselniky');
}

// ── EDITACE ČÍSELNÍKU ──
function vEdCs(){
  const c=getACs();if(!c)return vCiselniky();
  return`<div class="jb" style="margin-bottom:13px">
    <h2 class="sh" style="margin:0">${e(c.nazev_cs)||'(bez názvu)'}</h2>
    <div class="flex"><span class="bdg ${sCls(c.stav)}">${sLbl(c.stav)}</span><span class="xs">v${e(c.ak_ver)}</span></div>
  </div>
  <div class="panel"><div class="ptit">Metadata číselníku</div>
    <form onsubmit="savCs(event,'${c.id}')">${csForm(c)}<div class="bg">
      <button type="submit" class="bp">Uložit metadata</button>
      <button type="button" class="bs" onclick="V('verzeCis',{cs:'${c.id}'})">Správa verzí</button>
        <button type="button" class="bs" onclick="V('sestavaCs')">🖨 Sestava položek</button>
      <button type="button" class="bs" onclick="expCsJLD('${c.id}')">Export JSON-LD</button>
      <button type="button" class="bd" onclick="delCs('${c.id}')">Smazat číselník</button>
    </div></form>
    ${noteWidget(c.poznamky||[],'cs:'+c.id)}
  </div>
  <div class="panel">
    <div class="sbar" style="margin-bottom:9px">
      <div class="ptit" style="margin:0">Položky číselníku (${c.polozky.length})</div>
      <label for="pl-stav-f">Stav: <select id="pl-stav-f" onchange="filtPl('${c.id}')"><option value="">Vše</option>${STAVY.map(st=>`<option value="${st.id}">${st.lbl}</option>`).join('')}</select></label>
      <button class="bp sm" onclick="V('novaPl',{cs:'${c.id}'})">+ Přidat položku</button> <button class="bs sm" onclick="V('importCsvCs')">&#x2B06; Import CSV/TSV</button>
    </div>
    <div id="pl-area">${plTbl(c)}</div>
  </div>`;
}
function savCs(ev,id){
  ev.preventDefault();const f=ev.target;const c=getCs(id);if(!c)return;
  c.nazev_cs=f.nc.value.trim();c.nazev_en=f.ne.value.trim();c.iri=f.iri.value.trim();
  c.kod=f.kod.value.trim();c.akronym=f.akronym.value.trim();
  c.popis_cs=f.pc.value.trim();c.popis_en=f.pe.value.trim();
  c.definice_cs=f.dc.value.trim();c.definice_en=f.de.value.trim();
  c.platnost_od=f.pod.value;c.platnost_do=f.pdo.value;
  c.nkod_url=f.nkod.value.trim();c.stav=f.stav.value;
  c.aktualizovano=td();saveL();toast('Číselník uložen.');render();
}
function plTbl(c){
  if(!c.polozky||!c.polozky.length)return'<p class="emp">Číselník nemá žádné položky.</p>';
  const csId=c.id||S.akCs;
  return`<div>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:7px">
      <label class="cbl xs"><input type="checkbox" id="sel-all-pl" onchange="selAllPl(this,'${csId}')"> Vybrat vše</label>
      <button class="bs sm" onclick="showBulkPl('${csId}')" id="bulk-pl-btn" style="display:none">Hromadná akce…</button>
    </div>
    <div id="bulk-pl-bar" style="display:none"></div>
    <div class="tw"><table id="pl-tbl-${csId}"><thead><tr>
      <th style="width:32px"></th>
      <th>Kód</th><th>Název (CS)</th><th>Popis / Definice</th><th>Platnost</th><th>Stav</th><th>Akce</th>
    </tr></thead><tbody>
    ${c.polozky.map(p=>`<tr id="plr-${p.id}">
      <td><input type="checkbox" class="pl-cb" data-csid="${csId}" data-plid="${p.id}" onchange="onPlCb('${csId}')" aria-label="Vybrat položku ${e(p.kod)}"></td>
      <td><strong>${e(p.kod)}</strong> <span class="bdg ${sCls(p.stav||'rozpracovany')}" style="margin-left:0">${sLbl(p.stav||'rozpracovany')}</span></td>
      <td><a href="#" onclick="selPl('${p.id}','${csId}');return false">${e(p.nazev_cs)}</a>${p.nazev_en?`<br><span class="xs">${e(p.nazev_en)}</span>`:''}</td>
      <td class="xs">${e((p.definice_cs||p.popis_cs||'').substring(0,100))}</td>
      <td class="xs">${p.platnost_od||''}${p.platnost_do?' – '+e(p.platnost_do):''}</td>
      <td class="xs">${e(sLbl(p.stav||'rozpracovany'))}</td>
      <td><button class="bs sm" onclick="selPl('${p.id}','${csId}')">Upravit</button> <button class="bd sm" onclick="delPl('${csId}','${p.id}')">✕</button></td>
    </tr>`).join('')}
    </tbody></table></div>
  </div>`;
}
function selAllPl(cb,csId){
  document.querySelectorAll('.pl-cb[data-csid="'+csId+'"]').forEach(c=>{c.checked=cb.checked;const row=document.getElementById('plr-'+c.getAttribute('data-plid'));if(row)row.classList.toggle('sel-row',cb.checked);});
  onPlCb(csId);
}
function onPlCb(csId){
  const sel=document.querySelectorAll('.pl-cb[data-csid="'+csId+'"]:checked');
  const btn=document.getElementById('bulk-pl-btn');
  if(btn)btn.style.display=sel.length?'':'none';
}
function getSelPlIds(csId){
  return [...document.querySelectorAll('.pl-cb[data-csid="'+csId+'"]:checked')].map(c=>c.getAttribute('data-plid'));
}
function showBulkPl(csId){
  const ids=getSelPlIds(csId);if(!ids.length)return;
  const bar=document.getElementById('bulk-pl-bar');if(!bar)return;
  bar.style.display='';
  bar.innerHTML=`<div class="bulk-bar" role="region" aria-label="Hromadné operace pro položky">
    <span class="bc">Vybráno: ${ids.length} položek</span>
    <button onclick="bulkPlStav('${csId}')">Změnit stav</button>
    <button onclick="bulkPlPlatnost('${csId}')">Nastavit platnost</button>
    <button onclick="bulkPlNote('${csId}')">Přidat poznámku</button>
    <button onclick="bulkPlEli('${csId}')">Přidat leg. ustanovení</button>
    <button onclick="bulkPlDel('${csId}')" style="background:rgba(220,50,50,.35)">Smazat vybrané</button>
    <button class="bcc" onclick="document.getElementById('bulk-pl-bar').style.display='none'">✕</button>
  </div>`;
}
function bulkPlStav(csId){
  const ids=getSelPlIds(csId);if(!ids.length)return;
  oDlg('Změnit stav vybraných položek',
    `<div class="fg"><label for="bulk-pl-stav">Nový stav</label><select id="bulk-pl-stav">${sos(STAVY,'rozpracovany',x=>x.id,x=>x.lbl)}</select></div>
     <p class="xs" style="margin-top:8px">Bude aplikováno na ${ids.length} položek.</p>`,
    `<button class="bp" onclick="doBulkPlStav('${csId}')">Použít</button><button class="bs" onclick="cDlg()">Zrušit</button>`);
}
function doBulkPlStav(csId){
  const c=getCs(csId);if(!c)return;
  const ids=getSelPlIds(csId);
  const stav=document.getElementById('bulk-pl-stav').value;
  ids.forEach(id=>{const p=c.polozky.find(x=>x.id===id);if(p)p.stav=stav;});
  c.aktualizovano=td();saveL();cDlg();toast('Stav upraven pro '+ids.length+' položek.');render();
}
function bulkPlPlatnost(csId){
  const ids=getSelPlIds(csId);if(!ids.length)return;
  oDlg('Nastavit platnost vybraných položek',
    `<div class="g2">
      <div class="fg"><label for="bulk-pl-pod">Platnost od <span class="hint">(prázdné = neměnit)</span></label><input type="date" id="bulk-pl-pod"></div>
      <div class="fg"><label for="bulk-pl-pdo">Platnost do <span class="hint">(prázdné = neměnit)</span></label><input type="date" id="bulk-pl-pdo"></div>
     </div>
     <p class="xs" style="margin-top:8px">Bude aplikováno na ${ids.length} položek.</p>`,
    `<button class="bp" onclick="doBulkPlPlatnost('${csId}')">Použít</button><button class="bs" onclick="cDlg()">Zrušit</button>`);
}
function doBulkPlPlatnost(csId){
  const c=getCs(csId);if(!c)return;
  const ids=getSelPlIds(csId);
  const pod=document.getElementById('bulk-pl-pod').value;
  const pdo=document.getElementById('bulk-pl-pdo').value;
  ids.forEach(id=>{
    const p=c.polozky.find(x=>x.id===id);if(!p)return;
    if(pod)p.platnost_od=pod;
    if(pdo)p.platnost_do=pdo;
  });
  c.aktualizovano=td();saveL();cDlg();toast('Platnost upravena pro '+ids.length+' položek.');render();
}
function bulkPlNote(csId){
  const ids=getSelPlIds(csId);if(!ids.length)return;
  oDlg('Přidat autorskou poznámku',
    `<div class="fg"><label for="bulk-pl-note">Text poznámky</label><textarea id="bulk-pl-note" style="min-height:80px"></textarea></div>
     <p class="xs" style="margin-top:8px">Bude přidána k ${ids.length} položkám.</p>`,
    `<button class="bp" onclick="doBulkPlNote('${csId}')">Přidat</button><button class="bs" onclick="cDlg()">Zrušit</button>`);
}
function doBulkPlNote(csId){
  const c=getCs(csId);if(!c)return;
  const ids=getSelPlIds(csId);
  const txt=document.getElementById('bulk-pl-note').value.trim();
  if(!txt){toast('Zadejte text.','w');return;}
  ids.forEach(id=>{const p=c.polozky.find(x=>x.id===id);if(p){if(!p.poznamky)p.poznamky=[];p.poznamky.push(mkNote(txt));}});
  c.aktualizovano=td();saveL();cDlg();toast('Poznámka přidána k '+ids.length+' položkám.');render();
}

function vNovaPl(){
  const c=getACs();if(!c)return'<p>Vyberte číselník.</p>';
  return`<h2 class="sh">Nová položka — ${e(c.nazev_cs)}</h2>
  <div class="panel"><form onsubmit="crPl(event,'${c.id}')">
    <div id="pl-form-area">${plForm(mkPl(),c)}</div>
    <div class="bg"><button type="submit" class="bp">Vytvořit položku</button><button type="button" class="bs" onclick="V('editCs')">Zrušit</button></div>
  </form></div>`;
}
function crPl(ev,csId){
  ev.preventDefault();const c=getCs(csId);if(!c)return;
  const p=colPl(ev.target,csId);c.polozky.push(p);c.aktualizovano=td();S.akPl=p.id;
  saveL();toast('Položka přidána.');V('editCs');
}
function selPl(plId,csId){S.akCs=csId;S.akPl=plId;V('editPl');}
function vEdPl(){
  const c=getACs();if(!c)return'<p>Vyberte číselník.</p>';
  const p=c.polozky.find(x=>x.id===S.akPl);if(!p)return'<p>Položka nenalezena.</p>';
  return`<div class="jb" style="margin-bottom:10px">
    <h2 class="sh" style="margin:0">${e(p.kod)} – ${e(p.nazev_cs)||'(bez názvu)'}</h2>
    <button class="bs sm" onclick="V('editCs')">← Zpět na číselník</button>
  </div>
  <div class="panel"><form onsubmit="savPl(event,'${c.id}','${p.id}')">
    ${plForm(p,c)}
    <div class="bg"><button type="submit" class="bp">Uložit položku</button><button type="button" class="bd" onclick="delPl('${c.id}','${p.id}')">Smazat</button><button type="button" class="bs" onclick="V('editCs')">Zpět</button></div>
  </form>
  ${noteWidget(p.poznamky||[],'pl:'+c.id+':'+p.id)}
  </div>`;
}
function savPl(ev,csId,plId){
  ev.preventDefault();const c=getCs(csId);if(!c)return;
  const i=c.polozky.findIndex(x=>x.id===plId);if(i<0)return;
  const u=colPl(ev.target,csId);u.id=plId;
  c.polozky[i]=u;c.aktualizovano=td();saveL();toast('Položka uložena.');render();
}
function delPl(csId,plId){

function expCsJLD(csId){
  const c=getCs(csId)||getACs();if(!c)return;
  const jld=buildCsJLD(c);
  const nm=(c.nazev_cs||'ciselniky').replace(/\s+/g,'_').toLowerCase()+'_'+c.ak_ver+'.jsonld';
  dl(JSON.stringify(jld,null,2),nm,'application/ld+json');
  toast('Exportováno: '+nm);
}
function buildCsJLD(c){
  const doc={
    "@context":"https://ofn.gov.cz/číselníky/2022-02-08/kontexty/číselník.jsonld",
    "iri":c.iri||'_:'+c.id,
    "typ":"Číselník",
    "název":lo(c.nazev_cs,c.nazev_en),
  };
  if(c.kod)doc["kód"]=c.kod;
  if(c.akronym)doc["akronym"]=c.akronym;
  if(c.popis_cs)doc["popis"]=lo(c.popis_cs,c.popis_en);
  if(c.definice_cs)doc["definice"]=lo(c.definice_cs,c.definice_en);
  if(c.platnost_od||c.platnost_do){
    doc["platnost"]={};
    if(c.platnost_od)doc["platnost"]["začátek"]={typ:"Časový okamžik",datum:c.platnost_od};
    if(c.platnost_do)doc["platnost"]["konec"]={typ:"Časový okamžik",datum:c.platnost_do};
  }
  if(c.nkod_url)doc["nkod_url"]=c.nkod_url;
  doc["položky"]=c.polozky.map(p=>{
    const item={
      "iri":p.iri||'_:'+p.id,
      "typ":"Položka",
      "kód":p.kod,
      "název":lo(p.nazev_cs,p.nazev_en),
    };
    if(p.alt_nazev_cs||p.alt_nazev_en)item["alt_název"]=lo(p.alt_nazev_cs,p.alt_nazev_en);
    if(p.zkr_nazev_cs||p.zkr_nazev_en)item["zkr_název"]=lo(p.zkr_nazev_cs,p.zkr_nazev_en);
    if(p.definice_cs)item["definice"]=lo(p.definice_cs,p.definice_en);
    if(p.popis_cs)item["popis"]=lo(p.popis_cs,p.popis_en);
    if(p.platnost_od||p.platnost_do){
      item["platnost"]={};
      if(p.platnost_od)item["platnost"]["začátek"]={typ:"Časový okamžik",datum:p.platnost_od};
      if(p.platnost_do)item["platnost"]["konec"]={typ:"Časový okamžik",datum:p.platnost_do};
    }
    return item;
  });
  return doc;
}

// ── ELI PARSER — lidsky čitelný popis ──
function parseEli(url) {
  if (!url) return url;
  // Match: .../eli/cz/sb/{rok}/{cislo}[/{datum}][/cast_N][/par_N]...
  // Supports both e-sbirka.cz and opendata.eselpoint.cz formats
  const m = url.match(/eli\/cz\/sb\/(\d{4})\/(\d+)(?:\/([^/]+))?((?:\/[a-z][^/]*)*)/);
  if (!m) return url;
  const rok = m[1], cislo = m[2], datum = m[3], rest = m[4] || '';
  
  // Parse rest segments
  // rest may include /datum/dokument/norma/... or just /cast_N/par_N/...
  // Filter out non-structural segments
  const segs = rest.split('/').filter(s => s && s !== 'dokument' && s !== 'norma' && !/^\d{4}-\d{2}-\d{2}$/.test(s) && s !== 'aktualni');
  const parts = {};
  segs.forEach(s => {
    const pm = s.match(/^(cast|par|odst|pism|bod|hl|dil|pododdil|oddil|priloha)_(.+)$/);
    if (pm) parts[pm[1]] = pm[2];
  });
  
  // Build human label
  let est = '';
  if (parts.par) {
    est += '§ ' + parts.par.replace(/^0+/, '');
  } else if (parts.cast) {
    est += 'část ' + parts.cast;
  } else if (parts.hl) {
    est += 'hlava ' + parts.hl;
  }
  if (parts.odst) est += ' odst. ' + parts.odst;
  if (parts.pism) est += ' písm. ' + parts.pism.replace(/^0+/, '') + ')';
  if (parts.bod) est += ' bod ' + parts.bod;

  let label = 'Předpis ' + cislo + '/' + rok + ' Sb.';
  if (est) label += ', ' + est;
  if (datum && datum !== 'aktualni') {
    const d = datum.split('-');
    if (d.length === 3) label += ' (znění k ' + parseInt(d[2]) + '. ' + parseInt(d[1]) + '. ' + d[0] + ')';
  }
  return label;
}

  // Group by type
  // POLE_LABELS defined globally above
  // fmtV defined below


  // POLE_LABELS defined globally above
  const fmtV=(k,v)=>{if(v===null||v===undefined||v==='')return'—';if(typeof v==='boolean')return v?'Ano':'Ne';if(Array.isArray(v))return v.length?v.map(x=>e(String(x))).join('; '):'—';if(k==='typ')return tLbl(v);if(k==='stav')return sLbl(v);return e(String(v));};
  const pojemCard=(p,bg,lbl,brd)=>{
    let h='<div style="border:1px solid '+brd+';border-radius:4px;padding:14px 16px;margin-bottom:12px;background:'+bg+';page-break-inside:avoid">';
    h+='<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:10px;flex-wrap:wrap">';
    h+='<div><strong style="font-size:1rem">'+e(p.nc||'(bez názvu)')+'</strong>';
    if(p.ne)h+=' <span style="color:#7a7875;font-size:13px">/ '+e(p.ne)+'</span>';
    h+='</div><div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center">';
    h+='<span style="font-size:11px;padding:2px 8px;border-radius:10px;background:#eceae4;color:#4a4845">'+e(tLbl(p.typ))+'</span>';
    h+='<span style="font-size:11px;padding:2px 8px;border-radius:10px;background:#f5f3ef;color:#7a7875">'+e(sLbl(p.stav||'rozpracovany'))+'</span>';
    if(lbl)h+='<span style="font-size:11px;padding:2px 8px;border-radius:10px;font-weight:bold;background:'+brd+';color:#fff">'+lbl+'</span>';
    h+='</div></div>';
    if(p.ac&&p.ac.length)h+='<div style="font-size:13px;margin-bottom:6px"><strong>Synonyma:</strong> '+p.ac.join(', ')+'</div>';
    if(p.dc)h+='<div style="margin-bottom:6px"><strong style="font-size:13px">Definice:</strong> <span style="font-size:13px">'+e(p.dc)+'</span></div>';
    if(p.pc)h+='<div style="margin-bottom:6px"><strong style="font-size:13px">Popis:</strong> <span style="font-size:13px">'+e(p.pc)+'</span></div>';
    if(p.dus&&p.dus.length)h+='<div style="margin-bottom:4px;font-size:13px"><strong>Definující ustanovení:</strong> '+p.dus.map(u=>'<a href="'+e(eliToEsbirkaUrl(u))+'" style="color:#1a5c8a">'+parseEli(u)+'</a>').join('; ')+'</div>';
    if(p.sus&&p.sus.length)h+='<div style="margin-bottom:4px;font-size:13px"><strong>Související ustanovení:</strong> '+p.sus.map(u=>'<a href="'+e(eliToEsbirkaUrl(u))+'" style="color:#1a5c8a">'+parseEli(u)+'</a>').join('; ')+'</div>';
    var souv=pjSouvislosti(p,'text');
    if(souv)h+='<div style="margin-bottom:4px;font-size:13px"><strong>Souvislosti:</strong> '+souv+'</div>';
    if(snapOld&&lbl==='UPRAVENO'){
      const old=snapOld.find(x=>x.id===p.id);
      if(old){
        const chF=['nc','ne','dc','de','pc','stav','typ','ac'].filter(f=>JSON.stringify(p[f])!==JSON.stringify(old[f]));
        if(chF.length){
          h+='<table style="margin-top:8px;border-collapse:collapse;width:100%;font-size:12px"><thead><tr><th style="text-align:left;padding:3px 8px;background:#f5f3ef;border-bottom:1px solid #c8c4bb">Pole</th><th style="text-align:left;padding:3px 8px;background:#ffeef0;border-bottom:1px solid #c8c4bb">Bylo</th><th style="text-align:left;padding:3px 8px;background:#e6ffed;border-bottom:1px solid #c8c4bb">Nově</th></tr></thead><tbody>';
          chF.forEach(f=>{h+='<tr><td style="padding:3px 8px;border-bottom:1px solid #eceae4;font-weight:bold">'+(POLE_LABELS[f]||f)+'</td><td style="padding:3px 8px;background:#fff8f8;color:#8a1a1a">'+fmtV(f,old[f])+'</td><td style="padding:3px 8px;background:#f8fff8;color:#1a6a2a">'+fmtV(f,p[f])+'</td></tr>';});
          h+='</tbody></table>';
        }
      }
    }
    h+='</div>';return h;
  };
  const secH=(title,color,count)=>`<h2 style="font-family:Georgia,serif;font-size:1.1rem;color:${color};border-left:4px solid ${color};padding-left:10px;margin:20px 0 12px">${e(title)} (${count})</h2>`;

  // 1. NOVÉ pojmy
  if(snapOld&&changed.added.length){
    html+=secH('Nové pojmy','#1a6a2a',changed.added.length);
    changed.added.forEach(p=>{html+=pojemCard(p,'#e6ffed','PŘIDÁNO','#1a6a2a');});
  }
  // 2. UPRAVENÉ pojmy
  if(snapOld&&changed.changed.length){
    html+=secH('Upravené pojmy','#7a5a00',changed.changed.length);
    changed.changed.forEach(p=>{html+=pojemCard(p,'#fffef0','UPRAVENO','#7a5a00');});
  }
  // 3. BEZE ZMĚNY — seskupeno podle typu
  const unchangedIds=new Set(snapOld?[...changed.added.map(x=>x.id),...changed.changed.map(x=>x.id)]:[]);
  const unchangedPojmy=snapOld?s.pojmy.filter(p=>!unchangedIds.has(p.id)):s.pojmy;
  if(unchangedPojmy.length){
    if(snapOld)html+=secH('Beze změny','#4a4845',unchangedPojmy.length);
    TYPY.forEach(t=>{
      const tp=unchangedPojmy.filter(p=>p.typ===t.id);if(!tp.length)return;
      if(!snapOld)html+=`<h2 style="font-family:Georgia,serif;font-size:1.1rem;color:#1a5c8a;border-left:4px solid #1a5c8a;padding-left:10px;margin:20px 0 12px">${e(t.lbl)} (${tp.length})</h2>`;
      else html+=`<h3 style="font-size:.95rem;color:#4a4845;margin:12px 0 8px;padding-left:14px">${e(t.lbl)} (${tp.length})</h3>`;
      tp.forEach(p=>{html+=pojemCard(p,'#ffffff','','#c8c4bb');});
    });
  }

  // Removed pojmy (only in diff mode)
  if(snapOld&&changed.removed.length){
    html+=`<h2 style="font-family:Georgia,serif;font-size:1.1rem;color:#8a1a1a;border-left:4px solid #8a1a1a;padding-left:10px;margin:20px 0 12px">Odstraněné pojmy (${changed.removed.length})</h2>`;
    changed.removed.forEach(p=>{
      html+=`<div style="border:1px solid #8a1a1a;border-radius:4px;padding:12px 16px;margin-bottom:10px;background:#f8e8e8;page-break-inside:avoid">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
          <strong style="text-decoration:line-through;color:#8a1a1a">${e(p.nc)||'?'}</strong>
          <span style="font-size:11px;padding:2px 8px;border-radius:10px;background:#8a1a1a;color:#fff;font-weight:bold">ODSTRANĚNO</span>
        </div>
        ${p.dc?`<div style="font-size:13px;color:#8a1a1a">${e(p.dc)}</div>`:''}
      </div>`;
    });
  }

  // Nevyřízené poznámky
  const nevyrPoz=(s.poznamky||[]).filter(n=>n.stav==='nevyrizena');
  const nevyrPojPoz=[];
  s.pojmy.forEach(pp=>{(pp.poznamky||[]).filter(n=>n.stav==='nevyrizena').forEach(n=>nevyrPojPoz.push({n,nc:pp.nc}));});
  if(nevyrPoz.length||nevyrPojPoz.length){
    html+=`<div style="margin-top:20px;border-top:2px dashed #d4c84a;padding-top:14px">
      <h3 style="font-family:Georgia,serif;font-size:1rem;color:#7a5a00;margin-bottom:10px">Nevyřízené autorské poznámky (${nevyrPoz.length+nevyrPojPoz.length})</h3>`;
    nevyrPoz.forEach(n=>html+=`<div style="background:#fffef0;border:1px solid #d4c84a;border-radius:4px;padding:8px 11px;margin-bottom:6px;font-size:13px"><span style="color:#7a7875">Slovník — ${e(n.datum)}</span><br>${e(n.txt)}</div>`);
    nevyrPojPoz.forEach(({n,nc})=>html+=`<div style="background:#fffef0;border:1px solid #d4c84a;border-radius:4px;padding:8px 11px;margin-bottom:6px;font-size:13px"><span style="color:#7a7875">Pojem: ${e(nc)} — ${e(n.datum)}</span><br>${e(n.txt)}</div>`);
    html+='</div>';
  }

  html+=`<div style="border-top:1px solid #c8c4bb;margin-top:20px;padding-top:10px;font-size:11px;color:#7a7875">Správce datového katalogu úřadu — ${now}</div></div>`;
  return html;
}

function buildSestavaCis(c, snapOld, verOld){
  const now=nowStr();
  const addedIds=snapOld?new Set(c.polozky.filter(p=>!snapOld.find(o=>o.id===p.id)).map(p=>p.id)):new Set();
  const removedPl=snapOld?snapOld.filter(o=>!c.polozky.find(p=>p.id===o.id)):[];
  const changedPl=snapOld?c.polozky.filter(p=>{const o=snapOld.find(x=>x.id===p.id);return o&&JSON.stringify(p)!==JSON.stringify(o);}):[];

  let html=`<div style="font-family:Georgia,serif;font-size:14px;color:#1a1917;max-width:860px">
  <div style="border-bottom:3px solid #1a5c8a;padding-bottom:12px;margin-bottom:18px">
    <div style="font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:#7a7875;margin-bottom:4px">Sestava číselníku</div>
    <h1 style="font-size:1.5rem;color:#1a5c8a;margin-bottom:6px">${e(c.nazev_cs)}</h1>
    ${c.nazev_en?`<div style="color:#4a4845;font-size:14px">${e(c.nazev_en)}</div>`:''}
    <table style="margin-top:10px;font-size:13px;border-collapse:collapse;width:100%"><tbody>
      <tr><td style="padding:2px 12px 2px 0;color:#7a7875;white-space:nowrap">IRI:</td><td><code style="font-size:12px">${e(c.iri||'—')}</code></td>
          <td style="padding:2px 12px 2px 20px;color:#7a7875;white-space:nowrap">Verze:</td><td>${e(c.ak_ver)}</td></tr>
      <tr><td style="padding:2px 12px 2px 0;color:#7a7875">Stav:</td><td>${e(sLbl(c.stav))}</td>
          <td style="padding:2px 12px 2px 20px;color:#7a7875">Kód / Akronym:</td><td>${e(c.kod||'—')}${c.akronym?' / '+e(c.akronym):''}</td></tr>
      <tr><td style="padding:2px 12px 2px 0;color:#7a7875">Platnost:</td><td colspan="3">${c.platnost_od||'—'}${c.platnost_do?' – '+e(c.platnost_do):''}</td></tr>
      ${c.popis_cs?`<tr><td style="padding:4px 12px 2px 0;color:#7a7875;vertical-align:top">Popis:</td><td colspan="3">${e(c.popis_cs)}</td></tr>`:''}
    </tbody></table>
    ${snapOld?`<div style="margin-top:8px;padding:6px 10px;background:#fff3cd;border-left:4px solid #7a5a00;font-size:13px">Sestava změn oproti verzi <strong>${e(verOld)}</strong></div>`:''}
    <div style="font-size:11px;color:#7a7875;margin-top:8px">Vygenerováno: ${now}</div>
  </div>`;

  if(snapOld){
    html+=`<div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px">
      <div style="border:1px solid #1a6a2a;border-radius:4px;padding:6px 12px;font-size:13px;background:#e8f5eb"><strong>${addedIds.size}</strong> přidáno</div>
      <div style="border:1px solid #8a1a1a;border-radius:4px;padding:6px 12px;font-size:13px;background:#f8e8e8"><strong>${removedPl.length}</strong> odstraněno</div>
      <div style="border:1px solid #7a5a00;border-radius:4px;padding:6px 12px;font-size:13px;background:#fdf5d8"><strong>${changedPl.length}</strong> upraveno</div>
    </div>`;
  }

  // Položky table
  html+=`<table style="width:100%;border-collapse:collapse;font-size:13px">
    <thead><tr style="background:#eceae4">
      <th style="text-align:left;padding:7px 9px;border-bottom:2px solid #c8c4bb">Kód</th>
      <th style="text-align:left;padding:7px 9px;border-bottom:2px solid #c8c4bb">Název</th>
      <th style="text-align:left;padding:7px 9px;border-bottom:2px solid #c8c4bb">Popis / Definice</th>
      <th style="text-align:left;padding:7px 9px;border-bottom:2px solid #c8c4bb">Platnost</th>
      <th style="text-align:left;padding:7px 9px;border-bottom:2px solid #c8c4bb">Stav</th>
      ${snapOld?'<th style="text-align:left;padding:7px 9px;border-bottom:2px solid #c8c4bb">Změna</th>':''}
    </tr></thead><tbody>`;

  c.polozky.forEach(p=>{
    let bg='#ffffff';let changeLabel='';
    if(snapOld){
      if(addedIds.has(p.id)){bg='#e6ffed';changeLabel='PŘIDÁNO';}
      else if(changedPl.find(x=>x.id===p.id)){bg='#fffef0';changeLabel='UPRAVENO';}
    }
    const popis=p.definice_cs||p.popis_cs||'';
    const platnost=(p.platnost_od||'')+(p.platnost_do?' – '+p.platnost_do:'');
    html+=`<tr style="background:${bg};border-bottom:1px solid #dedad2">
      <td style="padding:7px 9px;font-weight:bold;vertical-align:top">${e(p.kod)}</td>
      <td style="padding:7px 9px;vertical-align:top"><strong>${e(p.nazev_cs)}</strong>${p.nazev_en?'<br><span style="color:#7a7875;font-size:12px">'+e(p.nazev_en)+'</span>':''} ${p.zkr_nazev_cs?'<br><span style="color:#7a7875;font-size:12px">Zkr.: '+e(p.zkr_nazev_cs)+'</span>':''}${p.alt_nazev_cs?'<br><span style="color:#7a7875;font-size:12px">Alt.: '+e(p.alt_nazev_cs)+'</span>':''}</td>
      <td style="padding:7px 9px;font-size:12px;vertical-align:top;color:#4a4845">${e(popis.substring(0,200))}${popis.length>200?'…':''}</td>
      <td style="padding:7px 9px;font-size:12px;vertical-align:top;white-space:nowrap">${e(platnost)||'—'}</td>
      <td style="padding:7px 9px;font-size:12px;vertical-align:top">${e(sLbl(p.stav||'rozpracovany'))}</td>
      ${snapOld?`<td style="padding:7px 9px;vertical-align:top">${changeLabel?`<span style="font-size:11px;padding:2px 7px;border-radius:10px;font-weight:bold;background:${bg==='#e6ffed'?'#1a6a2a':'#7a5a00'};color:#fff">${changeLabel}</span>`:'—'}</td>`:''}
    </tr>`;
    // Show changed fields for modified items
    if(snapOld&&changeLabel==='UPRAVENO'){
      const old=snapOld.find(x=>x.id===p.id);
      if(old){
        const chF=['kod','nazev_cs','nazev_en','zkr_nazev_cs','alt_nazev_cs','definice_cs','popis_cs','stav','platnost_od','platnost_do'].filter(f=>JSON.stringify(p[f])!==JSON.stringify(old[f]));
        if(chF.length){
          html+=`<tr style="background:#fffbe8"><td colspan="${snapOld?6:5}" style="padding:4px 9px 8px">
            <table style="width:100%;border-collapse:collapse;font-size:12px"><thead><tr><th style="text-align:left;padding:2px 8px;background:#f5f3ef">Pole</th><th style="text-align:left;padding:2px 8px;background:#ffeef0">Bylo</th><th style="text-align:left;padding:2px 8px;background:#e6ffed">Nově</th></tr></thead><tbody>`;
          chF.forEach(f=>{html+=`<tr><td style="padding:2px 8px;font-weight:bold">${f}</td><td style="padding:2px 8px;color:#8a1a1a">${e(String(old[f]||'—'))}</td><td style="padding:2px 8px;color:#1a6a2a">${e(String(p[f]||'—'))}</td></tr>`;});
          html+='</tbody></table></td></tr>';
        }
      }
    }
  });

  // Removed
  removedPl.forEach(p=>{
    html+=`<tr style="background:#f8e8e8;border-bottom:1px solid #dedad2">
      <td style="padding:7px 9px;font-weight:bold;text-decoration:line-through;color:#8a1a1a">${e(p.kod)}</td>
      <td style="padding:7px 9px;text-decoration:line-through;color:#8a1a1a">${e(p.nazev_cs)}</td>
      <td style="padding:7px 9px;font-size:12px;color:#8a1a1a">${e((p.definice_cs||p.popis_cs||'').substring(0,120))}</td>
      <td colspan="2" style="padding:7px 9px;font-size:12px;color:#8a1a1a">—</td>
      ${snapOld?`<td style="padding:7px 9px"><span style="font-size:11px;padding:2px 7px;border-radius:10px;font-weight:bold;background:#8a1a1a;color:#fff">ODSTRANĚNO</span></td>`:''}
    </tr>`;
  });

  html+='</tbody></table>';

  const nevyrC=(c.poznamky||[]).filter(n=>n.stav==='nevyrizena');
  const nevyrP=[];c.polozky.forEach(p=>{(p.poznamky||[]).filter(n=>n.stav==='nevyrizena').forEach(n=>nevyrP.push({n,kod:p.kod,nc:p.nazev_cs}));});
  if(nevyrC.length||nevyrP.length){
    html+=`<div style="margin-top:16px;border-top:2px dashed #d4c84a;padding-top:12px"><h3 style="font-family:Georgia,serif;font-size:1rem;color:#7a5a00;margin-bottom:8px">Nevyřízené poznámky (${nevyrC.length+nevyrP.length})</h3>`;
    nevyrC.forEach(n=>html+=`<div style="background:#fffef0;border:1px solid #d4c84a;border-radius:4px;padding:7px 10px;margin-bottom:5px;font-size:13px"><span style="color:#7a7875">Číselník — ${e(n.datum)}</span><br>${e(n.txt)}</div>`);
    nevyrP.forEach(({n,kod,nc})=>html+=`<div style="background:#fffef0;border:1px solid #d4c84a;border-radius:4px;padding:7px 10px;margin-bottom:5px;font-size:13px"><span style="color:#7a7875">Položka ${e(kod)} ${e(nc)} — ${e(n.datum)}</span><br>${e(n.txt)}</div>`);
    html+='</div>';
  }

  html+=`<div style="border-top:1px solid #c8c4bb;margin-top:16px;padding-top:8px;font-size:11px;color:#7a7875">Správce datového katalogu úřadu — ${now}</div></div>`;
  return html;
}

// ── DIFF HELPER ──
function diffPojmy(snapOld,curPojmy){
  const oi=new Map(snapOld.map(p=>[p.id,p]));
  const ci=new Map(curPojmy.map(p=>[p.id,p]));
  return{
    added:curPojmy.filter(p=>!oi.has(p.id)),
    removed:snapOld.filter(p=>!ci.has(p.id)),
    changed:curPojmy.filter(p=>oi.has(p.id)&&JSON.stringify(p)!==JSON.stringify(oi.get(p.id))),
  };
}

// ── TISK SESTAVY (universal) ──
function tiskSestavu(elId){
  const el=document.getElementById(elId);if(!el)return;
  const win=window.open('','_blank','width=900,height=700');
  win.document.write('<!DOCTYPE html><html lang="cs"><head><meta charset="UTF-8"><title>Sestava</title>'
    +'<style>body{margin:20px;font-family:Georgia,serif;font-size:14px;color:#1a1917}'
    +'@media print{@page{margin:15mm}body{margin:0}}</style></head><body>');
  win.document.write(el.innerHTML);
  win.document.write('</body></html>');
  win.document.close();
  win.focus();
  setTimeout(function(){win.print();},500);
}

// ── PŘEPÍNÁNÍ ROZŠÍŘENÉHO REŽIMU ──
function toggleRozsir(cb, slId, pjId){
  if(pjId){
    const s=getSl(slId);const p=s&&s.pojmy.find(x=>x.id===pjId);
    if(p){p._rozsir=cb.checked;render();return;}
    // pjId set but pojem not saved yet - fall through to new-pojem logic
  }
  // New pojem: preserve values, re-render with new mode
  const nc=document.getElementById('pf-nc')?.value||'';
  const typ=document.querySelector('[name="typ"]')?.value||'Pojem';
  const dc=document.getElementById('pf-dc')?.value||'';
  const pc=document.getElementById('pf-pc')?.value||'';
  const stav=document.getElementById('pf-stav')?.value||'rozpracovany';
  const ac=gAl('cs');
  const s=getASl();if(!s)return;
  const tmp=mkPj({typ,nc,dc,pc,stav,ac,_rozsir:cb.checked});
  const formArea=document.getElementById('pj-form-area');
  if(formArea)formArea.innerHTML=pjForm(tmp,s,false);

// ── CSV/TSV PARSER ──
function csvParse(text){
  if(!text||!text.trim())return{headers:[],rows:[]};
  const lines=text.trim().split(/\r?\n/);
  // Detect delimiter: count tabs vs semicolons vs commas in first line
  const first=lines[0];
  const tabs=(first.match(/\t/g)||[]).length;
  const semis=(first.match(/;/g)||[]).length;
  const commas=(first.match(/,/g)||[]).length;
  const delim=tabs>=semis&&tabs>=commas?'\t':semis>=commas?';':',';

  function parseLine(line){
    if(delim==='\t')return line.split('\t').map(v=>v.trim());
    // CSV with possible quoting
    const result=[];let cur='';let inQ=false;
    for(let i=0;i<line.length;i++){
      const ch=line[i];
      if(ch==='"'&&!inQ&&cur===''){inQ=true;}
      else if(ch==='"'&&inQ){if(line[i+1]==='"'){cur+='"';i++;}else inQ=false;}
      else if(ch===delim&&!inQ){result.push(cur.trim());cur='';}
      else cur+=ch;
    }
    result.push(cur.trim());
    return result;
  }

  const headers=parseLine(lines[0]);
  const rows=lines.slice(1).filter(l=>l.trim()).map(l=>{
    const vals=parseLine(l);
    const obj={};
    headers.forEach((h,i)=>obj[h]=vals[i]||'');
    return obj;
  });
  return{headers,rows,delim};
}

function csvBuildMapping(headers, fields){
  // Auto-match: normalize to lowercase, strip spaces/dashes
  const norm=s=>s.toLowerCase().replace(/[\s\-_\.]/g,'');
  const mapping={};
  fields.forEach(f=>{
    const match=headers.find(h=>norm(h)===norm(f.id)||norm(h)===norm(f.lbl));
    mapping[f.id]=match||'';
  });
  return mapping;
}

function csvMappingHtml(headers,fields,mapId,actionFn,dupFn){
  const mapping=csvBuildMapping(headers,fields);
  const opts='<option value="">— přeskočit —</option>'+headers.map(h=>`<option value="${e(h)}">${e(h)}</option>`).join('');
  return`<div class="panel"><div class="ptit">2. Mapování sloupců</div>
    <div class="tw"><table><thead><tr><th>Pole aplikace</th><th>Sloupec z dat</th></tr></thead><tbody>
    ${fields.map(f=>`<tr>
      <td>${e(f.lbl)}${f.req?' <span class="req">*</span>':''}</td>
      <td><select id="${mapId}-${f.id}">
        ${opts.replace(`value="${e(mapping[f.id]||'')}"`,`value="${e(mapping[f.id]||'')}" selected`)}
      </select></td>
    </tr>`).join('')}
    </tbody></table></div>
    <div class="fg" style="margin-top:12px"><label for="${mapId}-dup">Při existující shodě</label>
      <select id="${mapId}-dup">
        <option value="skip">Přeskočit (neimportovat)</option>
        <option value="replace">Nahradit importovaným</option>
      </select>
    </div>
    <div class="bg"><button class="bp" onclick="${actionFn}()">Importovat</button></div>
  </div>`;
}

function getMapping(mapId,fields){
  const m={};
  fields.forEach(f=>{
    const el=document.getElementById(mapId+'-'+f.id);
    m[f.id]=el?el.value:'';
  });
  return m;
}
function mapRow(row,mapping){
  const out={};
  Object.entries(mapping).forEach(([field,col])=>{if(col&&row[col]!==undefined)out[field]=row[col];});
  return out;
}
