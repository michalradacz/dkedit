function noteWidget(notes,ctx){
  // ctx = string like 'sl:ID' or 'pj:SL_ID:PJ_ID'
  const eid=btoa(ctx).replace(/=/g,'');
  return`<div class="fg" id="nw-${eid}">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:7px">
      <strong style="font-size:.88rem">Autorské poznámky</strong>
      <span class="xs">(interní, nejdou do exportu)</span>
      <button type="button" class="bs sm" onclick="addNote('${eid}','${ctx}')">+ Přidat poznámku</button>
    </div>
    <div id="nl-${eid}">${renderNotes(notes,ctx,eid)}</div>
  </div>`;
}
function renderNotes(notes,ctx,eid){
  if(!notes||!notes.length)return'<p class="xs" style="color:var(--tx3);font-style:italic">Žádné poznámky.</p>';
  return notes.map((n,i)=>`
    <div class="pnote ${n.stav==='vyrizena'?'vyrizena':''}" id="pn-${n.id}">
      <div class="pnote-hdr">
        <span class="${n.stav==='vyrizena'?'nbadge-v':'nbadge-n'}">${n.stav==='vyrizena'?'✓ Vyřízená':'● Nevyřízená'}</span>
        <span class="xs">${e(n.datum)}</span>
        <button type="button" class="bs sm" onclick="toggleNote('${ctx}',${i})" style="padding:2px 8px;font-size:12px">${n.stav==='vyrizena'?'Znovu otevřít':'Označit vyřízenou'}</button>
        <button type="button" class="bd sm" onclick="delNote('${ctx}',${i})" style="padding:2px 8px;font-size:12px" aria-label="Smazat poznámku">✕</button>
      </div>
      <div class="pnote-txt">${e(n.txt)}</div>
    </div>`).join('');
}
function getNoteTarget(ctx){
  const parts=ctx.split(':');
  if(parts[0]==='sl'){return getSl(parts[1]);}
  if(parts[0]==='pj'){const s=getSl(parts[1]);return s?s.pojmy.find(p=>p.id===parts[2]):null;}
  if(parts[0]==='cs'){return getCs(parts[1]);}
  if(parts[0]==='pl'){const c=getCs(parts[1]);return c?c.polozky.find(p=>p.id===parts[2]):null;}
  return null;
}
function addNote(eid,ctx){
  const txt=prompt('Text autorské poznámky:');
  if(!txt||!txt.trim())return;
  const target=getNoteTarget(ctx);
  if(!target)return;
  if(!target.poznamky)target.poznamky=[];
  target.poznamky.push(mkNote(txt.trim()));
  saveL();
  const container=document.getElementById('nl-'+eid);
  if(container)container.innerHTML=renderNotes(target.poznamky,ctx,eid);
}
function toggleNote(ctx,idx){
  const target=getNoteTarget(ctx);
  if(!target||!target.poznamky||!target.poznamky[idx])return;
  const n=target.poznamky[idx];
  n.stav=n.stav==='vyrizena'?'nevyrizena':'vyrizena';
  saveL();
  const eid=btoa(ctx).replace(/=/g,'');
  const container=document.getElementById('nl-'+eid);
  if(container)container.innerHTML=renderNotes(target.poznamky,ctx,eid);
  // refresh sidebar note badges
  rSide();
}
function delNote(ctx,idx){
  const target=getNoteTarget(ctx);
  if(!target||!target.poznamky)return;
  target.poznamky.splice(idx,1);
  saveL();
  const eid=btoa(ctx).replace(/=/g,'');
  const container=document.getElementById('nl-'+eid);
  if(container)container.innerHTML=renderNotes(target.poznamky,ctx,eid);
}
function countNotes(obj,stavFilter){
  if(!obj||!obj.poznamky)return 0;
  if(!stavFilter)return obj.poznamky.length;
  return obj.poznamky.filter(n=>n.stav===stavFilter).length;
}
function allNotes(){
  const res=[];
  S.slovniky.forEach(s=>{
    (s.poznamky||[]).forEach(n=>res.push({n,ctx:'sl:'+s.id,ctxLbl:'Slovník: '+s.nazev_cs,nazev:s.nazev_cs,typ:'slovnik'}));
    s.pojmy.forEach(p=>{
      (p.poznamky||[]).forEach(n=>res.push({n,ctx:'pj:'+s.id+':'+p.id,ctxLbl:'Pojem: '+p.nc+' ('+s.nazev_cs+')',nazev:p.nc,typ:p.typ}));
    });
  });
  (S.ciselniky||[]).forEach(c=>{
    (c.poznamky||[]).forEach(n=>res.push({n,ctx:'cs:'+c.id,ctxLbl:'Číselník: '+c.nazev_cs,nazev:c.nazev_cs,typ:'ciselniky'}));
    c.polozky.forEach(p=>{
      (p.poznamky||[]).forEach(n=>res.push({n,ctx:'pl:'+c.id+':'+p.id,ctxLbl:'Položka: '+p.nazev_cs+' ('+c.nazev_cs+')',nazev:p.nazev_cs,typ:'polozka'}));
    });
  });
  return res;
}

function filtNotes(){
  const stav=document.getElementById('nf-stav')?.value||'';

function renderNotesList(notes){

function toggleNoteGlobal(ctx,nid){

function eliInsert(targetId){

  if(parts[0]==='irilist'){
    const key=parts[1];const inp=document.getElementById('niri-'+key);
    if(inp){inp.value=iri;addIri(key);}
  } else if(parts[0]==='esw'){
    eliSimpleInsert(parts[1],iri);
  } else {
    const el=document.getElementById(targetId);if(el)el.value=iri;
  }
  cDlg();
}

// ── IRI AUTO-GENEROVÁNÍ ──
function slugify(text){
  // Czech-aware slug: strip diacritics, lowercase, replace spaces with hyphens
  return text.normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .toLowerCase().trim()
    .replace(/[^a-z0-9\s-]/g,'')
    .replace(/\s+/g,'-')
    .replace(/-+/g,'-')
    .replace(/^-|-$/g,'');
}
function suggestPojemIri(nazevCs, slovnikIri){
  if(!nazevCs||!slovnikIri) return '';
  const base = slovnikIri.replace(/\/+$/,'');
  return base + '/pojem/' + slugify(nazevCs);
}
function suggestSlovnikIri(nazevCs, orgBase){
  if(!nazevCs) return '';
  const base = (orgBase||'https://slovník.gov.cz/datový').replace(/\/+$/,'');
  return base + '/' + slugify(nazevCs);
}
function suggestCiselnikIri(nazevCs, orgBase){
  if(!nazevCs) return '';
  const base = (orgBase||'https://data.gov.cz/zdroj/číselníky').replace(/\/+$/,'');
  return base + '/' + slugify(nazevCs);
}
function suggestPolozkaIri(kodOrNazev, ciselnikIri){
  if(!kodOrNazev||!ciselnikIri) return '';
  return ciselnikIri.replace(/\/+$/,'') + '/položky/' + slugify(kodOrNazev);
}
// Auto-fill IRI field for pojem when nazev changes
function autoIriPojem(nazevEl, iriEl, slId){

  if(!iriInp || iriInp.value.trim()) return; // don't overwrite existing
  const s = getSl(slId);
  if(!s || !s.iri) return;
  iriInp.value = suggestPojemIri(nazevEl.value, s.iri);

// ── EXPORT ČÍSELNÍKU ──
function expCsJLD(csId){
  const c=getCs(csId)||getACs();if(!c)return;
  const jld=buildCsJLD(c);
  const nm=(c.nazev_cs||'ciselniky').replace(/\s+/g,'_').toLowerCase()+'_'+c.ak_ver+'.jsonld';
  dl(JSON.stringify(jld,null,2),nm,'application/ld+json');
  toast('Exportováno: '+nm);
}
function buildCsJLD(c){
  const doc={
    "@context":"https://ofn.gov.cz/číselníky/2022-02-08/kontexty/číselník.jsonld",
    "iri":c.iri||'_:'+c.id,
    "typ":"Číselník",
    "název":lo(c.nazev_cs,c.nazev_en),
  };
  if(c.kod)doc["kód"]=c.kod;
  if(c.akronym)doc["akronym"]=c.akronym;
  if(c.popis_cs)doc["popis"]=lo(c.popis_cs,c.popis_en);
  if(c.definice_cs)doc["definice"]=lo(c.definice_cs,c.definice_en);
  if(c.platnost_od||c.platnost_do){
    doc["platnost"]={};
    if(c.platnost_od)doc["platnost"]["začátek"]={typ:"Časový okamžik",datum:c.platnost_od};
    if(c.platnost_do)doc["platnost"]["konec"]={typ:"Časový okamžik",datum:c.platnost_do};
  }
  if(c.nkod_url)doc["nkod_url"]=c.nkod_url;
  doc["položky"]=c.polozky.map(p=>{
    const item={
      "iri":p.iri||'_:'+p.id,
      "typ":"Položka",
      "kód":p.kod,
      "název":lo(p.nazev_cs,p.nazev_en),
    };
    if(p.alt_nazev_cs||p.alt_nazev_en)item["alt_název"]=lo(p.alt_nazev_cs,p.alt_nazev_en);
    if(p.zkr_nazev_cs||p.zkr_nazev_en)item["zkr_název"]=lo(p.zkr_nazev_cs,p.zkr_nazev_en);
    if(p.definice_cs)item["definice"]=lo(p.definice_cs,p.definice_en);
    if(p.popis_cs)item["popis"]=lo(p.popis_cs,p.popis_en);
    if(p.platnost_od||p.platnost_do){
      item["platnost"]={};
      if(p.platnost_od)item["platnost"]["začátek"]={typ:"Časový okamžik",datum:p.platnost_od};
      if(p.platnost_do)item["platnost"]["konec"]={typ:"Časový okamžik",datum:p.platnost_do};
    }
    return item;
  });
  return doc;
}

function vImportCs(){
  return`<h2 class="sh">Import číselníku z JSON-LD</h2>
  <div class="panel">
    <p class="xs" style="margin-bottom:11px">Importujte číselník z JSON-LD souboru dle OFN Číselníky.</p>
    <div class="fg"><label for="impcsf">Soubor JSON-LD</label><input type="file" id="impcsf" accept=".json,.jsonld" onchange="doImpCsF(event)"></div>
    <hr>
    <div class="fg"><label for="impcst">Nebo vložte JSON-LD přímo:</label><textarea id="impcst" style="font-family:monospace;font-size:12px;min-height:160px" placeholder='{"@context":"https://ofn.gov.cz/číselníky/...","iri":"...","typ":"Číselník","název":{"cs":"..."},"položky":[]}'></textarea></div>
    <div class="bg"><button class="bp" onclick="doImpCsT()">Importovat</button><button class="bs" onclick="V('ciselniky')">Zrušit</button></div>
  </div>`;
}
function doImpCsF(ev){const f=ev.target.files[0];if(!f)return;const r=new FileReader();r.onload=e=>{document.getElementById('impcst').value=e.target.result;};r.readAsText(f);}
function doImpCsT(){
  const txt=document.getElementById('impcst')?.value.trim();if(!txt){toast('Zadejte obsah.','w');return;}
  try{const d=JSON.parse(txt);const c=impCsJLD(d);S.ciselniky.push(c);S.akCs=c.id;saveL();toast('Importováno: '+c.nazev_cs+' ('+c.polozky.length+' položek)');V('editCs');}
  catch(x){toast('Chyba: '+x.message,'d');}
}
function impCsJLD(d){
  const c=mkCs({iri:d.iri||'',nc:(d['název']&&d['název'].cs)||'',ne:(d['název']&&d['název'].en)||'',kod:d['kód']||'',akronym:d['akronym']||'',pc:(d['popis']&&d['popis'].cs)||'',pe:(d['popis']&&d['popis'].en)||'',dc:(d['definice']&&d['definice'].cs)||'',de:(d['definice']&&d['definice'].en)||'',pod:(d['platnost']&&d['platnost']['začátek']&&d['platnost']['začátek'].datum)||'',pdo:(d['platnost']&&d['platnost']['konec']&&d['platnost']['konec'].datum)||''});
  (d['položky']||[]).forEach(pl=>{

// ── ELI PARSER — lidsky čitelný popis ──
function parseEli(url) {
  if (!url) return url;
  // Match: .../eli/cz/sb/{rok}/{cislo}[/{datum}][/cast_N][/par_N]...
  // Supports both e-sbirka.cz and opendata.eselpoint.cz formats
  const m = url.match(/eli\/cz\/sb\/(\d{4})\/(\d+)(?:\/([^/]+))?((?:\/[a-z][^/]*)*)/);
  if (!m) return url;
  const rok = m[1], cislo = m[2], datum = m[3], rest = m[4] || '';
  
  // Parse rest segments
  // rest may include /datum/dokument/norma/... or just /cast_N/par_N/...
  // Filter out non-structural segments
  const segs = rest.split('/').filter(s => s && s !== 'dokument' && s !== 'norma' && !/^\d{4}-\d{2}-\d{2}$/.test(s) && s !== 'aktualni');
  const parts = {};
  segs.forEach(s => {
    const pm = s.match(/^(cast|par|odst|pism|bod|hl|dil|pododdil|oddil|priloha)_(.+)$/);
    if (pm) parts[pm[1]] = pm[2];
  });
  
  // Build human label
  let est = '';
  if (parts.par) {
    est += '§ ' + parts.par.replace(/^0+/, '');
  } else if (parts.cast) {
    est += 'část ' + parts.cast;
  } else if (parts.hl) {
    est += 'hlava ' + parts.hl;
  }
  if (parts.odst) est += ' odst. ' + parts.odst;
  if (parts.pism) est += ' písm. ' + parts.pism.replace(/^0+/, '') + ')';
  if (parts.bod) est += ' bod ' + parts.bod;

  let label = 'Předpis ' + cislo + '/' + rok + ' Sb.';
  if (est) label += ', ' + est;
  if (datum && datum !== 'aktualni') {
    const d = datum.split('-');
    if (d.length === 3) label += ' (znění k ' + parseInt(d[2]) + '. ' + parseInt(d[1]) + '. ' + d[0] + ')';
  }
  return label;
}

    </tr></thead><tbody>`;

  c.polozky.forEach(p=>{

      if(addedIds.has(p.id)){bg='#e6ffed';changeLabel='PŘIDÁNO';}

    }
    const popis=p.definice_cs||p.popis_cs||'';
    const platnost=(p.platnost_od||'')+(p.platnost_do?' – '+p.platnost_do:'');

// ── CSV/TSV PARSER ──
function csvParse(text){
  if(!text||!text.trim())return{headers:[],rows:[]};
  const lines=text.trim().split(/\r?\n/);
  // Detect delimiter: count tabs vs semicolons vs commas in first line
  const first=lines[0];
  const tabs=(first.match(/\t/g)||[]).length;
  const semis=(first.match(/;/g)||[]).length;
  const commas=(first.match(/,/g)||[]).length;
  const delim=tabs>=semis&&tabs>=commas?'\t':semis>=commas?';':',';

  function parseLine(line){
    if(delim==='\t')return line.split('\t').map(v=>v.trim());
    // CSV with possible quoting
    const result=[];let cur='';let inQ=false;
    for(let i=0;i<line.length;i++){
      const ch=line[i];
      if(ch==='"'&&!inQ&&cur===''){inQ=true;}
      else if(ch==='"'&&inQ){if(line[i+1]==='"'){cur+='"';i++;}else inQ=false;}
      else if(ch===delim&&!inQ){result.push(cur.trim());cur='';}
      else cur+=ch;
    }
    result.push(cur.trim());
    return result;
  }

  const headers=parseLine(lines[0]);
  const rows=lines.slice(1).filter(l=>l.trim()).map(l=>{
    const vals=parseLine(l);
    const obj={};
    headers.forEach((h,i)=>obj[h]=vals[i]||'');
    return obj;
  });
  return{headers,rows,delim};
}

function csvBuildMapping(headers, fields){
  // Auto-match: normalize to lowercase, strip spaces/dashes
  const norm=s=>s.toLowerCase().replace(/[\s\-_\.]/g,'');
  const mapping={};
  fields.forEach(f=>{
    const match=headers.find(h=>norm(h)===norm(f.id)||norm(h)===norm(f.lbl));
    mapping[f.id]=match||'';
  });
  return mapping;
}

function csvMappingHtml(headers,fields,mapId,actionFn,dupFn){
  const mapping=csvBuildMapping(headers,fields);
  const opts='<option value="">— přeskočit —</option>'+headers.map(h=>`<option value="${e(h)}">${e(h)}</option>`).join('');
  return`<div class="panel"><div class="ptit">2. Mapování sloupců</div>
    <div class="tw"><table><thead><tr><th>Pole aplikace</th><th>Sloupec z dat</th></tr></thead><tbody>
    ${fields.map(f=>`<tr>
      <td>${e(f.lbl)}${f.req?' <span class="req">*</span>':''}</td>
      <td><select id="${mapId}-${f.id}">
        ${opts.replace(`value="${e(mapping[f.id]||'')}"`,`value="${e(mapping[f.id]||'')}" selected`)}
      </select></td>
    </tr>`).join('')}
    </tbody></table></div>
    <div class="fg" style="margin-top:12px"><label for="${mapId}-dup">Při existující shodě</label>
      <select id="${mapId}-dup">
        <option value="skip">Přeskočit (neimportovat)</option>
        <option value="replace">Nahradit importovaným</option>
      </select>
    </div>
    <div class="bg"><button class="bp" onclick="${actionFn}()">Importovat</button></div>
  </div>`;
}

function getMapping(mapId,fields){
  const m={};
  fields.forEach(f=>{
    const el=document.getElementById(mapId+'-'+f.id);
    m[f.id]=el?el.value:'';
  });
  return m;
}
function mapRow(row,mapping){
  const out={};
  Object.entries(mapping).forEach(([field,col])=>{if(col&&row[col]!==undefined)out[field]=row[col];});
  return out;
}

function doImportCsvPj(){
  const s=getASl();if(!s){toast('Vyberte slovník.','w');return;}
  const txt=document.getElementById('csv-text-pj')?.value;
  if(!txt){toast('Nejsou data.','w');return;}
  const{rows}=csvParse(txt);
  const mapping=getMapping('pjmap',PJ_FIELDS);
  if(!mapping.nc){toast('Musíte namapovat pole Název (česky).','w');return;}
  const dupMode=document.getElementById('pjmap-dup')?.value||'skip';

  let added=0,replaced=0,skipped=0;
  rows.forEach(row=>{
    const d=mapRow(row,mapping);
    if(!d.nc)return;
    const existing=s.pojmy.find(p=>(p.nc||'').toLowerCase()===d.nc.toLowerCase());
    if(existing){
      if(dupMode==='skip'){skipped++;return;}
      // replace
      existing.nc=d.nc||existing.nc;
      if(d.ne)existing.ne=d.ne;
      if(d.dc)existing.dc=d.dc;
      if(d.de)existing.de=d.de;
      if(d.pc)existing.pc=d.pc;
      if(d.pe)existing.pe=d.pe;
      if(d.ac)existing.ac=d.ac.split(';').map(x=>x.trim()).filter(Boolean);
      if(d.typ&&TYPY.find(t=>t.id===d.typ))existing.typ=d.typ;
      if(d.stav&&STAVY.find(st=>st.id===d.stav))existing.stav=d.stav;
      if(d.iri)existing.iri=d.iri;
      if(d.eli_def&&!existing.dus.includes(d.eli_def))existing.dus.push(d.eli_def);
      if(!existing.iri&&s.iri)existing.iri=suggestPojemIri(existing.nc,s.iri);
      replaced++;
    } else {
      const p=mkPj({
        nc:d.nc,ne:d.ne||'',dc:d.dc||'',de:d.de||'',pc:d.pc||'',pe:d.pe||'',
        ac:d.ac?d.ac.split(';').map(x=>x.trim()).filter(Boolean):[],
        typ:TYPY.find(t=>t.id===d.typ)?d.typ:'Pojem',
        stav:STAVY.find(st=>st.id===d.stav)?d.stav:'rozpracovany',
        iri:d.iri||'',
        dus:d.eli_def?[d.eli_def]:[],
      });
      if(!p.iri&&s.iri)p.iri=suggestPojemIri(p.nc,s.iri);
      s.pojmy.push(p);
      added++;
    }
  });
  s.aktualizovano=td();saveL();
  toast(`Import hotov: ${added} přidáno, ${replaced} nahrazeno, ${skipped} přeskočeno.`);
  V('pojmy');
}

function doImportCsvCs(){
  const c=getACs();if(!c){toast('Vyberte číselník.','w');return;}
  const txt=document.getElementById('csv-text-cs')?.value;
  if(!txt){toast('Nejsou data.','w');return;}
  const{rows}=csvParse(txt);
  const mapping=getMapping('plmap',PL_FIELDS);
  if(!mapping.kod){toast('Musíte namapovat pole Kód.','w');return;}
  const dupMode=document.getElementById('plmap-dup')?.value||'skip';

  let added=0,replaced=0,skipped=0;
  rows.forEach(row=>{
    const d=mapRow(row,mapping);
    if(!d.kod)return;
    const existing=c.polozky.find(p=>p.kod===d.kod);
    if(existing){
      if(dupMode==='skip'){skipped++;return;}
      if(d.nc)existing.nazev_cs=d.nc;
      if(d.ne)existing.nazev_en=d.ne;
      if(d.dc){existing.definice_cs=d.dc;existing.popis_cs=d.dc;}
      if(d.de)existing.definice_en=d.de;
      if(d.znc)existing.zkr_nazev_cs=d.znc;
      if(d.anc)existing.alt_nazev_cs=d.anc;
      if(d.stav&&STAVY.find(st=>st.id===d.stav))existing.stav=d.stav;
      if(d.iri)existing.iri=d.iri;
      if(d.platnost_od)existing.platnost_od=d.platnost_od;
      if(d.platnost_do)existing.platnost_do=d.platnost_do;
      if(!existing.iri&&c.iri)existing.iri=suggestPolozkaIri(existing.kod,c.iri);
      replaced++;
    } else {
      const p=mkPl({
        kod:d.kod,nc:d.nc||'',ne:d.ne||'',
        dc:d.dc||'',de:d.de||'',pc:d.dc||'',
        znc:d.znc||'',anc:d.anc||'',
        stav:STAVY.find(st=>st.id===d.stav)?d.stav:'rozpracovany',
        iri:d.iri||'',
        pod:d.platnost_od||'',pdo:d.platnost_do||'',
      });
      if(!p.iri&&c.iri)p.iri=suggestPolozkaIri(p.kod,c.iri);
      c.polozky.push(p);
      added++;
    }
  });
  c.aktualizovano=td();saveL();
  toast(`Import hotov: ${added} přidáno, ${replaced} nahrazeno, ${skipped} přeskočeno.`);
  V('editCs');
}

// Převod uloženého OFN ELI IRI na odkaz pro e-Sbírku
function eliToEsbirkaUrl(iri){
  if(!iri)return iri;
  // Normalize: oba formáty → extrahovat strukturu a sestavit e-sbirka URL
  const m=iri.match(/eli\/cz\/sb\/(\d{4})\/(\d+)(?:\/([^/]+))?((?:\/[a-z][^/]*)*)/);
  if(!m)return iri;
  const rok=m[1],cislo=m[2],datum=m[3]||'aktualni',rest=(m[4]||'')
    .replace(/\/dokument\/norma/,''); // strip /dokument/norma if present
  return'https://www.e-sbirka.cz/eli/cz/sb/'+rok+'/'+cislo+'/'+datum+rest;
}
// Sestavení OFN ELI IRI pro uložení (opendata.eselpoint.cz formát)
function eliToOFN(rok,cislo,datum,rest){
  let iri='https://opendata.eselpoint.cz/esel-esb/eli/cz/sb/'+rok+'/'+cislo;
  iri+='/'+(datum||'aktualni');
  iri+='/dokument/norma';
  if(rest)iri+=rest;
  return iri;
}

// GITHUB INTEGRACE
// ════════════════════════════════════════════════════════

function ghEncode(path){return btoa(unescape(encodeURIComponent(path)));}
function ghDecode(encoded){return decodeURIComponent(escape(atob(encoded)));}
function parseGhPath(ghPath){
  var parts=ghPath.split('/');
  if(parts.length<3)return null;
  return{owner:parts[0],repo:parts[1],path:parts.slice(2).join('/')};
}
function ghToken(){return localStorage.getItem('app_github_token')||'';}

function ghSave(){
  var token=ghToken();
  if(!token){toast('GitHub token není nastaven. Nastavte ho v sekci GitHub na záložce Projekt.','w');return;}
  if(!S.ghPath){ghDlgPath(function(){ghSave();});return;}
  var parsed=parseGhPath(S.ghPath);
  if(!parsed){toast('Neplatná cesta k souboru.','w');return;}
  var apiUrl='https://api.github.com/repos/'+parsed.owner+'/'+parsed.repo+'/contents/'+parsed.path;
  var headers={'Authorization':'token '+token,'Accept':'application/json'};
  toast('Ukládám do GitHub…','i');
  fetch(apiUrl,{headers:headers})
  .then(function(res){if(res.status===404)return null;if(!res.ok)throw new Error('HTTP '+res.status);return res.json();})
  .then(function(existing){
    var json=JSON.stringify(S,null,2);
    var body={
      message:'Update: '+new Date().toISOString().replace(/T/,' ').replace(/\..+/,''),
      content:btoa(unescape(encodeURIComponent(json)))
    };
    if(existing&&existing.sha)body.sha=existing.sha;
    return fetch(apiUrl,{method:'PUT',headers:{'Authorization':'token '+token,'Content-Type':'application/json'},body:JSON.stringify(body)});
  })
  .then(function(res){
    if(!res.ok)return res.json().then(function(e){throw new Error(e.message||res.status);});
    history.replaceState(null,'',location.pathname+'?id='+ghEncode(S.ghPath));
    toast('Uloženo do GitHub ✓');
  })
  .catch(function(err){toast('Chyba GitHub: '+err.message,'d');});
}

function ghLoad(ghPath){
  var token=ghToken();
  var parsed=parseGhPath(ghPath);
  if(!parsed){toast('Neplatná GitHub cesta.','w');return;}
  var apiUrl='https://api.github.com/repos/'+parsed.owner+'/'+parsed.repo+'/contents/'+parsed.path;
  var headers={'Accept':'application/json'};
  if(token)headers['Authorization']='token '+token;
  toast('Načítám z GitHub…','i');
  fetch(apiUrl,{headers:headers})
  .then(function(res){if(!res.ok)throw new Error('HTTP '+res.status);return res.json();})
  .then(function(data){
    if(data.content){
      // Malý soubor — obsah přímo v odpovědi
      return decodeURIComponent(escape(atob(data.content.replace(/\n/g,''))));
    }else if(data.sha){
      // Velký soubor (>1 MB) — použít Git Blob API (funguje přes CORS, na rozdíl od download_url)
      var blobUrl='https://api.github.com/repos/'+parsed.owner+'/'+parsed.repo+'/git/blobs/'+data.sha;
      var blobH={'Accept':'application/vnd.github.v3+json'};
      if(token)blobH['Authorization']='token '+token;
      return fetch(blobUrl,{headers:blobH})
        .then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json();})
        .then(function(blob){
          if(!blob.content)throw new Error('Blob nemá obsah.');
          return decodeURIComponent(escape(atob(blob.content.replace(/\n/g,''))));
        });
    }else{
      throw new Error('Soubor nemá obsah ani SHA.');
    }
  })
  .then(function(content){
    var obj=JSON.parse(content);
    obj.ghPath=ghPath;
    S=obj;
    if(!S.ciselniky)S.ciselniky=[];
    if(!S.projekt.orgIriBase)S.projekt.orgIriBase='';
    S.slovniky.forEach(function(sl){if(!sl.poznamky)sl.poznamky=[];sl.pojmy.forEach(function(p){if(!p.poznamky)p.poznamky=[];});});
    S.ciselniky.forEach(function(c){if(!c.poznamky)c.poznamky=[];if(!c.polozky)c.polozky=[];c.polozky.forEach(function(p){if(!p.poznamky)p.poznamky=[];});});
    saveL();
    history.replaceState(null,'',location.pathname+'?id='+ghEncode(ghPath));
    toast('Načteno z GitHub ✓');
    render();
  })
  .catch(function(err){toast('Chyba GitHub: '+err.message,'d');});
}


function ghDlgPath(onConfirm){
  oDlg('Nastavení GitHub úložiště',
    `<div class="fg"><label for="gh-token">GitHub Personal Access Token <span class="hint">(fine-grained, Contents R/W — ukládá se jen v prohlížeči)</span></label>
      <input type="password" id="gh-token" value="${e(ghToken())}" placeholder="github_pat_…" autocomplete="off">
      <div class="xs" style="margin-top:4px"><a href="https://github.com/settings/tokens?type=beta" target="_blank" rel="noopener">Vytvořit token na GitHub →</a></div>
    </div>
    <div class="fg"><label for="gh-path">Cesta k souboru <span class="hint">(owner/repozitář/cesta/soubor.json)</span></label>
      <input type="text" id="gh-path" value="${e(S.ghPath||'')}" placeholder="owner/repo/data/projekt.json">
    </div>
    ${S.ghPath?`<div class="fg"><label>Přímý odkaz</label>
      <div class="ir"><input type="text" readonly value="${e(location.origin+location.pathname+'?id='+ghEncode(S.ghPath))}" onclick="this.select()" style="font-size:12px">
      <button class="bs sm" onclick="navigator.clipboard.writeText(this.previousElementSibling.value);toast('Zkopírováno')">Kopírovat</button></div>
    </div>`:''}`,
    `<button class="bp" onclick="ghDlgConfirm(${onConfirm?'true':'false'})">Uložit nastavení</button>
     <button class="bs" onclick="cDlg()">Zrušit</button>`
  );
}
function ghDlgConfirm(andSave){
  var token=document.getElementById('gh-token').value.trim();
  var path=document.getElementById('gh-path').value.trim();
  if(token)localStorage.setItem('app_github_token',token);
  else localStorage.removeItem('app_github_token');
  if(path)S.ghPath=path;
  saveL();cDlg();
  toast('GitHub nastavení uloženo.');
  if(andSave)ghSave();
}

loadL();render();
